<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        @media print {
            @page { margin: 0; }
            body * { display: none !important; }
            #secao-impressao, #secao-impressao * { display: block !important; }
            #secao-impressao { width: 100%; max-width: 80mm; font-family: monospace; font-size: 10pt; padding: 5mm; color: black; }
            .quebra-pagina { page-break-after: always; border-bottom: 2px dashed #000; margin-bottom: 10mm; padding-bottom: 5mm; }
        }
        .status-pendente { border-left: 10px solid #f59e0b; }
        .status-preparo { border-left: 10px solid #3b82f6; }
        .status-pronto { border-left: 10px solid #10b981; opacity: 0.7; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-zinc-100 p-4">

    <a href="central.html" class="fixed top-4 left-4 z-[100] bg-white/90 text-zinc-800 px-5 py-2.5 rounded-full text-[10px] font-black uppercase shadow-2xl border border-zinc-200">
        ⬅️ Central
    </a>

    <audio id="som-alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header class="max-w-2xl mx-auto text-center mb-6 mt-12">
        <h1 class="text-3xl font-black text-zinc-900 uppercase italic">Painel de Atendimento</h1>
        <div id="badge-impressao" class="mt-2"></div>
    </header>

    <div class="max-w-2xl mx-auto mb-6 flex bg-white rounded-2xl p-1 shadow-sm border border-zinc-200">
        <button onclick="mudarAba('aba-fila')" id="btn-fila" class="flex-1 py-4 rounded-xl font-black uppercase text-[10px] bg-zinc-800 text-white transition-all">📋 Pedidos</button>
        <button onclick="mudarAba('aba-estoque')" id="btn-estoque" class="flex-1 py-4 rounded-xl font-black uppercase text-[10px] text-zinc-500 transition-all">🚫 Pausar Itens</button>
    </div>

    <div id="aba-fila" class="aba-atendimento">
        <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-20"></main>
    </div>

    <div id="aba-estoque" class="aba-atendimento hidden">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-zinc-100">
            <h2 class="text-[#4b2c20] font-black mb-6 uppercase text-sm tracking-widest border-b pb-4">Controle de Disponibilidade</h2>
            <div id="lista-gestao-estoque" class="space-y-3"></div>
        </div>
    </div>

    <div id="secao-impressao" class="hidden"></div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const urlParams = new URLSearchParams(window.location.search);
        const PODE_IMPRIMIR = urlParams.get('print') === 'true';

        let pedidosImpressosLocal = JSON.parse(localStorage.getItem('pedidos_impressos')) || [];
        let dadosVendasLocal = {};

        function inicializar() {
            const badge = document.getElementById('badge-impressao');
            badge.innerHTML = PODE_IMPRIMIR 
                ? '<span class="bg-green-600 text-white text-[10px] px-4 py-1 rounded-full font-black">🖨️ MODO IMPRESSORA ATIVO</span>' 
                : '<span class="bg-zinc-400 text-white text-[10px] px-4 py-1 rounded-full font-black">👁️ APENAS TELA</span>';
            
            monitorar();
            setInterval(monitorar, 8000); 
        }

        async function monitorar() {
            try {
                const res = await fetch(DB_BASE + "vendas.json");
                const vendas = await res.json();
                if (!vendas) return;

                dadosVendasLocal = vendas; // Armazena para reimpressão
                const hoje = new Date().toLocaleDateString('pt-BR');
                const idsDoDia = Object.keys(vendas).filter(id => vendas[id].dataLocal === hoje);
                
                let novoPedido = false;
                for (let id of idsDoDia) {
                    if (!pedidosImpressosLocal.includes(id)) {
                        novoPedido = true;
                        if (PODE_IMPRIMIR) await imprimir(id, vendas[id]);
                        pedidosImpressosLocal.push(id);
                        localStorage.setItem('pedidos_impressos', JSON.stringify(pedidosImpressosLocal));
                    }
                }
                if(novoPedido) document.getElementById('som-alerta').play().catch(() => {});
                renderizarFila(vendas, idsDoDia);
                
                if (!document.getElementById('aba-estoque').classList.contains('hidden')) carregarEstoque();
            } catch (e) { console.error(e); }
        }

        function renderizarFila(vendas, ids) {
            const container = document.getElementById('lista-pedidos');
            const listaOrdenada = ids.sort((a, b) => {
                const ordem = { "pendente": 1, "preparo": 2, "pronto": 3 };
                return (ordem[vendas[a].status] || 1) - (ordem[vendas[b].status] || 1);
            });

            container.innerHTML = listaOrdenada.map(id => {
                const v = vendas[id];
                const status = v.status || "pendente";
                const corStatus = status === "pronto" ? "status-pronto" : (status === "preparo" ? "status-preparo" : "status-pendente");
                
                return `
                    <div class="bg-white p-6 rounded-[2rem] shadow-md ${corStatus}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="bg-zinc-900 text-white px-3 py-1 rounded-lg font-black text-xs">#${id.slice(-4)}</span>
                                <p class="text-[9px] font-black uppercase text-amber-600 mt-2">${status}</p>
                            </div>
                            <button onclick="reimprimir('${id}')" class="bg-zinc-100 hover:bg-zinc-200 p-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 transition-all">
                                🖨️ Re-imprimir
                            </button>
                        </div>
                        
                        <h2 class="text-xl font-black text-zinc-800 uppercase">${v.cliente}</h2>
                        <p class="text-[10px] font-bold text-zinc-400 mb-4 tracking-widest">${v.tipoEntrega === 'entrega' ? '🚚 ENTREGA' : '🛍️ RETIRADA'}</p>
                        
                        <div class="space-y-2 mb-6 border-y border-zinc-50 py-4">
                            ${v.itens.map(i => `<div class="flex justify-between text-sm font-bold text-zinc-700"><span>${i.qty}x ${i.nome}</span></div>`).join('')}
                        </div>

                        ${v.troco ? `<div class="mb-4 p-3 bg-amber-50 rounded-xl border border-amber-100 text-[10px] font-black text-amber-800">💸 LEVAR TROCO PARA R$ ${v.troco}</div>` : ''}

                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="atualizarStatus('${id}', 'preparo')" class="py-4 rounded-2xl font-black text-[10px] uppercase bg-blue-100 text-blue-700">👨‍🍳 Preparar</button>
                            <button onclick="atualizarStatus('${id}', 'pronto')" class="py-4 rounded-2xl font-black text-[10px] uppercase bg-green-600 text-white">✅ Pronto</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function carregarEstoque() {
            const res = await fetch(DB_BASE + "produtos.json");
            const prods = await res.json();
            const list = document.getElementById('lista-gestao-estoque');
            if(!prods) return;

            list.innerHTML = Object.keys(prods).map(id => {
                const p = prods[id];
                const isPausado = p.pausado === true;
                return `
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl border ${isPausado ? 'border-red-100 bg-red-50' : 'border-zinc-100'}">
                        <div class="flex items-center gap-3 text-left">
                            <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg ${isPausado ? 'grayscale' : ''}">
                            <span class="text-xs font-black uppercase ${isPausado ? 'text-red-400' : 'text-zinc-700'}">${p.nome}</span>
                        </div>
                        <button onclick="toggleEstoque('${id}', ${isPausado})" class="px-5 py-2 rounded-xl font-black text-[9px] uppercase transition-all ${isPausado ? 'bg-green-600 text-white' : 'bg-red-500 text-white'}">
                            ${isPausado ? 'Ativar' : 'Pausar'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function toggleEstoque(id, statusAtual) {
            await fetch(`${DB_BASE}produtos/${id}/pausado.json`, { method: 'PUT', body: JSON.stringify(!statusAtual) });
            carregarEstoque();
        }

        async function atualizarStatus(id, novoStatus) {
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify(novoStatus) });
            monitorar();
        }

        function reimprimir(id) {
            const pedido = dadosVendasLocal[id];
            if(pedido) imprimir(id, pedido);
        }

        async function imprimir(id, v) {
            const num = id.slice(-4);
            const area = document.getElementById('secao-impressao');
            const subtotal = v.itens.reduce((acc, i) => acc + (i.preco * i.qty), 0);
            
            area.innerHTML = `
                <div class="quebra-pagina">
                    <center><h2>POINT DO CAFÉ</h2><p>COZINHA - PEDIDO #${num}</p></center><hr>
                    <b>CLIENTE: ${v.cliente}</b><br>
                    TIPO: ${v.tipoEntrega === 'entrega' ? 'ENTREGA' : 'RETIRADA'}<br><hr>
                    ${v.itens.map(i => `<b>${i.qty}x</b> ${i.nome}`).join('<br>')}<hr>
                    ${v.obs ? `OBS: ${v.obs}` : ''}
                </div>
                <div>
                    <center><h2>POINT DO CAFÉ</h2><p>ENTREGA/CLIENTE - #${num}</p></center><hr>
                    CLIENTE: ${v.cliente}<br>
                    PGTO: ${v.pagamento}<br>
                    END: ${v.endereco || 'Retirada'}<br>
                    ${v.troco ? `<b>TROCO PARA: R$ ${v.troco}</b><br>` : ''}<hr>
                    <b>TOTAL: R$ ${v.total.toFixed(2)}</b>
                </div>
            `;
            window.print();
        }

        function mudarAba(abaId) {
            document.querySelectorAll('.aba-atendimento').forEach(a => a.classList.add('hidden'));
            document.getElementById(abaId).classList.remove('hidden');
            
            const btnFila = document.getElementById('btn-fila');
            const btnEstoque = document.getElementById('btn-estoque');

            if(abaId === 'aba-estoque') {
                btnEstoque.className = "flex-1 py-4 rounded-xl font-black uppercase text-[10px] bg-zinc-800 text-white transition-all";
                btnFila.className = "flex-1 py-4 rounded-xl font-black uppercase text-[10px] text-zinc-500 transition-all";
                carregarEstoque();
            } else {
                btnFila.className = "flex-1 py-4 rounded-xl font-black uppercase text-[10px] bg-zinc-800 text-white transition-all";
                btnEstoque.className = "flex-1 py-4 rounded-xl font-black uppercase text-[10px] text-zinc-500 transition-all";
            }
        }

        inicializar();
    </script>
</body>
</html>
