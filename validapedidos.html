<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Pedidos - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-zinc-50 pb-20">

    <div class="max-w-md mx-auto p-4">
        <header class="text-center py-10">
            <h1 class="text-3xl font-black italic text-amber-900">VALIDAÇÃO POINT</h1>
            <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Ambiente de Testes</p>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-zinc-100">
            <h2 class="font-black uppercase text-xs mb-4 text-zinc-400">Itens no Carrinho (Simulação)</h2>
            <div id="lista-itens-teste" class="space-y-2">
                <div class="flex justify-between font-bold text-sm">
                    <span>2x Café Expresso</span>
                    <span>R$ 25,00</span>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl border-t-8 border-amber-600">
            <h2 class="text-xl font-black mb-6 uppercase tracking-tighter">Finalizar Pedido</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase ml-2 text-zinc-400">Seu Nome</label>
                    <input type="text" id="c-nome" placeholder="Ex: João Silva" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold">
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase ml-2 text-zinc-400">Forma de Recebimento</label>
                    <select id="c-entrega" onchange="atualizarInterfaceTotal()" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-amber-900">
                        <option value="retirada">🛍️ Vou retirar no local (Grátis)</option>
                        <option value="entrega">🚚 Quero Entrega (+ R$ 5,00)</option>
                    </select>
                </div>

                <div id="area-endereco">
                    <label class="text-[10px] font-black uppercase ml-2 text-zinc-400">Endereço de Entrega</label>
                    <input type="text" id="c-endereco" placeholder="Rua, Número, Bairro" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none">
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase ml-2 text-zinc-400">Forma de Pagamento</label>
                    <select id="c-pgto" onchange="verificarTroco()" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-amber-900">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão (Maquininha)</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>

                <div id="div-troco" class="hidden">
                    <label class="text-[10px] font-black uppercase ml-2 text-amber-600">Troco para quanto?</label>
                    <input type="number" id="c-troco" placeholder="Ex: 50" class="w-full p-4 bg-amber-50 border-2 border-amber-200 rounded-2xl outline-none font-bold">
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase ml-2 text-zinc-400">Observações</label>
                    <textarea id="c-obs" placeholder="Ex: Sem açúcar, tirar gelo..." class="w-full p-4 bg-zinc-100 rounded-2xl outline-none text-sm h-20"></textarea>
                </div>

                <div class="py-4 border-t border-zinc-100 mt-6">
                    <div class="flex justify-between text-zinc-400 text-xs font-bold uppercase">
                        <span>Subtotal:</span>
                        <span id="resumo-subtotal">R$ 25,00</span>
                    </div>
                    <div class="flex justify-between text-zinc-400 text-xs font-bold uppercase mt-1">
                        <span>Taxa de Entrega:</span>
                        <span id="resumo-taxa">R$ 0,00</span>
                    </div>
                    <div class="flex justify-between font-black text-xl text-zinc-800 mt-2">
                        <span>TOTAL:</span>
                        <span id="total-final" class="text-amber-600">R$ 25,00</span>
                    </div>
                </div>

                <button onclick="processarTeste()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-black uppercase shadow-lg shadow-green-200 hover:scale-95 transition-all">
                    Confirmar Pedido Teste
                </button>
            </div>
        </div>
    </div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        
        // Simulação de valores para o teste
        let valorProdutosNoCarrinho = 25.00; 

        function atualizarInterfaceTotal() {
            const tipoEntrega = document.getElementById('c-entrega').value;
            const taxa = tipoEntrega === 'entrega' ? 5.00 : 0.00;
            const total = valorProdutosNoCarrinho + taxa;

            document.getElementById('resumo-taxa').innerText = `R$ ${taxa.toFixed(2)}`;
            document.getElementById('total-final').innerText = `R$ ${total.toFixed(2)}`;
            
            // Esconder endereço se for retirada
            document.getElementById('area-endereco').style.opacity = tipoEntrega === 'entrega' ? '1' : '0.5';
            
            return total;
        }

        function verificarTroco() {
            const pgto = document.getElementById('c-pgto').value;
            const divTroco = document.getElementById('div-troco');
            divTroco.classList.toggle('hidden', pgto !== 'Dinheiro');
        }

        async function processarTeste() {
            const nome = document.getElementById('c-nome').value;
            if(!nome) return alert("Digite o nome para o teste!");

            const idVenda = Date.now();
            const totalFinal = atualizarInterfaceTotal();
            
            const dadosPedido = {
                cliente: nome,
                endereco: document.getElementById('c-endereco').value,
                pagamento: document.getElementById('c-pgto').value,
                troco: document.getElementById('c-troco').value || null,
                tipoEntrega: document.getElementById('c-entrega').value,
                obs: document.getElementById('c-obs').value,
                total: totalFinal,
                status: "pendente",
                dataLocal: new Date().toLocaleDateString('pt-BR'),
                itens: [
                    {nome: "Café Expresso (TESTE)", qty: 2, preco: 12.50}
                ]
            };

            try {
                // Salva no Firebase
                await fetch(`${DB_BASE}vendas/${idVenda}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(dadosPedido)
                });

                alert("Sucesso! O pedido apareceu no Atendimento? Vamos para a tela de Status.");
                
                // Vai para a página de status
                window.location.href = `status.html?id=${idVenda}`;
                
            } catch (error) {
                console.error(error);
                alert("Erro ao conectar com Firebase. Verifique o link do banco.");
            }
        }

        // Inicia o total ao abrir a página
        atualizarInterfaceTotal();
    </script>
</body>
</html>
