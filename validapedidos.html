<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cart-float { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-800">

    <header class="bg-white pt-10 pb-8 px-4 text-center border-b-8 border-[#d97706] shadow-md">
        <div id="logo-header" class="w-24 h-24 bg-zinc-50 mx-auto rounded-full mb-4 overflow-hidden border-4 border-[#f3e8d2] flex items-center justify-center">
            <img id="img-logo" src="" class="hidden w-full h-full object-cover">
            <span id="placeholder-logo" class="text-[10px] font-bold text-zinc-300 uppercase italic">Point do Café</span>
        </div>
        <h1 class="text-3xl font-black text-[#4b2c20] uppercase tracking-tighter italic">Point do Café</h1>
    </header>

    <main id="etapa-cardapio" class="max-w-md mx-auto p-4 pb-32">
        <div id="categorias-container" class="space-y-8">
            <div class="text-center py-20">
                <div class="animate-spin inline-block w-10 h-10 border-4 border-[#d97706] border-t-transparent rounded-full"></div>
                <p class="text-xs font-bold text-zinc-400 mt-4 uppercase">Carregando Cardápio...</p>
            </div>
        </div>
    </main>

    <div id="cart-bar" class="hidden fixed bottom-8 left-0 right-0 px-6 z-40">
        <button onclick="irParaCheckout()" class="cart-float w-full max-w-md mx-auto bg-[#22c55e] text-white py-6 rounded-[2rem] font-black uppercase text-sm shadow-xl flex justify-between px-10 items-center">
            <div class="flex items-center gap-3">
                <span class="bg-[#166534] px-3 py-1 rounded-full text-[10px]" id="cart-count">0</span>
                <span>Ver Pedido</span>
            </div>
            <span id="cart-total-bar">R$ 0,00</span>
        </button>
    </div>

    <div id="etapa-checkout" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto p-6">
        <div class="max-w-md mx-auto">
            <button onclick="voltarParaCardapio()" class="text-[#d97706] font-black text-xs uppercase mb-6 flex items-center gap-2">⬅️ Voltar ao Cardápio</button>
            <h2 class="text-2xl font-black text-[#4b2c20] uppercase mb-8 tracking-tighter">Finalizar Pedido</h2>
            
            <div class="space-y-6">
                <input type="text" id="c-nome" placeholder="Seu Nome" class="w-full p-5 bg-zinc-100 rounded-2xl outline-none font-bold">
                
                <select id="c-entrega" onchange="recalcularResumo()" class="w-full p-5 bg-zinc-100 rounded-2xl outline-none font-bold text-[#d97706]">
                    <option value="consumo_local">🍽️ Comer no local (Grátis)</option>
                    <option value="retirada">🛍️ Vou retirar / Marmita (Grátis)</option>
                    <option value="entrega">🚚 Quero Entrega (+ R$ 5,00)</option>
                </select>

                <div id="div-endereco" class="hidden">
                    <input type="text" id="c-endereco" placeholder="Endereço Completo" class="w-full p-5 bg-zinc-100 rounded-2xl outline-none">
                </div>
                
                <select id="c-pgto" onchange="verificarTroco()" class="w-full p-5 bg-zinc-100 rounded-2xl outline-none font-bold text-[#d97706]">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão na Entrega / Balcão</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
                
                <div id="div-troco" class="hidden">
                    <input type="number" id="c-troco" placeholder="Troco para quanto?" class="w-full p-5 bg-amber-50 border-2 border-amber-200 rounded-2xl outline-none font-bold">
                </div>
                
                <textarea id="c-obs" placeholder="Alguma observação? (Ex: Ponto da carne, sem cebola, etc.)" class="w-full p-5 bg-zinc-100 rounded-2xl outline-none text-sm h-24"></textarea>

                <div class="p-8 bg-zinc-50 rounded-[2rem] border border-zinc-100">
                    <div class="flex justify-between font-black text-2xl text-[#4b2c20]">
                        <span>TOTAL:</span>
                        <span id="resumo-total">R$ 0,00</span>
                    </div>
                </div>
                <button onclick="confirmarPedidoFinal()" class="w-full bg-[#22c55e] text-white py-6 rounded-[2rem] font-black uppercase shadow-xl">Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const diaHoje = new Date().getDay().toString(); // 0-Dom, 1-Seg, etc.
        let produtosLocal = [];

        async function init() {
            await carregarLogo();
            await loadMenu();
        }

        async function carregarLogo() {
            try {
                const res = await fetch(DB_BASE + "configuracao/logo.json");
                const logo = await res.json();
                if(logo) {
                    document.getElementById('img-logo').src = logo;
                    document.getElementById('img-logo').classList.remove('hidden');
                    document.getElementById('placeholder-logo').classList.add('hidden');
                }
            } catch(e) {}
        }

        async function loadMenu() {
            try {
                const [resProd, resCat] = await Promise.all([
                    fetch(DB_BASE + "produtos.json"),
                    fetch(DB_BASE + "categorias.json")
                ]);
                
                const dataProd = await resProd.json();
                const categoriasOrder = await resCat.json() || [];
                
                if(!dataProd) return;

                produtosLocal = Object.keys(dataProd).map(key => ({ id: key, ...dataProd[key], qty: 0 }))
                    .filter(p => {
                        const naoPausado = p.pausado !== true;
                        const disponivelHoje = !p.dias || p.dias.length === 0 || p.dias.includes(diaHoje);
                        return naoPausado && disponivelHoje;
                    });

                let html = "";

                categoriasOrder.forEach(catNome => {
                    const itensDaCategoria = produtosLocal.filter(p => p.categoria === catNome);
                    
                    if(itensDaCategoria.length > 0) {
                        html += `
                        <div class="mb-10">
                            <h2 class="text-[11px] font-black uppercase text-[#d97706] tracking-[3px] mb-6 flex items-center gap-4">
                                ${catNome} <span class="h-[1px] bg-zinc-200 flex-1"></span>
                            </h2>
                            <div class="grid gap-4">
                                ${itensDaCategoria.map(p => `
                                    <div class="bg-white p-4 rounded-[1.8rem] shadow-sm border border-zinc-100 flex items-center gap-4">
                                        <img src="${p.img}" class="w-20 h-20 object-cover rounded-2xl shadow-inner bg-zinc-50">
                                        <div class="flex-1">
                                            <h3 class="font-bold text-sm text-[#4b2c20] leading-tight mb-1">${p.nome}</h3>
                                            <p class="text-[10px] text-zinc-400 mb-2 line-clamp-1">${p.descricao || ''}</p>
                                            <span class="text-[#22c55e] font-black text-sm">R$ ${(p.precoPromo || p.preco).toFixed(2)}</span>
                                        </div>
                                        <div class="flex items-center gap-2 bg-zinc-50 p-1 rounded-2xl border border-zinc-100">
                                            <button onclick="updateQty('${p.id}', -1)" class="w-8 h-8 font-black text-zinc-300">-</button>
                                            <span id="qty-${p.id}" class="font-black text-xs w-4 text-center">0</span>
                                            <button onclick="updateQty('${p.id}', 1)" class="w-8 h-8 font-black text-[#d97706]">+</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                    }
                });

                document.getElementById('categorias-container').innerHTML = html || '<p class="text-center text-zinc-400 font-bold py-10">Nenhum produto disponível hoje.</p>';
            } catch(e) { console.error("Erro ao carregar cardápio:", e); }
        }

        function updateQty(id, delta) {
            const p = produtosLocal.find(x => x.id === id);
            if(!p) return;
            p.qty = Math.max(0, p.qty + delta);
            document.getElementById(`qty-${id}`).innerText = p.qty;
            
            const totalItens = produtosLocal.reduce((acc, x) => acc + x.qty, 0);
            const totalValor = produtosLocal.reduce((acc, x) => acc + (x.qty * (x.precoPromo || x.preco)), 0);
            
            const bar = document.getElementById('cart-bar');
            if(totalItens > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-count').innerText = totalItens;
                document.getElementById('cart-total-bar').innerText = `R$ ${totalValor.toFixed(2)}`;
            } else {
                bar.classList.add('hidden');
            }
        }

        function irParaCheckout() {
            document.getElementById('etapa-cardapio').classList.add('hidden');
            document.getElementById('cart-bar').classList.add('hidden');
            document.getElementById('etapa-checkout').classList.remove('hidden');
            recalcularResumo();
            window.scrollTo(0,0);
        }

        function voltarParaCardapio() {
            document.getElementById('etapa-checkout').classList.add('hidden');
            document.getElementById('etapa-cardapio').classList.remove('hidden');
            document.getElementById('cart-bar').classList.remove('hidden');
        }

        function recalcularResumo() {
            const subtotal = produtosLocal.reduce((acc, x) => acc + (x.qty * (x.precoPromo || x.preco)), 0);
            const tipoEntrega = document.getElementById('c-entrega').value;
            const taxa = tipoEntrega === 'entrega' ? 5.00 : 0.00;
            const total = subtotal + taxa;

            document.getElementById('resumo-total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('div-endereco').classList.toggle('hidden', tipoEntrega !== 'entrega');
        }

        function verificarTroco() {
            const pgto = document.getElementById('c-pgto').value;
            document.getElementById('div-troco').classList.toggle('hidden', pgto !== 'Dinheiro');
        }

        async function confirmarPedidoFinal() {
            const nome = document.getElementById('c-nome').value;
            if(!nome) return alert("Por favor, informe seu nome!");

            const idVenda = Date.now();
            const itensSelecionados = produtosLocal.filter(p => p.qty > 0).map(p => ({
                nome: p.nome,
                qty: p.qty,
                preco: (p.precoPromo || p.preco)
            }));

            const subtotal = itensSelecionados.reduce((acc, i) => acc + (i.preco * i.qty), 0);
            const tipoEntrega = document.getElementById('c-entrega').value;
            const taxa = tipoEntrega === 'entrega' ? 5.00 : 0.00;
            const total = subtotal + taxa;

            // Define o rótulo legível baseado na escolha de consumo
            let textoOpcaoConsumo = "🛍️ Retirada / Marmita";
            if (tipoEntrega === 'consumo_local') textoOpcaoConsumo = "🍽️ Comer no local";
            if (tipoEntrega === 'entrega') textoOpcaoConsumo = "🚚 Entrega a domicílio";

            const pedido = {
                cliente: nome,
                endereco: tipoEntrega === 'entrega' ? document.getElementById('c-endereco').value : textoOpcaoConsumo,
                pagamento: document.getElementById('c-pgto').value,
                troco: document.getElementById('c-troco').value || null,
                tipoEntrega: tipoEntrega,
                obs: document.getElementById('c-obs').value,
                total: total,
                status: "pendente",
                dataLocal: new Date().toLocaleDateString('pt-BR'),
                itens: itensSelecionados
            };

            // 1. Salva no banco de dados (Firebase)
            await fetch(`${DB_BASE}vendas/${idVenda}.json`, { method: 'PUT', body: JSON.stringify(pedido) });

            // 2. Monta o texto do resumo estruturado para o WhatsApp
            let textoWhats = `*☕ NOVO PEDIDO - Point do Café*\n`;
            textoWhats += `*Pedido Nº:* ${idVenda}\n`;
            textoWhats += `-----------------------------------\n\n`;
            textoWhats += `👤 *Cliente:* ${pedido.cliente}\n\n`;
            
            textoWhats += `🛒 *Itens do Pedido:*\n`;
            pedido.itens.forEach(item => {
                textoWhats += `• ${item.qty}x ${item.nome} (R$ ${(item.preco * item.qty).toFixed(2)})\n`;
            });
            textoWhats += `\n`;

            textoWhats += `📦 *Opção de Consumo:* ${textoOpcaoConsumo}\n`;
            if (pedido.tipoEntrega === 'entrega') {
                textoWhats += `📍 *Endereço:* ${pedido.endereco}\n`;
            }
            
            textoWhats += `💳 *Forma de Pagamento:* ${pedido.pagamento}\n`;
            if (pedido.pagamento === 'Dinheiro' && pedido.troco) {
                textoWhats += `💵 *Troco para:* R$ ${parseFloat(pedido.troco).toFixed(2)}\n`;
            }

            if (pedido.obs) {
                textoWhats += `📝 *Obs:* ${pedido.obs}\n`;
            }

            textoWhats += `\n-----------------------------------\n`;
            textoWhats += `💰 *Subtotal:* R$ ${subtotal.toFixed(2)}\n`;
            if (taxa > 0) textoWhats += `🛵 *Taxa de Entrega:* R$ ${taxa.toFixed(2)}\n`;
            textoWhats += `*TOTAL: R$ ${total.toFixed(2)}*\n`;

            // 3. WhatsApp da Loja configurado
            const numeroLoja = "5561999521964"; 
            
            const urlWhats = `https://api.whatsapp.com/send?phone=${numeroLoja}&text=${encodeURIComponent(textoWhats)}`;
            
            // Abre o WhatsApp e depois encaminha o cliente para a tela de status
            window.open(urlWhats, '_blank');
            window.location.href = `status.html?id=${idVenda}`;
        }

        init();
    </script>
</body>
</html>
