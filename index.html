<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point do Café - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 pb-24 font-sans">
    <header class="bg-white p-8 shadow-sm mb-6 text-center border-b-4 border-amber-600">
        <h1 class="text-3xl font-black text-amber-900">☕ POINT DO CAFÉ</h1>
        <p class="text-amber-700 font-medium">O melhor café da região</p>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-8">
        <div class="text-center py-10 text-amber-900">Carregando delícias...</div>
    </main>

    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 hidden">
        <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-bold flex justify-between px-8 border-4 border-white items-center hover:bg-green-700 transition-all">
            <span class="flex items-center gap-2">🛒 Enviar Pedido</span>
            <span id="cart-count" class="bg-white text-green-700 px-2 py-1 rounded-full text-xs">0</span>
        </button>
    </div>

    <script>
        // SUBSTITUA ABAIXO PELA SUA URL DO FIREBASE
        const DB_URL = "https://pointdocafe-default-rtdb.firebaseio.com/produtos.json";
		const WHATSAPP = "5561999521964";;
        let carrinho = [];

        async function loadMenu() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                const container = document.getElementById('categorias-container');
                
                if (!data) {
                    container.innerHTML = "<p class='text-center'>Nenhum item disponível no momento.</p>";
                    return;
                }

                const produtos = Object.values(data);
                const cats = [...new Set(produtos.map(p => p.categoria))];
                
                container.innerHTML = cats.map(cat => `
                    <section>
                        <h2 class="text-xl font-bold mb-4 text-amber-900 border-b-2 border-amber-200 pb-2 uppercase tracking-widest text-sm">${cat}</h2>
                        <div class="space-y-4">
                            ${produtos.filter(p => p.categoria === cat).map(p => `
                                <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center gap-4 border border-amber-100">
                                    <img src="${p.img}" class="w-20 h-20 object-cover rounded-xl bg-amber-100" onerror="this.src='https://via.placeholder.com/150?text=Cafe'">
                                    <div class="flex-1">
                                        <h3 class="font-bold text-amber-900">${p.nome}</h3>
                                        <p class="text-green-700 font-black">R$ ${p.preco.toFixed(2)}</p>
                                    </div>
                                    <button onclick="addToCart('${p.nome}', ${p.preco})" class="bg-amber-100 text-amber-900 w-10 h-10 rounded-full font-bold text-xl hover:bg-amber-600 hover:text-white transition-colors">＋</button>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `).join('');
            } catch (e) {
                console.error("Erro ao carregar:", e);
            }
        }

        function addToCart(nome, preco) {
            carrinho.push({nome, preco});
            document.getElementById('cart-float').classList.remove('hidden');
            document.getElementById('cart-count').innerText = carrinho.length;
        }

        function enviarWhatsApp() {
            const nomeCliente = prompt("Qual seu nome?");
            if(!nomeCliente) return;

            let msg = `*☕ POINT DO CAFÉ - NOVO PEDIDO*\n`;
            msg += `*Cliente:* ${nomeCliente}\n`;
            msg += `------------------------------\n`;
            let total = 0;
            carrinho.forEach(i => {
                msg += `• ${i.nome}: R$ ${i.preco.toFixed(2)}\n`;
                total += i.preco;
            });
            msg += `------------------------------\n`;
            msg += `*TOTAL: R$ ${total.toFixed(2)}*`;
            
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
        }

        loadMenu();
    </script>
</body>
</html>
