<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point do Café - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-open { overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</head>
<body class="bg-amber-50 pb-24 font-sans text-gray-900">
    <header class="bg-white p-8 shadow-sm mb-6 text-center border-b-4 border-amber-600">
        <h1 class="text-3xl font-black text-amber-900 leading-none">☕ POINT DO CAFÉ</h1>
        <p class="text-amber-700 font-medium text-sm mt-2">Peça agora e receba em casa</p>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-8">
        <div class="text-center py-10 text-amber-900 animate-pulse">Carregando cardápio...</div>
    </main>

    <!-- Botão Flutuante -->
    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 hidden">
        <button onclick="abrirCheckout()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-bold flex justify-between px-8 border-4 border-white items-center hover:scale-105 transition-transform">
            <span>🛒 Finalizar Pedido</span>
            <span id="cart-count" class="bg-white text-green-700 px-2 py-1 rounded-full text-xs font-black">0</span>
        </button>
    </div>

    <!-- Modal de Checkout -->
    <div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center text-left">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[95vh] shadow-2xl">
            <h2 class="text-2xl font-black mb-4 text-amber-900 border-b pb-2 text-center">Resumo do Pedido</h2>
            
            <div id="resumo-itens" class="mb-6 space-y-2 max-h-40 overflow-y-auto bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300">
                <!-- Preenchido via JS -->
            </div>

            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase">Seu Nome *</label>
                    <input type="text" id="cli-nome" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 border-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase">Endereço ou Retirada *</label>
                    <input type="text" id="cli-end" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 border-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase">Ponto de Referência (Opcional)</label>
                    <input type="text" id="cli-ref" placeholder="Perto de onde?" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 border-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase">Pagamento</label>
                        <select id="cli-pgto" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 border-none">
                            <option value="Pix">Pix</option>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Débito">Débito</option>
                            <option value="Crédito">Crédito</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase">Observações</label>
                        <input type="text" id="cli-obs" placeholder="Ex: Sem gelo" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 border-none">
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <div class="flex justify-between text-2xl font-black text-amber-900 mb-6">
                        <span>Total:</span>
                        <span id="checkout-total">R$ 0,00</span>
                    </div>
                    <button onclick="enviarPedidoFinal()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-green-700 transition-all uppercase">
                        ✅ Confirmar no WhatsApp
                    </button>
                    <button onclick="fecharCheckout()" class="w-full text-gray-400 font-bold py-2 mt-2 text-sm">Voltar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://pointdocafe-default-rtdb.firebaseio.com/produtos.json";
        const WHATSAPP = "5561999521964";
        let carrinho = [];
        const diaHoje = new Date().getDay().toString();

        async function loadMenu() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                const container = document.getElementById('categorias-container');
                if (!data) { container.innerHTML = "O cardápio está vazio."; return; }

                const produtos = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                const pratosDoDia = produtos.filter(p => p.dias && p.dias.includes(diaHoje));
                const outrosProdutos = produtos.filter(p => !p.dias || !p.dias.includes(diaHoje));

                let html = "";
                if (pratosDoDia.length > 0) html += renderSection("⭐ Sugestão de Hoje", pratosDoDia);
                
                const categorias = ["Combos do dia", "Bebidas", "Salgados", "Bombonieries", "Comum"];
                categorias.forEach(cat => {
                    const itensNaCat = outrosProdutos.filter(p => p.categoria === cat);
                    if (itensNaCat.length > 0) html += renderSection(cat, itensNaCat);
                });

                container.innerHTML = html;
            } catch (e) { container.innerHTML = "Erro de conexão."; }
        }

        function renderSection(titulo, itens) {
            return `
                <section>
                    <h2 class="text-sm font-black mb-4 text-amber-900 border-b-2 border-amber-200 pb-1 uppercase tracking-widest">${titulo}</h2>
                    <div class="space-y-4">
                        ${itens.map(p => `
                            <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center gap-4 border border-amber-100">
                                <img src="${p.img}" class="w-20 h-20 object-cover rounded-xl bg-amber-50">
                                <div class="flex-1">
                                    <h3 class="font-bold text-amber-900 text-sm leading-tight">${p.nome}</h3>
                                    <p class="text-green-700 font-black mt-1">R$ ${p.preco.toFixed(2)}</p>
                                    
                                    <!-- Controle de Quantidade -->
                                    <div class="flex items-center gap-2 mt-2">
                                        <button onclick="changeQty('${p.id}', -1)" class="w-6 h-6 bg-gray-200 rounded-full font-bold text-xs">-</button>
                                        <span id="qty-${p.id}" class="text-xs font-bold">1</span>
                                        <button onclick="changeQty('${p.id}', 1)" class="w-6 h-6 bg-gray-200 rounded-full font-bold text-xs">+</button>
                                    </div>
                                </div>
                                <button onclick="addToCart('${p.id}', '${p.nome}', ${p.preco})" class="bg-amber-100 text-amber-900 px-3 py-2 rounded-xl font-black text-xs uppercase hover:bg-amber-600 hover:text-white transition-all">Add</button>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
        }

        function changeQty(id, delta) {
            const el = document.getElementById(`qty-${id}`);
            let current = parseInt(el.innerText);
            current = Math.max(1, current + delta);
            el.innerText = current;
        }

        function addToCart(id, nome, preco) {
            const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
            carrinho.push({ nome, preco, qty });
            
            // Resetar visor de quantidade após adicionar
            document.getElementById(`qty-${id}`).innerText = "1";
            
            atualizarBotaoFlutuante();
        }

        function atualizarBotaoFlutuante() {
            document.getElementById('cart-float').classList.remove('hidden');
            const totalItens = carrinho.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalItens;
        }

        function abrirCheckout() {
            const modal = document.getElementById('modal-checkout');
            const resumoContainer = document.getElementById('resumo-itens');
            modal.classList.remove('hidden');
            document.body.classList.add('modal-open');

            let resumoHtml = "";
            let total = 0;
            carrinho.forEach((item, index) => {
                const subtotal = item.preco * item.qty;
                resumoHtml += `
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-gray-600">${item.qty}x ${item.nome}</span>
                        <span class="font-bold text-amber-900">R$ ${subtotal.toFixed(2)}</span>
                    </div>`;
                total += subtotal;
            });

            resumoContainer.innerHTML = resumoHtml;
            document.getElementById('checkout-total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function fecharCheckout() {
            document.getElementById('modal-checkout').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        function enviarPedidoFinal() {
            const nome = document.getElementById('cli-nome').value;
            const end = document.getElementById('cli-end').value;
            const ref = document.getElementById('cli-ref').value;
            const pgto = document.getElementById('cli-pgto').value;
            const obs = document.getElementById('cli-obs').value;

            if(!nome || !end) return alert("Preencha Nome e Endereço!");

            let msg = `*☕ POINT DO CAFÉ - NOVO PEDIDO*\n`;
            msg += `------------------------------\n`;
            msg += `*Cliente:* ${nome}\n`;
            msg += `*Endereço:* ${end}\n`;
            if(ref) msg += `*Referência:* ${ref}\n`;
            msg += `*Pagamento:* ${pgto}\n`;
            if(obs) msg += `*Obs:* ${obs}\n`;
            msg += `------------------------------\n`;
            
            let total = 0;
            carrinho.forEach((item) => {
                const sub = item.preco * item.qty;
                msg += `• ${item.qty}x ${item.nome} - R$ ${sub.toFixed(2)}\n`;
                total += sub;
            });
            
            msg += `------------------------------\n`;
            msg += `*TOTAL: R$ ${total.toFixed(2)}*`;

            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
        }

        loadMenu();
    </script>
</body>
</html>
