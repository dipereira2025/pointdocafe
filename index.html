<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point do Café - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 pb-24 font-sans text-gray-900">
    
    <header class="bg-white p-6 shadow-sm mb-6 flex flex-col items-center border-b-4 border-amber-600">
        <!-- ÁREA DA LOGO DINÂMICA -->
        <div id="logo-container" class="w-24 h-24 mb-3 hidden">
            <img id="loja-logo" class="w-full h-full object-contain rounded-full">
        </div>
        <h1 id="loja-nome" class="text-2xl font-black text-amber-900 uppercase">Point do Café</h1>
        <p class="text-amber-700 font-medium text-xs mt-1">O seu café, do seu jeito.</p>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-8">
        <div class="text-center py-10 text-amber-900 animate-pulse text-sm">Preparando ambiente...</div>
    </main>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const DB_URL = DB_BASE + "produtos.json";
        const LOGO_URL = DB_BASE + "configuracao/logo.json";

        async function inicializar() {
            await carregarConfiguracao();
            await loadMenu();
        }

        async function carregarConfiguracao() {
            try {
                const res = await fetch(LOGO_URL);
                const logo = await res.json();
                if(logo) {
                    document.getElementById('loja-logo').src = logo;
                    document.getElementById('logo-container').classList.remove('hidden');
                    // Opcional: Esconde o texto se tiver logo, ou mantém os dois
                    // document.getElementById('loja-nome').classList.add('sr-only'); 
                }
            } catch (e) { console.log("Sem logo personalizada."); }
        }

        // ... (Restante das funções de loadMenu e Carrinho que já temos) ...

        inicializar();
    </script>
</body>
</html>
