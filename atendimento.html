<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Automático - DPTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Otimização para Impressoras Térmicas/Matriciais */
        @media print {
            body * { display: none !important; }
            #secao-impressao, #secao-impressao * { display: block !important; }
            #secao-impressao { 
                width: 72mm; 
                font-family: 'Courier New', monospace; 
                font-size: 12pt; 
                line-height: 1.2;
                margin: 0;
                padding: 0;
            }
        }
        .bg-card { background-color: #ffffff; }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">

    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <div class="flex items-center gap-4">
            <!-- Logo Dinâmica -->
            <div id="logo-container" class="w-16 h-16 hidden">
                <img id="loja-logo" class="w-full h-full object-contain rounded-full border border-zinc-100 shadow-sm">
            </div>
            <div>
                <h1 class="text-xl font-black text-zinc-800 uppercase italic">Terminal Atendimento</h1>
                <p id="status-rede" class="text-[9px] text-green-600 font-bold uppercase tracking-widest">● Monitorando Pedidos...</p>
            </div>
        </div>
        <div class="text-right hidden sm:block">
            <p id="hora-atual" class="font-bold text-zinc-400 text-xs"></p>
            <p class="text-[8px] text-zinc-300 font-black uppercase">DPTech Solutions</p>
        </div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4"></main>

    <!-- Área de Impressão Oculta -->
    <div id="secao-impressao" class="hidden"></div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let pedidosImpressos = JSON.parse(localStorage.getItem('pedidos_impressos')) || [];

        async function inicializar() {
            await carregarLogo();
            monitorar();
            // Atualiza hora e monitora a cada 10 segundos
            setInterval(() => {
                const agora = new Date();
                document.getElementById('hora-atual').innerText = agora.toLocaleTimeString('pt-BR');
                monitorar();
            }, 10000);
        }

        async function carregarLogo() {
            try {
                const res = await fetch(DB_BASE + "configuracao/logo.json");
                const logo = await res.json();
                if(logo) {
                    const imgEl = document.getElementById('loja-logo');
                    imgEl.src = logo;
                    document.getElementById('logo-container').classList.remove('hidden');
                }
            } catch (e) { console.log("Erro ao carregar logo."); }
        }

        async function monitorar() {
            try {
                const res = await fetch(DB_BASE + "vendas.json");
                const vendas = await res.json();
                if (!vendas) return;

                const container = document.getElementById('lista-pedidos');
                const hoje = new Date().toLocaleDateString('pt-BR');
                const ids = Object.keys(vendas).filter(id => vendas[id].dataLocal === hoje).reverse();

                let html = "";
                for (let id of ids) {
                    const v = vendas[id];
                    const numPedido = id.slice(-4); 

                    // AUTO-PRINT para novos pedidos
                    if (!pedidosImpressos.includes(id)) {
                        await imprimir(id, v);
                    }

                    html += `
                        <div class="bg-card p-6 rounded-3xl shadow-sm border-2 ${pedidosImpressos.includes(id) ? 'border-zinc-100' : 'border-green-500 animate-pulse'}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black text-xl">#${numPedido}</span>
                                <span class="text-xs font-bold text-zinc-400">${new Date(v.data).toLocaleTimeString('pt-BR')}</span>
                            </div>
                            <h2 class="text-xl font-black text-zinc-800 uppercase mb-2">${v.cliente}</h2>
                            <div class="space-y-1 mb-4 text-lg">
                                ${v.itens.map(i => `<div class="border-b border-zinc-50 font-medium"><b>${i.qty}x</b> ${i.nome}</div>`).join('')}
                            </div>
                            <div class="flex justify-between items-center text-[10px] font-bold uppercase text-zinc-400">
                                <span>PAGAMENTO: ${v.pagamento}</span>
                                <button onclick="reimprimir('${id}')" class="bg-zinc-100 px-3 py-1 rounded-lg hover:bg-zinc-200">Reimprimir</button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (e) { console.error("Erro na busca:", e); }
        }

        async function imprimir(id, v) {
            const numPedido = id.slice(-4);
            const printArea = document.getElementById('secao-impressao');
            
            // Layout otimizado para a largura da Bematech (72mm/80mm)
            printArea.innerHTML = `
                <div style="text-align: center; text-transform: uppercase;">
                    <h2 style="margin:0;">POINT DO CAFE</h2>
                    <p style="margin:0; font-size: 18px;">PEDIDO #${numPedido}</p>
                    --------------------------------
                </div>
                <div style="margin: 10px 0; font-weight: bold;">
                    CLIENTE: ${v.cliente}<br>
                    HORA: ${new Date(v.data).toLocaleTimeString('pt-BR')}<br>
                    --------------------------------
                </div>
                <div style="font-size: 16px; font-weight: bold;">
                    ${v.itens.map(i => `${i.qty}x ${i.nome}`).join('<br>')}
                </div>
                --------------------------------<br>
                TOTAL: R$ ${v.total.toFixed(2)}<br>
                PGTO: ${v.pagamento}<br>
                ${v.observacao ? `OBS: ${v.observacao}` : ''}
                <div style="text-align: center; margin-top: 15px; font-size: 10px;">
                    DPTech - Terminal de Atendimento
                </div>
            `;

            window.print();

            if (!pedidosImpressos.includes(id)) {
                pedidosImpressos.push(id);
                localStorage.setItem('pedidos_impressos', JSON.stringify(pedidosImpressos));
            }
        }

        function reimprimir(id) {
            // Remove temporariamente para forçar a função imprimir
            pedidosImpressos = pedidosImpressos.filter(x => x !== id);
            monitorar();
        }

        inicializar();
    </script>
</body>
</html>
