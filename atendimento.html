<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento - DPTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #secao-impressao, #secao-impressao * { visibility: visible; }
            #secao-impressao { position: absolute; left: 0; top: 0; width: 80mm; font-family: 'Courier New', monospace; }
        }
        .pedido-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">

    <!-- Cabeçalho Simples -->
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm">
        <div>
            <h1 class="text-xl font-black text-zinc-800 uppercase tracking-tighter">Pedidos Ativos</h1>
            <p class="text-[10px] text-amber-600 font-bold uppercase">Painel de Operação</p>
        </div>
        <button onclick="location.reload()" class="bg-zinc-100 p-2 rounded-xl hover:bg-zinc-200 transition-all">
            🔄 Atualizar
        </button>
    </header>

    <!-- Lista de Pedidos -->
    <main id="lista-pedidos-operacao" class="max-w-2xl mx-auto space-y-4 pb-20">
        <div class="text-center py-20 text-zinc-400 text-sm">Buscando novos pedidos...</div>
    </main>

    <!-- Área Oculta para Impressão -->
    <div id="secao-impressao" class="hidden"></div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const VENDAS_URL = DB_BASE + "vendas.json";

        async function carregarPedidos() {
            try {
                const res = await fetch(VENDAS_URL);
                const vendas = await res.json();
                const container = document.getElementById('lista-pedidos-operacao');
                const hoje = new Date().toLocaleDateString('pt-BR');

                if (!vendas) {
                    container.innerHTML = "<p class='text-center py-10 text-zinc-400'>Nenhum pedido hoje.</p>";
                    return;
                }

                // Filtra apenas pedidos de hoje e inverte (mais novos no topo)
                const idsFiltrados = Object.keys(vendas)
                    .filter(id => vendas[id].dataLocal === hoje)
                    .reverse();

                let html = "";
                idsFiltrados.forEach(id => {
                    const v = vendas[id];
                    html += `
                        <div class="pedido-card bg-white p-5 rounded-3xl shadow-sm border border-zinc-200">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold uppercase">${new Date(v.data).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
                                    <h2 class="text-lg font-black text-zinc-800 mt-1 uppercase">${v.cliente}</h2>
                                </div>
                                <button onclick='imprimir("${id}")' class="bg-zinc-800 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-zinc-700">
                                    🖨️ IMPRIMIR
                                </button>
                            </div>
                            
                            <div class="space-y-1 mb-4">
                                ${v.itens.map(i => `
                                    <div class="flex justify-between text-sm border-b border-zinc-50 pb-1">
                                        <span class="font-medium"><b class="text-amber-600">${i.qty}x</b> ${i.nome}</span>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="flex justify-between items-center text-[11px] text-zinc-500 font-bold uppercase">
                                <span>Pagamento: ${v.pagamento}</span>
                                <span class="text-zinc-800">Total: R$ ${v.total.toFixed(2)}</span>
                            </div>
                            ${v.observacao ? `<div class="mt-3 p-2 bg-red-50 text-red-700 text-[10px] rounded-lg font-medium">Obs: ${v.observacao}</div>` : ''}
                        </div>
                    `;
                });

                container.innerHTML = html || "<p class='text-center py-10 text-zinc-400'>Nenhum pedido hoje.</p>";
            } catch (e) {
                console.error(e);
            }
        }

        async function imprimir(id) {
            const res = await fetch(DB_BASE + `vendas/${id}.json`);
            const v = await res.json();
            const printArea = document.getElementById('secao-impressao');

            printArea.innerHTML = `
                <div style="text-align: center; text-transform: uppercase;">
                    <h2 style="margin-bottom: 2px;">Point do Café</h2>
                    <small>Pedido via DPTech</small><br>
                    --------------------------------<br>
                    <b>CLIENTE: ${v.cliente}</b><br>
                    DATA: ${v.dataLocal} - ${new Date(v.data).toLocaleTimeString('pt-BR')}<br>
                    --------------------------------<br>
                </div>
                <div style="margin: 10px 0;">
                    ${v.itens.map(i => `${i.qty}x ${i.nome.padEnd(20)}`).join('<br>')}
                </div>
                --------------------------------<br>
                <b>TOTAL: R$ ${v.total.toFixed(2)}</b><br>
                PGTO: ${v.pagamento}<br>
                ${v.observacao ? `OBS: ${v.observacao}<br>` : ''}
                --------------------------------<br>
                <div style="text-align: center; font-size: 10px; margin-top: 10px;">
                    * NAO E DOCUMENTO FISCAL *
                </div>
            `;

            printArea.classList.remove('hidden');
            window.print();
            printArea.classList.add('hidden');
        }

        // Atualiza automaticamente a cada 30 segundos
        setInterval(carregarPedidos, 30000);
        carregarPedidos();
    </script>
</body>
</html>
