<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point do Café - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="bg-amber-50 pb-24 font-sans">
    <header class="bg-white p-8 shadow-sm mb-6 text-center border-b-4 border-amber-600">
        <h1 class="text-3xl font-black text-amber-900">☕ POINT DO CAFÉ</h1>
        <p class="text-amber-700 font-medium">O melhor café da região</p>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-8">
        <div class="text-center py-10 text-amber-900">Carregando delícias...</div>
    </main>

    <!-- Carrinho Flutuante -->
    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 hidden">
        <button onclick="abrirCheckout()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-bold flex justify-between px-8 border-4 border-white items-center">
            <span>🛒 Finalizar Pedido</span>
            <span id="cart-count" class="bg-white text-green-700 px-2 py-1 rounded-full text-xs">0</span>
        </button>
    </div>

    <!-- Modal de Checkout -->
    <div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-bold mb-4 text-amber-900">Dados do Pedido</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Seu Nome</label>
                    <input type="text" id="cli-nome" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Endereço ou Retirada</label>
                    <input type="text" id="cli-end" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Forma de Pagamento</label>
                    <select id="cli-pgto" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500">
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Observações (Opcional)</label>
                    <textarea id="cli-obs" placeholder="Ex: Sem açúcar, capricha no gelo..." class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 h-20"></textarea>
                </div>

                <div class="pt-4 border-t">
                    <div class="flex justify-between text-xl font-black text-amber-900 mb-4">
                        <span>Total:</span>
                        <span id="checkout-total">R$ 0,00</span>
                    </div>
                    <button onclick="enviarPedidoFinal()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-xl">Confirmar e Abrir WhatsApp</button>
                    <button onclick="fecharCheckout()" class="w-full text-gray-400 py-2 mt-2">Voltar ao cardápio</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://pointdocafe-default-rtdb.firebaseio.com/produtos.json";
        const WHATSAPP = "5561999521964";
        let carrinho = [];

        async function loadMenu() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                const container = document.getElementById('categorias-container');
                if (!data) { container.innerHTML = "Cardápio vazio."; return; }

                const produtos = Object.values(data);
                const categorias = ["Prato do dia", "Combos do dia", "Bebidas", "Salgados", "Bombonieries"];
                const catsNoDb = [...new Set(produtos.map(p => p.categoria))];
                
                container.innerHTML = categorias.filter(c => catsNoDb.includes(c)).map(cat => `
                    <section>
                        <h2 class="text-xl font-bold mb-4 text-amber-900 border-b-2 border-amber-200 pb-1 uppercase text-sm tracking-widest">${cat}</h2>
                        <div class="space-y-4">
                            ${Object.keys(data).filter(k => data[k].categoria === cat).map(k => {
                                const p = data[k];
                                return `
                                <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center gap-4 border border-amber-100">
                                    <img src="${p.img}" class="w-20 h-20 object-cover rounded-xl bg-amber-50">
                                    <div class="flex-1">
                                        <h3 class="font-bold text-amber-900">${p.nome}</h3>
                                        <p class="text-green-700 font-black">R$ ${p.preco.toFixed(2)}</p>
                                    </div>
                                    <button onclick="addToCart('${p.nome}', ${p.preco})" class="bg-amber-100 text-amber-900 w-10 h-10 rounded-full font-bold text-xl hover:bg-amber-600 hover:text-white transition-all">＋</button>
                                </div>`;
                            }).join('')}
                        </div>
                    </section>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function addToCart(nome, preco) {
            carrinho.push({nome, preco});
            document.getElementById('cart-float').classList.remove('hidden');
            document.getElementById('cart-count').innerText = carrinho.length;
        }

        function abrirCheckout() {
            document.getElementById('modal-checkout').classList.remove('hidden');
            document.body.classList.add('modal-open');
            let total = carrinho.reduce((sum, item) => sum + item.preco, 0);
            document.getElementById('checkout-total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function fecharCheckout() {
            document.getElementById('modal-checkout').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        function enviarPedidoFinal() {
            const nome = document.getElementById('cli-nome').value;
            const end = document.getElementById('cli-end').value;
            const pgto = document.getElementById('cli-pgto').value;
            const obs = document.getElementById('cli-obs').value;

            if(!nome || !end) return alert("Preencha seu Nome e Endereço!");

            let msg = `*☕ POINT DO CAFÉ - NOVO PEDIDO*\n`;
            msg += `------------------------------\n`;
            msg += `*Cliente:* ${nome}\n`;
            msg += `*Endereço:* ${end}\n`;
            msg += `*Pagamento:* ${pgto}\n`;
            if(obs) msg += `*OBS:* ${obs}\n`;
            msg += `------------------------------\n`;
            
            let total = 0;
            carrinho.forEach((item, idx) => {
                msg += `*${idx + 1}.* ${item.nome} - R$ ${item.preco.toFixed(2)}\n`;
                total += item.preco;
            });
            
            msg += `------------------------------\n`;
            msg += `*TOTAL: R$ ${total.toFixed(2)}*\n\n`;
            msg += `_Enviado pelo Cardápio Digital_`;

            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
        }

        loadMenu();
    </script>
</body>
</html>
