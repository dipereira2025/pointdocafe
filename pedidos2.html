<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .bg-coffee { background-color: #fffcf7; }
        .loading-spinner { border: 4px solid rgba(255,255,255,.3); border-radius: 50%; border-top: 4px solid #d97706; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-coffee pb-24 font-sans text-gray-900">
    <header class="bg-white p-6 shadow-sm mb-6 flex flex-col items-center border-b-4 border-amber-600 text-center">
        <h1 class="text-2xl font-black text-amber-900 uppercase italic">Point do Café</h1>
        <p class="text-amber-700 font-medium text-[10px] mt-1 uppercase tracking-widest">Peça seu café e acompanhe em tempo real</p>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-8">
        <div class="text-center py-10 text-amber-900 font-bold">Carregando cardápio...</div>
    </main>

    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 hidden">
        <button onclick="abrirCheckout()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-black flex justify-center gap-2 border-4 border-white items-center uppercase text-sm">
            🛒 <span id="cart-summary">0 itens | R$ 0,00</span>
        </button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black text-amber-900 uppercase mb-4">Finalizar Pedido</h2>
            <div id="resumo-itens" class="mb-6 space-y-2 text-sm border-b pb-4"></div>
            <div class="space-y-3">
                <input type="text" id="cli-nome" placeholder="Seu Nome *" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-none">
                <input type="text" id="cli-end" placeholder="Endereço Completo *" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-none">
                <select id="cli-pgto" class="w-full p-4 bg-gray-100 rounded-xl border-none">
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                </select>
                <button onclick="enviarPedidoFinal()" id="btnConfirmar" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase">✅ Enviar e Acompanhar</button>
                <button onclick="fecharCheckout()" class="w-full text-gray-400 font-bold py-2 text-xs uppercase">Voltar</button>
            </div>
        </div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const WHATSAPP = "5561999521964"; 
        let carrinho = [];

        async function loadMenu() {
            try {
                const res = await fetch(`${DB_BASE}produtos.json`);
                const produtos = await res.json();
                const container = document.getElementById('categorias-container');
                container.innerHTML = "";
                for (let id in produtos) {
                    if(produtos[id].pausado) continue;
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-amber-100">
                            <div>
                                <h3 class="font-bold text-amber-900">${produtos[id].nome}</h3>
                                <p class="text-green-700 font-black">R$ ${produtos[id].preco.toFixed(2)}</p>
                            </div>
                            <button onclick="addCart('${id}', '${produtos[id].nome}', ${produtos[id].preco})" class="bg-amber-600 text-white px-4 py-2 rounded-xl font-bold">+</button>
                        </div>`;
                }
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        window.addCart = (id, nome, preco) => {
            carrinho.push({id, nome, preco});
            updateCart();
            Toastify({text: "Adicionado!", duration: 1000, style: {background: "#d97706"}}).showToast();
        };

        function updateCart() {
            const total = carrinho.reduce((acc, i) => acc + i.preco, 0);
            document.getElementById('cart-summary').innerText = `${carrinho.length} itens | R$ ${total.toFixed(2)}`;
            document.getElementById('cart-float').classList.toggle('hidden', carrinho.length === 0);
        }

        window.abrirCheckout = () => {
            const resumo = document.getElementById('resumo-itens');
            resumo.innerHTML = carrinho.map(i => `<div class="flex justify-between"><span>1x ${i.nome}</span><span>R$ ${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('modal-checkout').classList.remove('hidden');
        };

        window.fecharCheckout = () => document.getElementById('modal-checkout').classList.add('hidden');

        window.enviarPedidoFinal = async () => {
            const n = document.getElementById('cli-nome').value;
            const e = document.getElementById('cli-end').value;
            const btn = document.getElementById('btnConfirmar');

            if(!n || !e) return alert("Preencha Nome e Endereço");

            btn.disabled = true;
            btn.innerHTML = "Processando...";

            const pedidoId = "PED-" + Date.now().toString().slice(-6);
            const pedido = {
                id: pedidoId,
                cliente: n,
                endereco: e,
                pagamento: document.getElementById('cli-pgto').value,
                itens: carrinho,
                total: carrinho.reduce((acc, i) => acc + i.preco, 0),
                status: 'pendente',
                data: new Date().toISOString(),
                dataLocal: new Date().toLocaleDateString('pt-BR')
            };

            try {
                await fetch(`${DB_BASE}vendas/${pedidoId}.json`, { method: 'PUT', body: JSON.stringify(pedido) });
                window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent("*NOVO PEDIDO #" + pedidoId + "*")}`, '_blank');
                window.location.href = `status2.html?id=${pedidoId}`;
            } catch (err) { alert("Erro ao salvar pedido"); btn.disabled = false; }
        };

        loadMenu();
    </script>
</body>
</html>
