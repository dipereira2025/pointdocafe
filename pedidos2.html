<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>
<body class="bg-stone-50 pb-24">
    <script type="module">
        // COLOQUE SUA URL DO FIREBASE AQUI (Ex: https://projeto.firebaseio.com/)
        const DB_BASE = "SUA_URL_DO_FIREBASE_AQUI/";
        const WHATSAPP = "55XXXXXXXXXXX";

        async function enviarPedidoFinal() {
            const btn = document.getElementById('btnConfirmar');
            const nome = document.getElementById('cli-nome').value.trim();
            const endereco = document.getElementById('cli-end').value.trim();

            if(!nome || !endereco) {
                Toastify({text: "Nome e Endereço são obrigatórios!", style: {background: "#ef4444"}}).showToast();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Processando...';

            // GERAÇÃO DO ID INTEGRADO
            const pedidoId = "PED-" + Date.now().toString().slice(-6);
            const totalGeral = carrinho.reduce((acc, item) => acc + ((item.precoPromo || item.preco) * item.qty), 0);

            const pedidoDados = {
                id: pedidoId,
                cliente: nome,
                endereco: endereco,
                itens: carrinho.map(p => ({ nome: p.nome, qty: p.qty, preco: (p.precoPromo || p.preco) })),
                total: totalGeral,
                status: 'pendente',
                data: new Date().toISOString()
            };

            try {
                // SALVA NO FIREBASE
                await fetch(`${DB_BASE}vendas/${pedidoId}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(pedidoDados)
                });
                
                // MENSAGEM WHATSAPP
                let msg = `*NOVO PEDIDO #${pedidoId}*\n*Cliente:* ${nome}\n*Total:* R$ ${totalGeral.toFixed(2)}`;
                window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
                
                // REDIRECIONA PARA A TELA DE STATUS
                window.location.href = `status2.html?id=${pedidoId}`;

            } catch (err) {
                Toastify({text: "Erro ao enviar pedido", style: {background: "#ef4444"}}).showToast();
                btn.disabled = false;
                btn.innerHTML = 'Confirmar Pedido';
            }
        }
        window.enviarPedidoFinal = enviarPedidoFinal;
    </script>
</body>
</html>
