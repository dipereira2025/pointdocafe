<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .bg-coffee { background-color: #fffcf7; }
        input:focus, select:focus { border-color: #d97706 !important; }
    </style>
</head>
<body class="bg-coffee pb-24 font-sans text-gray-900 text-left">

    <header class="bg-white p-6 shadow-sm mb-6 flex flex-col items-center border-b-4 border-amber-600 text-center">
        <h1 class="text-2xl font-black text-amber-900 uppercase italic">Point do Café</h1>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-4"></main>

    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 hidden z-40">
        <button onclick="abrirCheckout()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-black uppercase text-sm border-4 border-white">
            🛒 <span id="cart-summary">0 itens | R$ 0,00</span>
        </button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black text-amber-900 uppercase mb-4 italic text-center">Finalizar Pedido</h2>
            <div id="resumo-itens" class="mb-4 text-sm border-b pb-4 text-zinc-600"></div>
            <div class="space-y-3">
                <input type="text" id="cli-nome" placeholder="Seu Nome *" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent">
                <input type="tel" id="cli-zap" placeholder="Seu WhatsApp (Com DDD) *" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent">
                <input type="text" id="cli-end" placeholder="Endereço de Entrega *" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent">
                
                <select id="cli-pagamento" onchange="const b=document.getElementById('box-troco'); b.classList.toggle('hidden', this.value !== 'Dinheiro')" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão de Crédito/Débito</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>

                <div id="box-troco" class="hidden">
                    <input type="text" id="cli-troco" placeholder="Troco para quanto?" oninput="mascaraMoeda(this)" class="w-full p-4 bg-green-50 border-2 border-green-200 rounded-xl outline-none">
                </div>

                <textarea id="cli-obs" placeholder="Alguma observação?" class="w-full p-4 bg-gray-100 rounded-xl text-sm h-16 outline-none border-2 border-transparent"></textarea>

                <button onclick="finalizarPedidoEEnviar()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase mt-2">🚀 Finalizar no WhatsApp</button>
                <button onclick="document.getElementById('modal-checkout').classList.add('hidden')" class="w-full text-gray-400 font-bold py-2 text-xs uppercase text-center">Voltar</button>
            </div>
        </div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const WHATSAPP_LOJA = "5561999521964"; // NÚMERO ATUALIZADO
        let carrinho = [];

        window.mascaraMoeda = (i) => {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = "R$ " + v;
        }

        async function init() {
            const res = await fetch(`${DB_BASE}produtos.json`);
            const produtos = await res.json();
            const container = document.getElementById('categorias-container');
            for (let id in produtos) {
                if(produtos[id].pausado) continue;
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-amber-50">
                        <div class="flex items-center gap-3">
                            <img src="${produtos[id].img || ''}" class="w-14 h-14 object-cover rounded-xl bg-zinc-100">
                            <div>
                                <h3 class="font-bold text-amber-900 text-sm uppercase italic">${produtos[id].nome}</h3>
                                <p class="text-green-700 font-black text-xs">R$ ${produtos[id].preco.toFixed(2)}</p>
                            </div>
                        </div>
                        <button onclick="addCart('${id}', '${produtos[id].nome}', ${produtos[id].preco})" class="bg-amber-600 text-white px-4 py-2 rounded-xl font-black shadow-md">+</button>
                    </div>`;
            }
            document.getElementById('cli-nome').value = localStorage.getItem('cafe_nome') || "";
            document.getElementById('cli-zap').value = localStorage.getItem('cafe_tel') || "";
            document.getElementById('cli-end').value = localStorage.getItem('cafe_end') || "";
        }

        window.addCart = (id, nome, preco) => {
            carrinho.push({id, nome, preco});
            const total = carrinho.reduce((acc, i) => acc + i.preco, 0);
            document.getElementById('cart-summary').innerText = `${carrinho.length} itens | R$ ${total.toFixed(2)}`;
            document.getElementById('cart-float').classList.remove('hidden');
        };

        window.abrirCheckout = () => {
            document.getElementById('resumo-itens').innerHTML = carrinho.map(i => `<div class="flex justify-between py-1"><span>1x ${i.nome}</span><span>R$ ${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('modal-checkout').classList.remove('hidden');
        };

        window.finalizarPedidoEEnviar = async () => {
            const n = document.getElementById('cli-nome').value.trim();
            const z = document.getElementById('cli-zap').value.trim().replace(/\D/g, "");
            const e = document.getElementById('cli-end').value.trim();
            const pag = document.getElementById('cli-pagamento').value;
            const troco = document.getElementById('cli-troco').value || "Não necessário";
            const obs = document.getElementById('cli-obs').value.trim();

            if(!n || !z || !e) return alert("Preencha Nome, WhatsApp e Endereço.");

            localStorage.setItem('cafe_nome', n); localStorage.setItem('cafe_tel', z); localStorage.setItem('cafe_end', e);

            const pedidoId = "PED-" + Date.now().toString().slice(-6);
            const totalGeral = carrinho.reduce((acc, i) => acc + i.preco, 0);

            const pedido = {
                id: pedidoId, cliente: n, telefone: z, endereco: e, pagamento: pag, troco: troco,
                observacao: obs, itens: carrinho, total: totalGeral, status: 'pendente',
                data: new Date().toISOString(), dataLocal: new Date().toLocaleDateString('pt-BR')
            };

            await fetch(`${DB_BASE}vendas/${pedidoId}.json`, { method: 'PUT', body: JSON.stringify(pedido) });

            let msg = `*NOVO PEDIDO: #${pedidoId.slice(-4)}*\n\n`;
            msg += `*Cliente:* ${n}\n`;
            msg += `*Endereço:* ${e}\n`;
            msg += `*Pagamento:* ${pag}\n`;
            if(pag === 'Dinheiro') msg += `*Troco para:* ${troco}\n`;
            msg += `\n*ITENS:*\n`;
            carrinho.forEach(i => msg += `- 1x ${i.nome} (R$ ${i.preco.toFixed(2)})\n`);
            msg += `\n*TOTAL: R$ ${totalGeral.toFixed(2)}*`;
            if(obs) msg += `\n\n*OBS:* ${obs}`;

            const urlZap = `https://wa.me/${WHATSAPP_LOJA}?text=${encodeURIComponent(msg)}`;
            setTimeout(() => { window.location.href = urlZap; }, 500);
        };

        init();
    </script>
</body>
</html>
