<div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
    <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh]">
        <h2 class="text-xl font-black text-amber-900 uppercase mb-4 italic">Seus Dados</h2>
        
        <div class="space-y-3">
            <label class="text-[10px] font-bold text-zinc-400 uppercase ml-2">Nome</label>
            <input type="text" id="cli-nome" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent focus:border-amber-500">
            
            <label class="text-[10px] font-bold text-zinc-400 uppercase ml-2">WhatsApp (DDD + Número)</label>
            <input type="tel" id="cli-zap" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent focus:border-amber-500">

            <label class="text-[10px] font-bold text-zinc-400 uppercase ml-2">Endereço de Entrega</label>
            <input type="text" id="cli-end" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent focus:border-amber-500">
            
            <label class="text-[10px] font-bold text-zinc-400 uppercase ml-2">Observações</label>
            <textarea id="cli-obs" class="w-full p-4 bg-gray-100 rounded-xl text-sm h-20 outline-none border-2 border-transparent focus:border-amber-500"></textarea>

            <button onclick="finalizarPedidoAutomatico()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase mt-4">
                🚀 Confirmar e Pedir
            </button>
            <button onclick="document.getElementById('modal-checkout').classList.add('hidden')" class="w-full text-gray-400 font-bold py-2 text-xs uppercase">Voltar ao cardápio</button>
        </div>
    </div>
</div>

<script type="module">
    const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";

    // 1. FUNÇÃO PARA CARREGAR DADOS (URL ou MEMÓRIA)
    function autoPreencher() {
        const params = new URLSearchParams(window.location.search);
        
        // Tenta pegar da URL (Link Mágico)
        const urlNome = params.get('nome');
        const urlTel = params.get('tel');

        // Tenta pegar da Memória do Navegador
        const memNome = localStorage.getItem('cafe_nome');
        const memTel = localStorage.getItem('cafe_tel');
        const memEnd = localStorage.getItem('cafe_end');

        // Preenche os campos respeitando a prioridade
        if (urlNome || memNome) document.getElementById('cli-nome').value = urlNome || memNome;
        if (urlTel || memTel) document.getElementById('cli-zap').value = urlTel || memTel;
        if (memEnd) document.getElementById('cli-end').value = memEnd;
    }

    // 2. FUNÇÃO PARA FINALIZAR E SALVAR
    window.finalizarPedidoAutomatico = async () => {
        const n = document.getElementById('cli-nome').value.trim();
        const z = document.getElementById('cli-zap').value.trim().replace(/\D/g, "");
        const e = document.getElementById('cli-end').value.trim();
        const obs = document.getElementById('cli-obs').value.trim();

        if(!n || !z || !e) return alert("Por favor, preencha Nome, WhatsApp e Endereço.");

        // SALVA NA MEMÓRIA PARA O PRÓXIMO PEDIDO
        localStorage.setItem('cafe_nome', n);
        localStorage.setItem('cafe_tel', z);
        localStorage.setItem('cafe_end', e);

        const pedido = {
            id: pedidoId, cliente: n, telefone: z, endereco: e, observacao: obs,

        window.location.href = `status2.html?id=${pedidoId}`;

    // Executa ao abrir a página

</script>
