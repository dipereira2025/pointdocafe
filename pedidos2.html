<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .bg-coffee { background-color: #fffcf7; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
        .loading-overlay { background: rgba(255,252,247,0.9); z-index: 100; }
    </style>
</head>
<body class="bg-coffee pb-24 font-sans text-gray-900">
    
    <div id="loader" class="fixed inset-0 loading-overlay flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-amber-600 border-t-transparent rounded-full animate-spin mb-2"></div>
        <p class="text-amber-900 font-bold text-xs uppercase tracking-widest">Sincronizando...</p>
    </div>

    <header class="bg-white p-6 shadow-sm mb-6 flex flex-col items-center border-b-4 border-amber-600 text-center">
        <div id="logo-container" class="mb-3 hidden">
            <img id="store-logo" src="" alt="Logo" class="w-24 h-24 rounded-full object-cover border-4 border-amber-100 shadow-md">
        </div>
        <h1 id="header-name" class="text-2xl font-black text-amber-900 uppercase italic">Point do Café</h1>
        <p id="header-desc" class="text-amber-700 font-medium text-[10px] mt-1 uppercase tracking-widest">Peça agora</p>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-4"></main>

    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 hidden z-40">
        <button onclick="abrirCheckout()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-black flex justify-center gap-2 border-4 border-white items-center uppercase text-sm">
            🛒 <span id="cart-summary">0 itens | R$ 0,00</span>
        </button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-black text-amber-900 uppercase">Seu Pedido</h2>
                <button onclick="limparCarrinho()" class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-1 rounded-full uppercase">Limpar</button>
            </div>
            <div id="resumo-itens" class="mb-6 space-y-2 text-sm border-b pb-4"></div>
            <div class="space-y-3">
                <input type="text" id="cli-nome" placeholder="Seu Nome *" class="w-full p-4 bg-gray-100 rounded-xl outline-none">
                <input type="text" id="cli-end" placeholder="Endereço de Entrega *" class="w-full p-4 bg-gray-100 rounded-xl outline-none">
                <input type="text" id="cli-ref" placeholder="Ponto de Referência" class="w-full p-4 bg-gray-100 rounded-xl outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <select id="cli-pgto" onchange="toggleTroco(this.value)" class="w-full p-4 bg-gray-100 rounded-xl text-sm outline-none">
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão">Cartão</option>
                    </select>
                    <input type="text" id="cli-troco" placeholder="Troco para R$?" class="w-full p-4 bg-gray-100 rounded-xl hidden text-sm outline-none">
                </div>
                <textarea id="cli-obs" placeholder="Observações do pedido..." class="w-full p-4 bg-gray-100 rounded-xl text-sm outline-none h-20"></textarea>
                <button onclick="enviarPedidoFinal()" id="btnConfirmar" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase mt-4">✅ Finalizar Pedido</button>
                <button onclick="fecharCheckout()" class="w-full text-gray-400 font-bold py-2 text-xs uppercase">Voltar</button>
            </div>
        </div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const WHATSAPP_LOJA = "5561999521964"; 
        let carrinho = [];

        async function init() {
            try {
                const resC = await fetch(`${DB_BASE}configuracao.json`);
                const config = await resC.json();
                if(config) {
                    if(config.logo) { document.getElementById('store-logo').src = config.logo; document.getElementById('logo-container').classList.remove('hidden'); }
                    if(config.storeInfo?.name) document.getElementById('header-name').innerText = config.storeInfo.name;
                    if(config.storeInfo?.description) document.getElementById('header-desc').innerText = config.storeInfo.description;
                }
                const resP = await fetch(`${DB_BASE}produtos.json`);
                const produtos = await resP.json();
                renderMenu(produtos);
                document.getElementById('loader').classList.add('hidden');
            } catch (e) { console.error(e); }
        }

        function renderMenu(produtos) {
            const container = document.getElementById('categorias-container');
            container.innerHTML = "";
            for (let id in produtos) {
                if(produtos[id].pausado) continue;
                const foto = produtos[id].img ? `<img src="${produtos[id].img}" class="w-16 h-16 object-cover rounded-xl">` : `<div class="w-16 h-16 bg-amber-50 rounded-xl"></div>`;
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-amber-50">
                        <div class="flex items-center gap-3">
                            ${foto}
                            <div>
                                <h3 class="font-bold text-amber-900 text-sm">${produtos[id].nome}</h3>
                                <p class="text-green-700 font-black text-sm">R$ ${produtos[id].preco.toFixed(2)}</p>
                            </div>
                        </div>
                        <button onclick="addCart('${id}', '${produtos[id].nome}', ${produtos[id].preco})" class="bg-amber-600 text-white px-5 py-2 rounded-xl font-black">+</button>
                    </div>`;
            }
        }

        window.toggleTroco = (val) => document.getElementById('cli-troco').classList.toggle('hidden', val !== 'Dinheiro');
        window.addCart = (id, nome, preco) => {
            carrinho.push({id, nome, preco});
            updateCart();
            Toastify({text: "Adicionado!", duration: 1000, style: {background: "#d97706"}}).showToast();
        };

        function updateCart() {
            const total = carrinho.reduce((acc, i) => acc + i.preco, 0);
            document.getElementById('cart-summary').innerText = `${carrinho.length} itens | R$ ${total.toFixed(2)}`;
            document.getElementById('cart-float').classList.toggle('hidden', carrinho.length === 0);
        }

        window.abrirCheckout = () => {
            document.getElementById('resumo-itens').innerHTML = carrinho.map(i => `<div class="flex justify-between py-1"><span>1x ${i.nome}</span><span>R$ ${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('modal-checkout').classList.remove('hidden');
        };

        window.fecharCheckout = () => document.getElementById('modal-checkout').classList.add('hidden');

        window.limparCarrinho = () => { if(confirm("Esvaziar carrinho?")) { carrinho = []; updateCart(); fecharCheckout(); } };

        window.enviarPedidoFinal = async () => {
            const n = document.getElementById('cli-nome').value.trim();
            const e = document.getElementById('cli-end').value.trim();
            const ref = document.getElementById('cli-ref').value.trim();
            const pgto = document.getElementById('cli-pgto').value;
            const troco = document.getElementById('cli-troco').value.trim();
            const obs = document.getElementById('cli-obs').value.trim();

            if(!n || !e) return alert("Preencha Nome e Endereço.");

            const pedidoId = "PED-" + Date.now().toString().slice(-6);
            const totalGeral = carrinho.reduce((acc, i) => acc + i.preco, 0);
            // Adicione o parâmetro de captura automática no link enviado ao WhatsApp
            const statusLink = window.location.origin + window.location.pathname.replace('pedidos2.html', 'status2.html') + "?id=" + pedidoId + "&cap=true";
            
            const pedido = {
                id: pedidoId, cliente: n, endereco: e, referencia: ref,
                pagamento: pgto, troco: troco, observacao: obs, itens: carrinho, 
                total: totalGeral, status: 'pendente', 
                data: new Date().toISOString(), dataLocal: new Date().toLocaleDateString('pt-BR')
            };

            await fetch(`${DB_BASE}vendas/${pedidoId}.json`, { method: 'PUT', body: JSON.stringify(pedido) });

            let msg = `*RECEBEMOS SEU PEDIDO!* ☕\n\n`;
            msg += `*Nº DO PEDIDO:* #${pedidoId}\n*CLIENTE:* ${n}\n`;
            msg += `----------------------------------\n*ITENS:*\n`;
            if(obs) msg += `*OBS:* ${obs}\n`;
            carrinho.forEach(item => { msg += `• 1x ${item.nome} - R$ ${item.preco.toFixed(2)}\n`; });
            msg += `\n*TOTAL: R$ ${totalGeral.toFixed(2)}*\n----------------------------------\n`;
            msg += `*ENDEREÇO:* ${e}\n`;
            if(ref) msg += `*REF:* ${ref}\n`;
            msg += `*PAGAMENTO:* ${pgto}\n`;msg += `----------------------------------\n`;
            msg += `*Acompanhe aqui:* \n${statusLink}`;

            window.open(`https://wa.me/${WHATSAPP_LOJA}?text=${encodeURIComponent(msg)}`, '_blank');
            window.location.href = `status2.html?id=${pedidoId}`;
        };

        init();
    </script>
</body>
</html>
