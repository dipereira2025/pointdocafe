<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .bg-coffee { background-color: #fffcf7; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</head>
<body class="bg-coffee pb-24 font-sans text-gray-900">
    
    <header class="bg-white p-6 shadow-sm mb-6 flex flex-col items-center border-b-4 border-amber-600 text-center">
        <div id="logo-container" class="mb-3 hidden">
            <img id="store-logo" src="" alt="Logo" class="w-24 h-24 rounded-full object-cover border-4 border-amber-100 shadow-md">
        </div>
        <h1 id="header-name" class="text-2xl font-black text-amber-900 uppercase italic">Point do Café</h1>
        <p id="header-desc" class="text-amber-700 font-medium text-[10px] mt-1 uppercase tracking-widest">Carregando informações...</p>
    </header>

    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-8">
        <div class="text-center py-10 text-amber-900 font-bold">Sincronizando cardápio...</div>
    </main>

    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 hidden z-40">
        <button onclick="abrirCheckout()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-black flex justify-center gap-2 border-4 border-white items-center uppercase text-sm">
            🛒 <span id="cart-summary">0 itens | R$ 0,00</span>
        </button>
    </div>

    <div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black text-amber-900 uppercase mb-4">Seu Pedido</h2>
            <div id="resumo-itens" class="mb-6 space-y-2 text-sm border-b pb-4"></div>
            <div class="space-y-3">
                <input type="text" id="cli-nome" placeholder="Seu Nome *" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-none">
                <input type="text" id="cli-end" placeholder="Endereço Completo *" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-none">
                <input type="text" id="cli-ref" placeholder="Ponto de Referência" class="w-full p-4 bg-gray-100 rounded-xl outline-none border-none">
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="cli-pgto" onchange="toggleTroco(this.value)" class="w-full p-4 bg-gray-100 rounded-xl border-none text-sm">
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão">Cartão</option>
                    </select>
                    <input type="text" id="cli-troco" placeholder="Troco para R$?" class="w-full p-4 bg-gray-100 rounded-xl border-none hidden text-sm">
                </div>

                <button onclick="enviarPedidoFinal()" id="btnConfirmar" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase">✅ Confirmar Pedido</button>
                <button onclick="fecharCheckout()" class="w-full text-gray-400 font-bold py-2 text-xs uppercase">Voltar ao Menu</button>
            </div>
        </div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const WHATSAPP = "5561999521964"; 
        let carrinho = [];

        async function carregarIdentidade() {
            try {
                const resLogo = await fetch(`${DB_BASE}configuracao/logo.json`);
                const logoData = await resLogo.json();
                if(logoData) {
                    document.getElementById('store-logo').src = logoData;
                    document.getElementById('logo-container').classList.remove('hidden');
                }
                const resInfo = await fetch(`${DB_BASE}configuracao/storeInfo.json`);
                const info = await resInfo.json();
                if(info) {
                    if(info.name) document.getElementById('header-name').innerText = info.name;
                    if(info.description) document.getElementById('header-desc').innerText = info.description;
