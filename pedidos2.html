<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Toastify JS para notificações não intrusivas -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .modal-open { overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
        .bg-coffee { background-color: #fffcf7; }
        .loading-spinner { border: 4px solid rgba(255,255,255,.3); border-radius: 50%; border-top: 4px solid #d97706; width: 20px; height: 20px; -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 10px; }
        @-webkit-keyframes spin { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-coffee pb-24 font-sans text-gray-900 text-left">
    
    <!-- Cabeçalho -->
    <header class="bg-white p-6 shadow-sm mb-6 flex flex-col items-center border-b-4 border-amber-600">
        <div id="logo-container" class="w-24 h-24 mb-3 hidden">
            <img id="loja-logo" class="w-full h-full object-contain rounded-full shadow-md" alt="Logo">
        </div>
        <h1 class="text-2xl font-black text-amber-900 uppercase tracking-tighter">Point do Café</h1>
        <p id="store-tagline" class="text-amber-700 font-medium text-[10px] mt-1 uppercase tracking-widest">Lanchonete e Restaurante - Comida caseira sempre quentinha.</p>
        <p id="store-hours" class="text-zinc-500 text-xs mt-2">Horário de Funcionamento: Seg-Sex: 08h-18h</p>
    </header>

    <!-- Barra de Busca (Nova Funcionalidade) -->
    <div class="max-w-md mx-auto px-4 mb-6">
        <input type="text" id="search-input" placeholder="Buscar produtos..." class="w-full p-3 rounded-xl bg-white border border-gray-200 outline-none text-sm" onkeyup="filterProducts()">
    </div>

    <!-- Container de Categorias e Itens -->
    <main id="categorias-container" class="max-w-md mx-auto p-4 space-y-8">
        <div class="text-center py-10 text-amber-900 animate-pulse text-sm font-bold flex items-center justify-center">
            Sincronizando cardápio... <span class="loading-spinner"></span>
        </div>
    </main>

    <!-- Botão Flutuante do Carrinho -->
    <div id="cart-float" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4 z-40">
        <button onclick="abrirCheckout()" class="w-full bg-green-600 text-white py-4 rounded-full shadow-2xl font-black flex justify-center gap-2 border-4 border-white items-center hover:scale-105 transition-transform uppercase text-sm">
            🛒 <span id="cart-summary">0 itens | R$ 0,00</span>
        </button>
    </div>

    <!-- Modal de Checkout -->
    <div id="modal-checkout" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh] shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-black text-amber-900 uppercase">Seu Pedido</h2>
                <button onclick="limparCarrinho()" class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-1 rounded-full uppercase">Limpar</button>
            </div>
            
            <div id="resumo-itens" class="mb-6 space-y-2 bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300 text-sm"></div>

            <div class="space-y-3">
                <input type="text" id="cli-nome" placeholder="Seu Nome *" class="w-full p-4 bg-gray-100 rounded-xl outline-none text-sm border-none" required>
                <input type="text" id="cli-end" placeholder="Endereço Completo *" class="w-full p-4 bg-gray-100 rounded-xl outline-none text-sm border-none" required>
                <input type="text" id="cli-ref" placeholder="Ponto de Referência" class="w-full p-4 bg-gray-100 rounded-xl outline-none text-sm border-none">
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="cli-pgto" class="w-full p-4 bg-gray-100 rounded-xl text-sm outline-none border-none">
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão">Cartão</option>
                    </select>
                    <input type="text" id="cli-tel" placeholder="Telefone (WhatsApp)" class="w-full p-4 bg-gray-100 rounded-xl text-sm outline-none border-none">
                </div>
                <textarea id="cli-obs" placeholder="Observações gerais do pedido?" class="w-full p-4 bg-gray-100 rounded-xl text-sm outline-none border-none"></textarea>

                <div class="pt-6 border-t border-gray-100">
                    <div class="flex justify-between text-xl font-black text-amber-900 mb-6">
                        <span>Total:</span>
                        <span id="checkout-total">R$ 0,00</span>
                    </div>
                    <button onclick="enviarPedidoFinal()" id="btnConfirmar" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-green-700 transition-all uppercase text-sm">
                        ✅ Confirmar no WhatsApp
                    </button>
                    <button onclick="fecharCheckout()" class="w-full text-gray-400 font-bold py-2 mt-2 text-xs text-center uppercase">Voltar ao Menu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Detalhes do Produto (Nova Funcionalidade) -->
    <div id="modal-produto-detalhes" class="fixed inset-0 bg-black/70 hidden z-50 p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 overflow-y-auto max-h-[90vh] shadow-2xl">
            <img id="detalhe-img" class="w-full h-48 object-cover rounded-xl mb-4" alt="Imagem do Produto">
            <h2 id="detalhe-nome" class="text-2xl font-black text-amber-900 mb-2"></h2>
            <p id="detalhe-descricao" class="text-gray-700 text-sm mb-4"></p>
            <div class="flex items-center gap-2 mb-4">
                <span id="detalhe-preco" class="text-green-700 font-black text-xl"></span>
                <span id="detalhe-preco-promo" class="text-[11px] text-gray-400 line-through font-bold"></span>
            </div>
            <textarea id="detalhe-obs-item" placeholder="Observações para este item (ex: sem cebola)" class="w-full p-3 bg-gray-100 rounded-xl text-sm outline-none border-none mb-4"></textarea>
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2 bg-gray-50 p-1.5 rounded-xl border border-gray-100">
                    <button onclick="updateModalQty(-1)" class="w-8 h-8 bg-white shadow-sm rounded-lg font-bold text-amber-900 hover:bg-amber-100">-</button>
                    <span id="detalhe-qty" class="text-base font-black w-6 text-center">1</span>
                    <button onclick="updateModalQty(1)" class="w-8 h-8 bg-white shadow-sm rounded-lg font-bold text-amber-900 hover:bg-amber-100">+</button>
                </div>
                <button id="btn-add-to-cart" onclick="adicionarAoCarrinhoDetalhes()" class="bg-amber-600 text-white font-black py-3 px-6 rounded-xl uppercase text-sm">Adicionar</button>
            </div>
            <button onclick="fecharDetalhesProduto()" class="w-full text-gray-400 font-bold py-2 mt-4 text-xs text-center uppercase">Fechar</button>
        </div>
    </div>

    <script type="module">
        // Configurações do Firebase (Substitua com suas próprias URLs e chaves de API)
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const WHATSAPP = "5561999521964"; // Seu número de WhatsApp
        const diaHoje = new Date().getDay().toString();

        // URLs para os dados no Firebase
        const LOGO_URL = DB_BASE + "configuracao/logo.json";
        const PRODUTOS_URL = DB_BASE + "produtos.json";
        const CATEGORIAS_URL = DB_BASE + "categorias.json";
        const VENDAS_URL = DB_BASE + "vendas.json";
        const STORE_INFO_URL = DB_BASE + "configuracao/storeInfo.json";

        let produtosLocal = []; // Todos os produtos carregados
        let carrinho = []; // Itens no carrinho
        let produtoEmDetalhe = null; // Produto atualmente no modal de detalhes

        // --- UTILITIES --- //
        function showToast(message, type = 'success') {
            Toastify({
                text: message,
                duration: 3000,
                close: true,
                gravity: "top",
                position: "right",
                backgroundColor: type === 'success' ? "linear-gradient(to right, #10B981, #059669)" : "linear-gradient(to right, #EF4444, #DC2626)",
                stopOnFocus: true,
            }).showToast();
        }

        function showLoading(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                element.insertAdjacentHTML('beforeend', '<span class="loading-spinner"></span>');
            }
        }

        function hideLoading(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                const spinner = element.querySelector('.loading-spinner');
                if (spinner) spinner.remove();
            }
        }

        async function fetchData(url, method = 'GET', body = null) {
            try {
                const options = { method };
                if (body) options.body = JSON.stringify(body);
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error("Erro na requisição:", error);
                showToast(`Erro ao carregar dados: ${error.message}`, 'error');
                return null;
            }
        }

        // --- INICIALIZAÇÃO --- //
        document.addEventListener('DOMContentLoaded', inicializar);

        async function inicializar() {
            await carregarLogo();
            await carregarInfoLoja();
            await loadMenu();
            updateCartFloat();
        }

        async function carregarLogo() {
            try {
                const data = await fetchData(LOGO_URL);
                if(data) {
                    document.getElementById('loja-logo').src = data;
                    document.getElementById('logo-container').classList.remove('hidden');
                }
            } catch (e) { console.log("Logo não encontrada."); }
        }

        async function carregarInfoLoja() {
            try {
                const info = await fetchData(STORE_INFO_URL);
                if (info) {
                    document.getElementById('store-tagline').innerText = info.description || 'Lanchonete e Restaurante';
                    document.getElementById('store-hours').innerText = info.hours || 'Horário de Funcionamento: Não informado';
                }
            } catch (e) { console.log("Informações da loja não encontradas."); }
        }

        async function loadMenu() {
            const container = document.getElementById('categorias-container');
            container.innerHTML = `<div class="text-center py-10 text-amber-900 animate-pulse text-sm font-bold flex items-center justify-center">Sincronizando cardápio... <span class="loading-spinner"></span></div>`;

            try {
                const dataProd = await fetchData(PRODUTOS_URL);
                if (!dataProd) {
                    container.innerHTML = "<p class='text-center text-xs text-zinc-400'>Nenhum produto disponível no momento.</p>";
                    return;
                }
                
                produtosLocal = Object.keys(dataProd).map(key => ({ id: key, ...dataProd[key], qty: 0, obsItem: '' }));

                const categorias = await fetchData(CATEGORIAS_URL) || [];

                renderMenu(produtosLocal, categorias);

            } catch (e) {
                console.error("Erro ao carregar cardápio:", e);
                container.innerHTML = "<p class='text-center text-xs text-red-500'>Erro ao carregar cardápio. Verifique sua conexão.</p>";
                showToast("Erro ao carregar cardápio. Tente novamente.", 'error');
            }
        }

        function renderMenu(produtos, categorias) {
            const container = document.getElementById('categorias-container');
            let html = "";

            const produtosAtivos = produtos.filter(p => !p.pausado); // Filtra produtos não pausados

            // 1. Sugestão de Hoje (Itens marcados especificamente para hoje e não pausados)
            const sugestoesHj = produtosAtivos.filter(p => p.dias && p.dias.includes(diaHoje));
            if(sugestoesHj.length > 0) {
                html += renderSection("⭐ Sugestão de Hoje", sugestoesHj);
            }

            // 2. Outras Categorias (Produtos fixos/sempre disponíveis e não pausados)
            if (categorias.length === 0) {
                const itensFixos = produtosAtivos.filter(p => !p.dias || p.dias.length === 0);
                if(itensFixos.length > 0) html += renderSection("Cardápio Principal", itensFixos);
            } else {
                categorias.forEach(cat => {
                    const itensNaCat = produtosAtivos.filter(p => 
                        p.categoria === cat && (!p.dias || p.dias.length === 0)
                    );
                    if(itensNaCat.length > 0) html += renderSection(cat, itensNaCat);
                });
            }

            container.innerHTML = html || "<p class='text-center text-xs text-zinc-400'>O cardápio está sendo atualizado ou não há produtos disponíveis. Volte em instantes!</p>";
        }

        function renderSection(titulo, itens) {
            return `
                <section>
                    <h2 class="text-[10px] font-black mb-3 text-amber-900 border-b-2 border-amber-200 pb-1 uppercase tracking-widest">${titulo}</h2>
                    <div class="space-y-3">
                        ${itens.map(p => {
                            const temPromo = p.precoPromo && p.precoPromo < p.preco;
                            const precoFinal = temPromo ? p.precoPromo : p.preco;
                            return `
                            <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center gap-3 border border-amber-100 cursor-pointer hover:bg-amber-50 transition-colors" onclick="abrirDetalhesProduto('${p.id}')">
                                <div class="relative">
                                    <img src="${p.img || 'https://via.placeholder.com/64'}" class="w-16 h-16 object-cover rounded-xl bg-amber-50" alt="${p.nome}">
                                    ${temPromo ? '<span class="absolute -top-2 -left-2 bg-red-600 text-white text-[7px] font-black px-1.5 py-0.5 rounded-full uppercase shadow-sm">Promo</span>' : ''}
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-amber-900 text-xs leading-tight">${p.nome}</h3>
                                    ${p.descricao ? `<p class="text-gray-500 text-[9px] mt-1">${p.descricao}</p>` : ''}
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-green-700 font-black text-sm">R$ ${precoFinal.toFixed(2)}</span>
                                        ${temPromo ? `<span class="text-[9px] text-gray-300 line-through font-bold">R$ ${p.preco.toFixed(2)}</span>` : ''}
                                    </div>
                                </div>
                                <div class="flex items-center gap-2 bg-gray-50 p-1.5 rounded-xl border border-gray-100">
                                    <button onclick="event.stopPropagation(); updateQty('${p.id}', -1)" class="w-7 h-7 bg-white shadow-sm rounded-lg font-bold text-amber-900 hover:bg-amber-100">-</button>
                                    <span id="qty-${p.id}" class="text-xs font-black w-4 text-center">${getCarrinhoItemQty(p.id)}</span>
                                    <button onclick="event.stopPropagation(); updateQty('${p.id}', 1)" class="w-7 h-7 bg-white shadow-sm rounded-lg font-bold text-amber-900 hover:bg-amber-100">+</button>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </section>`;
        }

        function getCarrinhoItemQty(productId) {
            const item = carrinho.find(item => item.id === productId);
            return item ? item.qty : 0;
        }

        function updateQty(id, delta) {
            const produto = produtosLocal.find(p => p.id === id);
            if (!produto) return;

            const itemIndex = carrinho.findIndex(item => item.id === id);

            if (itemIndex > -1) {
                carrinho[itemIndex].qty += delta;
                if (carrinho[itemIndex].qty <= 0) {
                    carrinho.splice(itemIndex, 1); // Remove se a quantidade for 0 ou menos
                }
            } else if (delta > 0) {
                carrinho.push({ ...produto, qty: delta, obsItem: '' });
            }
            
            // Atualiza a exibição da quantidade no card do produto
            const el = document.getElementById(`qty-${id}`);
            if (el) el.innerText = getCarrinhoItemQty(id);

            updateCartFloat();
            showToast(delta > 0 ? `Adicionado ${produto.nome}` : `Removido ${produto.nome}`, 'success');
        }

        function updateCartFloat() {
            const totalItens = carrinho.reduce((sum, item) => sum + item.qty, 0);
            const valorTotal = carrinho.reduce((sum, item) => {
                const preco = item.precoPromo || item.preco;
                return sum + (preco * item.qty);
            }, 0);
            document.getElementById('cart-summary').innerText = `${totalItens} itens | R$ ${valorTotal.toFixed(2)}`;

            if (totalItens > 0) {
                document.getElementById('cart-float').classList.remove('hidden');
            } else {
                document.getElementById('cart-float').classList.add('hidden');
            }
        }

        function filterProducts() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filteredProducts = produtosLocal.filter(p => 
                p.nome.toLowerCase().includes(searchTerm) || 
                (p.descricao && p.descricao.toLowerCase().includes(searchTerm))
            );
            // Renderiza apenas os produtos filtrados, mantendo a estrutura de categorias se houver
            renderMenu(filteredProducts, []); // Passa categorias vazias para renderizar como uma lista única
        }

        // --- MODAL DE DETALHES DO PRODUTO --- //
        function abrirDetalhesProduto(productId) {
            produtoEmDetalhe = produtosLocal.find(p => p.id === productId);
            if (!produtoEmDetalhe) return;

            document.getElementById('detalhe-img').src = produtoEmDetalhe.img || 'https://via.placeholder.com/192';
            document.getElementById('detalhe-nome').innerText = produtoEmDetalhe.nome;
            document.getElementById('detalhe-descricao').innerText = produtoEmDetalhe.descricao || '';
            
            const temPromo = produtoEmDetalhe.precoPromo && produtoEmDetalhe.precoPromo < produtoEmDetalhe.preco;
            const precoFinal = temPromo ? produtoEmDetalhe.precoPromo : produtoEmDetalhe.preco;

            document.getElementById('detalhe-preco').innerText = `R$ ${precoFinal.toFixed(2)}`;
            if (temPromo) {
                document.getElementById('detalhe-preco-promo').innerText = `R$ ${produtoEmDetalhe.preco.toFixed(2)}`;
                document.getElementById('detalhe-preco-promo').classList.remove('hidden');
            } else {
                document.getElementById('detalhe-preco-promo').classList.add('hidden');
            }

            const itemNoCarrinho = carrinho.find(item => item.id === productId);
            document.getElementById('detalhe-qty').innerText = itemNoCarrinho ? itemNoCarrinho.qty : 1;
            document.getElementById('detalhe-obs-item').value = itemNoCarrinho ? itemNoCarrinho.obsItem : '';

            document.getElementById('modal-produto-detalhes').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function fecharDetalhesProduto() {
            document.getElementById('modal-produto-detalhes').classList.add('hidden');
            document.body.classList.remove('modal-open');
            produtoEmDetalhe = null;
        }

        function updateModalQty(delta) {
            const qtyElement = document.getElementById('detalhe-qty');
            let currentQty = parseInt(qtyElement.innerText);
            currentQty = Math.max(1, currentQty + delta); // Quantidade mínima de 1 no modal
            qtyElement.innerText = currentQty;
        }

        function adicionarAoCarrinhoDetalhes() {
            if (!produtoEmDetalhe) return;

            const qty = parseInt(document.getElementById('detalhe-qty').innerText);
            const obsItem = document.getElementById('detalhe-obs-item').value.trim();

            const itemIndex = carrinho.findIndex(item => item.id === produtoEmDetalhe.id);

            if (itemIndex > -1) {
                carrinho[itemIndex].qty = qty;
                carrinho[itemIndex].obsItem = obsItem;
            } else {
                carrinho.push({ ...produtoEmDetalhe, qty: qty, obsItem: obsItem });
            }
            showToast(`Adicionado ${qty}x ${produtoEmDetalhe.nome} ao carrinho!`, 'success');
            updateCartFloat();
            fecharDetalhesProduto();
            // Atualiza a quantidade no card do produto na lista principal
            const el = document.getElementById(`qty-${produtoEmDetalhe.id}`);
            if (el) el.innerText = getCarrinhoItemQty(produtoEmDetalhe.id);
        }

        // --- CHECKOUT --- //
        function abrirCheckout() {
            if(carrinho.length === 0) {
                showToast("Seu carrinho está vazio!", 'error');
                return;
            }
            
            let html = ""; let total = 0;
            carrinho.forEach(item => {
                const precoUnit = item.precoPromo || item.preco;
                const sub = precoUnit * item.qty;
                html += `
                    <div class="flex justify-between items-center font-bold text-[11px] text-gray-700">
                        <span>${item.qty}x ${item.nome} ${item.obsItem ? `(Obs: ${item.obsItem})` : ''}</span>
                        <div class="flex items-center gap-2">
                            <span>R$ ${sub.toFixed(2)}</span>
                            <button onclick="removerItemCarrinho('${item.id}')" class="text-red-500 text-xs font-bold">X</button>
                        </div>
                    </div>
                `;
                total += sub;
            });
            
            document.getElementById('resumo-itens').innerHTML = html;
            document.getElementById('checkout-total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('modal-checkout').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function fecharCheckout() {
            document.getElementById('modal-checkout').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        function limparCarrinho() {
            if(confirm("Deseja esvaziar o carrinho?")) {
                carrinho = [];
                produtosLocal.forEach(p => {
                    const el = document.getElementById(`qty-${p.id}`);
                    if(el) el.innerText = "0";
                });
                updateCartFloat();
                fecharCheckout();
                showToast("Carrinho esvaziado!", 'info');
            }
        }

        function removerItemCarrinho(productId) {
            carrinho = carrinho.filter(item => item.id !== productId);
            updateCartFloat();
            abrirCheckout(); // Recarrega o modal de checkout
            // Atualiza a quantidade no card do produto na lista principal
            const el = document.getElementById(`qty-${productId}`);
            if (el) el.innerText = "0";
            showToast("Item removido do carrinho!", 'info');
        }

        async function enviarPedidoFinal() {
            const btn = document.getElementById('btnConfirmar');
            const n = document.getElementById('cli-nome').value.trim();
            const e = document.getElementById('cli-end').value.trim();
            const tel = document.getElementById('cli-tel').value.trim();

            if(!n || !e) {
                showToast("Nome e Endereço são obrigatórios!", 'error');
                return;
            }

            // Desabilita o botão para evitar cliques múltiplos
            btn.disabled = true;
            btn.innerHTML = 'Enviando... <span class="loading-spinner"></span>';

            const totalGeral = carrinho.reduce((acc, item) => {
                const preco = item.precoPromo || item.preco;
                return acc + (preco * item.qty);
            }, 0);

            const pedidoDados = {
                cliente: n,
                endereco: e,
                referencia: document.getElementById('cli-ref').value.trim(),
                pagamento: document.getElementById('cli-pgto').value,
                observacao: document.getElementById('cli-obs').value.trim(),
                telefone: tel, // Novo campo de telefone
                itens: carrinho.map(p => ({ 
                    nome: p.nome, 
                    qty: p.qty, 
                    preco: (p.precoPromo || p.preco), 
                    obs: p.obsItem 
                })),
                total: totalGeral,
                data: new Date().toISOString(),
                dataLocal: new Date().toLocaleDateString('pt-BR'),
                status: 'pendente' // Novo campo de status para o atendimento
            };

            try {
                // SALVA NO FIREBASE (Relatórios)
                // EM UM AMBIENTE REAL, ISSO DEVERIA SER FEITO VIA FIREBASE FUNCTIONS PARA SEGURANÇA
                await fetchData(VENDAS_URL.replace('.json', `/${Date.now()}.json`), 'PUT', pedidoDados);
                
                // GERA MENSAGEM WHATSAPP
                let msg = `*NOVO PEDIDO - POINT DO CAFÉ*\n\n`;
                msg += `*Cliente:* ${n}\n*Endereço:* ${e}\n`;
                if(pedidoDados.referencia) msg += `*Referência:* ${pedidoDados.referencia}\n`;
                if(pedidoDados.telefone) msg += `*Telefone:* ${pedidoDados.telefone}\n`;
                msg += `*Pagamento:* ${pedidoDados.pagamento}\n`;
                if(pedidoDados.observacao) msg += `*Obs. Geral:* ${pedidoDados.observacao}\n`;
                msg += `\n*ITENS:*\n`;
                carrinho.forEach(p => {
                    msg += `• ${p.qty}x ${p.nome} = R$ ${((p.precoPromo || p.preco) * p.qty).toFixed(2)}\n`;
                    if(p.obsItem) msg += `  (Obs: ${p.obsItem})\n`;
                });
                msg += `\n*TOTAL: R$ ${totalGeral.toFixed(2)}*`;

                window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
                
                showToast("Pedido enviado com sucesso! Redirecionando para o WhatsApp.", 'success');
                limparCarrinho();
                fecharCheckout();
                // Limpa os campos do formulário após o envio
                document.getElementById('cli-nome').value = '';
                document.getElementById('cli-end').value = '';
                document.getElementById('cli-ref').value = '';
                document.getElementById('cli-obs').value = '';
                document.getElementById('cli-tel').value = '';

            } catch (err) {
                console.error("Erro ao enviar pedido:", err);
                showToast("Erro ao enviar pedido. Tente novamente.", 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✅ Confirmar no WhatsApp';
            }
        }
    </script>
</body>
</html>
