<script type="module">
    // ... (restante do código de carregar produtos e carrinho)

    window.finalizarPedidoAutomatico = async () => {
        const n = document.getElementById('cli-nome').value.trim();
        const z = document.getElementById('cli-zap').value.trim().replace(/\D/g, "");
        const e = document.getElementById('cli-end').value.trim();
        const pag = document.getElementById('cli-pagamento').value;
        const troco = document.getElementById('cli-troco').value;
        const obs = document.getElementById('cli-obs').value.trim();

        if(!n || !z || !e) {
            Toastify({text: "Preencha Nome, WhatsApp e Endereço!", style: {background: "red"}}).showToast();
            return;
        }

        // Salva na memória do navegador
        localStorage.setItem('cafe_nome', n);
        localStorage.setItem('cafe_tel', z);
        localStorage.setItem('cafe_end', e);

        const pedidoId = "PED-" + Date.now().toString().slice(-6);
        const totalGeral = carrinho.reduce((acc, i) => acc + i.preco, 0);
        
        // OBJETO COMPLETO DO PEDIDO
        const pedido = {
            id: pedidoId,
            cliente: n,
            telefone: z,
            endereco: e,
            pagamento: pag,
            troco: pag === 'Dinheiro' ? troco : "Não necessário",
            observacao: obs,
            itens: carrinho,
            total: totalGeral,
            status: 'pendente', // IMPORTANTE: Define o status inicial
            data: new Date().toISOString(),
            dataLocal: new Date().toLocaleDateString('pt-BR')
        };

        try {
            await fetch(`${DB_BASE}vendas/${pedidoId}.json`, { 
                method: 'PUT', 
                body: JSON.stringify(pedido) 
            });
            // Redireciona para a página de status
            window.location.href = `status2.html?id=${pedidoId}`;
        } catch (err) {
            alert("Erro ao enviar pedido. Verifique sua conexão.");
        }
    };
</script>
