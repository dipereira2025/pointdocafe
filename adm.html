<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4">

    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900">PAINEL ADMIN</h2>
        <input type="password" id="pass" class="w-full p-4 border rounded-xl mb-4" placeholder="Senha">
        <button onclick="entrar()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold">ACESSAR</button>
    </div>

    <div id="painel" class="hidden max-w-xl mx-auto py-8">
        <h1 class="text-3xl font-black mb-8">Gerenciar Menu</h1>
        
        <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 space-y-4 mb-10">
            <input type="text" id="n" placeholder="Nome do Produto" class="w-full p-4 rounded-xl bg-zinc-700">
            <select id="c" class="w-full p-4 rounded-xl bg-zinc-700">
                <option>Prato do dia</option>
                <option>Combos do dia</option>
                <option>Bebidas</option>
                <option>Salgados</option>
                <option>Bombonieries</option>
            </select>
            <input type="number" id="p" placeholder="Preço" class="w-full p-4 rounded-xl bg-zinc-700">
            
            <!-- CAMPO DE UPLOAD DE IMAGEM -->
            <label class="block text-sm font-medium text-zinc-400 mb-1">Foto do Produto:</label>
            <input type="file" id="fileInput" accept="image/*" class="w-full p-3 rounded-xl bg-zinc-700 text-sm">
            <canvas id="canvas" style="display:none;"></canvas> <!-- Auxiliar para redimensionar -->
            
            <button onclick="salvar()" id="btnSalvar" class="w-full bg-amber-600 py-4 rounded-xl font-black uppercase">Salvar Produto</button>
        </div>

        <div id="lista" class="grid gap-3"></div>
    </div>

    <script>
        const DB_URL = "https://pointdocafe-default-rtdb.firebaseio.com/produtos.json";
        let imagemBase64 = "";

        // Função para transformar imagem em texto (Base64) e diminuir o tamanho
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    // Redimensiona para não pesar no banco de dados (max 400px)
                    const scale = 400 / img.width;
                    canvas.width = 400;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    imagemBase64 = canvas.toDataURL('image/jpeg', 0.7); // Qualidade 70%
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function entrar() {
            if(document.getElementById('pass').value === "cafe789") { 
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                listar();
            } else { alert("Senha incorreta!"); }
        }

        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const nome = document.getElementById('n').value;
            const preco = document.getElementById('p').value;

            if(!nome || !preco || !imagemBase64) return alert("Preencha Nome, Preço e escolha uma Foto!");

            btn.innerText = "SALVANDO...";
            btn.disabled = true;

            const item = {
                nome: nome,
                categoria: document.getElementById('c').value,
                preco: parseFloat(preco),
                img: imagemBase64 // Aqui vai o código da imagem
            };

            await fetch(DB_URL.replace('.json', `/${Date.now()}.json`), { method: 'PUT', body: JSON.stringify(item) });
            
            // Limpar
            document.getElementById('n').value = ""; 
            document.getElementById('p').value = "";
            document.getElementById('fileInput').value = "";
            imagemBase64 = "";
            btn.innerText = "SALVAR PRODUTO";
            btn.disabled = false;
            listar();
        }

        async function listar() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            for(let id in data) {
                lista.innerHTML += `
                    <div class="bg-zinc-800 p-4 flex justify-between items-center rounded-2xl border border-zinc-700">
                        <div class="flex items-center gap-3">
                            <img src="${data[id].img}" class="w-10 h-10 object-cover rounded-lg">
                            <span>${data[id].nome}</span>
                        </div>
                        <button onclick="remover('${id}')" class="text-red-500 font-bold">EXCLUIR</button>
                    </div>`;
            }
        }

        async function remover(id) {
            if(confirm("Excluir item?")) {
                await fetch(DB_URL.replace('produtos.json', `produtos/${id}.json`), { method: 'DELETE' });
                listar();
            }
        }
    </script>
</body>
</html>
