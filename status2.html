<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhe seu Pedido - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step::after { content: ''; position: absolute; left: 19px; top: 40px; height: 40px; width: 2px; background: #e5e7eb; }
        .step:last-child::after { display: none; }
        .active-dot { background: #d97706 !important; color: white !important; border-color: #d97706 !important; box-shadow: 0 0 15px rgba(217, 119, 6, 0.4); }
        .active-text { color: #d97706 !important; font-weight: 900; }
        .bg-coffee { background-color: #fffcf7; }
    </style>
</head>
<body class="bg-coffee flex flex-col items-center min-h-screen p-6">
    <div class="w-full max-w-md bg-white rounded-[3rem] shadow-2xl p-8 border-t-8 border-amber-600 mt-4">
        <header class="text-center mb-10">
            <div id="logo-container" class="hidden">
                <img id="store-logo" src="" class="w-24 h-24 mx-auto mb-4 rounded-full object-cover border-4 border-amber-100 shadow-sm">
            </div>
            <h1 id="store-name" class="text-2xl font-black uppercase italic text-amber-900">Point do Café</h1>
            <p id="order-id" class="text-[10px] font-black text-amber-700 uppercase tracking-widest mt-2">Buscando pedido...</p>
        </header>

        <div class="space-y-12 relative px-4">
            <div id="step-pendente" class="step flex items-center gap-6 relative">
                <div class="w-10 h-10 rounded-full bg-white border-2 border-zinc-200 flex items-center justify-center font-bold z-10">1</div>
                <div><h3 class="text-sm uppercase text-zinc-400">Recebido</h3><p class="text-[9px] text-zinc-400">Pedido enviado com sucesso</p></div>
            </div>
            <div id="step-preparo" class="step flex items-center gap-6 relative">
                <div class="w-10 h-10 rounded-full bg-white border-2 border-zinc-200 flex items-center justify-center font-bold z-10">2</div>
                <div><h3 class="text-sm uppercase text-zinc-400">Em Preparo</h3><p class="text-[9px] text-zinc-400">O barista iniciou o preparo</p></div>
            </div>
            <div id="step-pronto" class="step flex items-center gap-6 relative">
                <div class="w-10 h-10 rounded-full bg-white border-2 border-zinc-200 flex items-center justify-center font-bold z-10">3</div>
                <div><h3 class="text-sm uppercase text-zinc-400">Pronto / Saiu</h3><p class="text-[9px] text-zinc-400">Tudo pronto para você!</p></div>
            </div>
        </div>
        <div class="mt-12 text-center border-t pt-6"><a href="pedidos2.html" class="text-zinc-400 font-bold text-[10px] uppercase">Novo Pedido</a></div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const urlParams = new URLSearchParams(window.location.search);
        const pedidoId = urlParams.get('id');

        async function init() {
            const resL = await fetch(`${DB_BASE}configuracao/logo.json`);
            const lData = await resL.json();
            if(lData) { document.getElementById('store-logo').src = lData; document.getElementById('logo-container').classList.remove('hidden'); }
            
            const resI = await fetch(`${DB_BASE}configuracao/storeInfo.json`);
            const iData = await resI.json();
            if(iData && iData.name) document.getElementById('store-name').innerText = iData.name;
            check();
        }

        async function check() {
            if(!pedidoId) return;
            document.getElementById('order-id').innerText = `PEDIDO: #${pedidoId}`;
            const res = await fetch(`${DB_BASE}vendas/${pedidoId}.json`);
            const data = await res.json();
            if(data) {
                const status = data.status || 'pendente';
                const niveis = { 'pendente': 1, 'preparo': 2, 'pronto': 3 };
                ['pendente', 'preparo', 'pronto'].forEach((s, i) => {
                    const el = document.getElementById(`step-${s}`);
                    if((i + 1) <= niveis[status]) {
                        el.querySelector('div').classList.add('active-dot');
                        el.querySelector('h3').classList.add('active-text');
                    }
                });
            }
        }
        setInterval(check, 5000);
        init();
    </script>
</body>
</html>
