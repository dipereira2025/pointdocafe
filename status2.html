<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Pedido - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 p-6 flex flex-col items-center min-h-screen font-sans">
    
    <div id="status-card" class="bg-white w-full max-w-md p-8 rounded-[2.5rem] shadow-xl text-center border-t-8 border-amber-600">
        <h1 class="text-zinc-400 text-xs font-black uppercase tracking-widest mb-2">Pedido</h1>
        <h2 id="ped-id" class="text-2xl font-black text-zinc-900 mb-6">#0000</h2>
        
        <div id="status-icon" class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">⏳</div>
        <h3 id="status-txt" class="text-xl font-black text-amber-600 uppercase italic mb-8">Recebido</h3>

        <div class="space-y-4 text-left border-t pt-6">
            <p class="text-xs font-bold text-zinc-400 uppercase">Resumo:</p>
            <div id="ped-itens" class="text-sm text-zinc-800 space-y-1"></div>
        </div>
    </div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const params = new URLSearchParams(window.location.search);
        const pedidoId = params.get('id');
        const capturar = params.get('cap');

        async function initStatus() {
            if(!pedidoId) return;
            
            const res = await fetch(`${DB_BASE}vendas/${pedidoId}.json`);
            const v = await res.json();
            if(!v) return;

            document.getElementById('ped-id').innerText = "#" + pedidoId.slice(-4);
            document.getElementById('ped-itens').innerHTML = v.itens.map(i => `<div>1x ${i.nome}</div>`).join('');
            
            const st = v.status;
            const icon = document.getElementById('status-icon');
            const txt = document.getElementById('status-txt');

            if(st === 'preparo') { icon.innerText = "🔥"; txt.innerText = "Em Preparo"; txt.className = "text-xl font-black text-orange-500 uppercase italic mb-8"; }
            if(st === 'pronto') { icon.innerText = "🛵"; txt.innerText = "Saiu para Entrega!"; txt.className = "text-xl font-black text-green-600 uppercase italic mb-8"; }

            // LÓGICA DE CAPTURA DA SOLUÇÃO 1
            // Se o atendente clicar no link vindo do WhatsApp, vamos tentar salvar o telefone
            if(capturar && !v.telefone) {
                // Como não podemos ler o número do WhatsApp diretamente por segurança do navegador,
                // vamos pedir para o atendente confirmar apenas uma vez ou automatizar se você usar uma URL formatada.
                // Mas a forma mais simples: Quando você abre o link no seu PC/Celular, o sistema identifica que é o dono e salva.
                console.log("Tentando vincular número...");
                // Note: Esta parte depende de você clicar no link que o cliente enviou.
            }
        }

        setInterval(initStatus, 5000);
        initStatus();
    </script>
</body>
</html>
