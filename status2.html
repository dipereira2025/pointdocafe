<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Pedido - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step::after { content: ''; position: absolute; left: 19px; top: 40px; height: 40px; width: 2px; background: #e5e7eb; }
        .step:last-child::after { display: none; }
        .active-dot { background: #d97706 !important; color: white !important; border-color: #d97706 !important; }
        .active-text { color: #d97706 !important; font-weight: 900; }
    </style>
</head>
<body class="bg-zinc-50 flex flex-col items-center justify-center min-h-screen p-6 text-left">
    <div class="w-full max-w-md bg-white rounded-[3rem] shadow-2xl p-10 border-t-8 border-amber-600">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-black uppercase italic text-amber-900">Seu Pedido</h1>
            <p id="order-id" class="text-[10px] font-bold text-zinc-400 mt-2 tracking-widest uppercase">Buscando pedido...</p>
        </header>

        <div class="space-y-12 relative">
            <div id="step-pendente" class="step flex items-center gap-6 relative">
                <div class="w-10 h-10 rounded-full bg-white border-2 border-zinc-200 flex items-center justify-center font-bold z-10">1</div>
                <div><h3 class="text-sm uppercase text-zinc-400">Recebido</h3><p class="text-[9px] text-zinc-400">Aguardando confirmação</p></div>
            </div>
            <div id="step-preparo" class="step flex items-center gap-6 relative">
                <div class="w-10 h-10 rounded-full bg-white border-2 border-zinc-200 flex items-center justify-center font-bold z-10">2</div>
                <div><h3 class="text-sm uppercase text-zinc-400">Em Preparo</h3><p class="text-[9px] text-zinc-400">O barista iniciou o preparo</p></div>
            </div>
            <div id="step-pronto" class="step flex items-center gap-6 relative">
                <div class="w-10 h-10 rounded-full bg-white border-2 border-zinc-200 flex items-center justify-center font-bold z-10">3</div>
                <div><h3 class="text-sm uppercase text-zinc-400">Pronto / Saiu</h3><p class="text-[9px] text-zinc-400">Pedido finalizado!</p></div>
            </div>
        </div>

        <div class="mt-12 text-center border-t pt-6">
            <a href="pedidos2.html" class="text-zinc-400 font-bold text-[10px] uppercase">Fazer outro pedido</a>
        </div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const urlParams = new URLSearchParams(window.location.search);
        const pedidoId = urlParams.get('id');

        async function checkStatus() {
            if(!pedidoId) return;
            document.getElementById('order-id').innerText = `ID: #${pedidoId}`;
            try {
                const res = await fetch(`${DB_BASE}vendas/${pedidoId}.json`);
                const data = await res.json();
                if(data) {
                    const status = data.status || 'pendente';
                    const niveis = { 'pendente': 1, 'preparo': 2, 'pronto': 3 };
                    const atual = niveis[status];
                    ['pendente', 'preparo', 'pronto'].forEach((s, i) => {
                        const el = document.getElementById(`step-${s}`);
                        if((i + 1) <= atual) {
                            el.querySelector('div').classList.add('active-dot');
                            el.querySelector('h3').classList.add('active-text');
                        }
                    });
                }
            } catch (e) { console.error(e); }
        }
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
