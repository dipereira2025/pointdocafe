<script type="module">
    const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
    const LOGO_URL = DB_BASE + "configuracao/logo.json"; // Caminho onde o admin salva a logo
    const urlParams = new URLSearchParams(window.location.search);
    const pedidoId = urlParams.get('id');

    // Função para carregar a logo do Firebase
    async function carregarLogo() {
        try {
            const res = await fetch(LOGO_URL);
            const logoData = await res.json();
            if(logoData) {
                const imgLogo = document.querySelector('header img');
                imgLogo.src = logoData;
                imgLogo.classList.remove('hidden');
            }
        } catch (e) { console.error("Erro ao carregar logo:", e); }
    }

    async function checkStatus() {
        if(!pedidoId) {
            document.getElementById('order-id').innerText = "Pedido não encontrado";
            return;
        }
        document.getElementById('order-id').innerText = `PEDIDO: #${pedidoId.slice(-6)}`;
        
        try {
            const res = await fetch(`${DB_BASE}vendas/${pedidoId}.json`);
            const data = await res.json();
            if(data) {
                const status = data.status || 'pendente';
                const niveis = { 'pendente': 1, 'preparo': 2, 'pronto': 3 };
                const atual = niveis[status];

                ['pendente', 'preparo', 'pronto'].forEach((s, i) => {
                    const stepIdx = i + 1;
                    const el = document.getElementById(`step-${s}`);
                    if(stepIdx <= atual) {
                        el.querySelector('div').classList.add('active-dot');
                        el.querySelector('h3').classList.add('active-text');
                    }
                });
            }
        } catch (e) { console.error(e); }
    }

    // Inicialização
    carregarLogo();
    setInterval(checkStatus, 5000);
    checkStatus();
</script>
