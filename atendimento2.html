<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparo de pedidos Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { display: none !important; }
            #secao-impressao, #secao-impressao * { display: block !important; }
            #secao-impressao { width: 72mm; font-family: 'Courier New', monospace; font-size: 12pt; }
            .quebra-pagina { page-break-after: always; border-bottom: 2px dashed #000; margin-bottom: 20px; padding-bottom: 20px; }
        }
        .status-pendente { border-left: 8px solid #f59e0b; }
        .status-pronto { border-left: 8px solid #10b981; opacity: 0.6; }
        .aba-atendimento.hidden { display: none; }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">

    <!-- Header Principal -->
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <div class="flex items-center gap-4">
            <div id="logo-container" class="w-16 h-16 hidden">
                <img id="loja-logo" class="w-full h-full object-contain rounded-full shadow-sm">
            </div>
            <div>
                <h1 class="text-xl font-black text-zinc-800 uppercase italic">Point do Café</h1>
                <p id="status-rede" class="text-[9px] text-green-600 font-bold uppercase tracking-widest">● Em funcionamento</p>
            </div>
        </div>
        <div class="text-right">
            <p id="hora-atual" class="font-bold text-zinc-400 text-xs"></p>
            <p class="text-[7px] text-zinc-300 font-black uppercase tracking-tighter">DPTech Solutions</p>
        </div>
    </header>

    <!-- Menu de Navegação do Atendente -->
    <div class="max-w-2xl mx-auto mb-6 flex bg-white rounded-2xl p-1 shadow-sm border border-zinc-200">
        <button onclick="mudarAbaAtendimento('aba-fila')" id="btn-aba-fila" class="flex-1 py-3 rounded-xl font-black uppercase text-[10px] bg-zinc-800 text-white transition-all">📋 Fila de Pedidos</button>
        <button onclick="mudarAbaAtendimento('aba-estoque')" id="btn-aba-estoque" class="flex-1 py-3 rounded-xl font-black uppercase text-[10px] text-zinc-500 transition-all">🚫 Estoque do Dia</button>
    </div>

    <!-- ABA 1: FILA DE PEDIDOS (KDS) -->
    <div id="aba-fila" class="aba-atendimento">
        <div class="max-w-2xl mx-auto mb-4 flex gap-4 text-[9px] font-bold uppercase px-2">
            <span class="flex items-center gap-1"><div class="w-3 h-3 bg-amber-500 rounded"></div> Pendente</span>
            <span class="flex items-center gap-1"><div class="w-3 h-3 bg-green-500 rounded"></div> Pronto</span>
        </div>
        <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>
    </div>

    <!-- ABA 2: GESTÃO DE ESTOQUE (PAUSAR ITENS) -->
    <div id="aba-estoque" class="aba-atendimento hidden">
        <div class="max-w-2xl mx-auto bg-white p-6 rounded-3xl shadow-sm border-b-4 border-red-500">
            <h2 class="text-zinc-800 font-black uppercase text-sm mb-2">Disponibilidade de Itens</h2>
            <p class="text-[10px] text-zinc-400 mb-6 uppercase font-bold tracking-tight">Desative produtos que acabaram no balcão.</p>
            <div id="lista-gestao-estoque" class="space-y-3">
                <!-- Itens carregados via JS -->
            </div>
        </div>
    </div>

    <!-- Área Oculta de Impressão -->
    <div id="secao-impressao" class="hidden"></div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let pedidosImpressos = JSON.parse(localStorage.getItem('pedidos_impressos')) || [];
        let pedidosProntos = JSON.parse(localStorage.getItem('pedidos_prontos')) || [];

        async function inicializar() {
            await carregarLogo();
            monitorar();
            setInterval(() => {
                document.getElementById('hora-atual').innerText = new Date().toLocaleTimeString('pt-BR');
                monitorar();
            }, 10000);
        }

        async function carregarLogo() {
            try {
                const res = await fetch(DB_BASE + "configuracao/logo.json");
                const logo = await res.json();
                if(logo) {
                    document.getElementById('loja-logo').src = logo;
                    document.getElementById('logo-container').classList.remove('hidden');
                }
            } catch (e) { console.log("Sem logo configurada."); }
        }

        // --- ABA: FILA DE PEDIDOS ---
        async function monitorar() {
            try {
                const res = await fetch(DB_BASE + "vendas.json");
                const vendas = await res.json();
                if (!vendas) return;

                const container = document.getElementById('lista-pedidos');
                const hoje = new Date().toLocaleDateString('pt-BR');
                
                const todosIds = Object.keys(vendas).filter(id => vendas[id].dataLocal === hoje);
                const pendentes = todosIds.filter(id => !pedidosProntos.includes(id)).sort();
                const prontos = todosIds.filter(id => pedidosProntos.includes(id)).reverse();
                const listaFinal = [...pendentes, ...prontos];

                let html = "";
                for (let id of listaFinal) {
                    const v = vendas[id];
                    const numPedido = id.slice(-4);
                    const isPronto = pedidosProntos.includes(id);

                    if (!pedidosImpressos.includes(id)) { await imprimir(id, v); }

                    html += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm transition-all ${isPronto ? 'status-pronto' : 'status-pendente'}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black text-xl">#${numPedido}</span>
                                    ${!isPronto ? '<span class="animate-ping inline-flex h-2 w-2 rounded-full bg-amber-400"></span>' : ''}
                                </div>
                                <button onclick="reimprimir('${id}')" class="text-[9px] uppercase font-bold text-zinc-300 underline">Reimprimir Vias</button>
                            </div>
                            <h2 class="text-xl font-black text-zinc-800 uppercase mb-2">${v.cliente}</h2>
                            <div class="space-y-1 mb-6 text-lg font-medium text-zinc-700">
                                ${v.itens.map(i => `<div class="border-b border-zinc-50"><b>${i.qty}x</b> ${i.nome}</div>`).join('')}
                                ${v.observacao ? `<div class="mt-2 text-red-600 text-[10px] font-bold italic">OBS: ${v.observacao}</div>` : ''}
                            </div>
                            <button onclick="togglePronto('${id}')" class="w-full py-4 rounded-2xl font-black uppercase text-xs tracking-widest transition-all ${isPronto ? 'bg-zinc-200 text-zinc-500' : 'bg-green-600 text-white shadow-lg shadow-green-100'}">
                                ${isPronto ? '↩️ Voltar para Fila' : '✅ Pedido Pronto'}
                            </button>
                        </div>
                    `;
                }
                container.innerHTML = html || "<p class='text-center py-20 text-zinc-400 font-bold uppercase'>Aguardando Pedidos...</p>";
            } catch (e) { console.error(e); }
        }

        // --- ABA: GESTÃO DE ESTOQUE ---
        function mudarAbaAtendimento(id) {
            document.querySelectorAll('.aba-atendimento').forEach(a => a.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            
            const btnFila = document.getElementById('btn-aba-fila');
            const btnEstoque = document.getElementById('btn-aba-estoque');
            
            if(id === 'aba-fila') {
                btnFila.className = 'flex-1 py-3 rounded-xl font-black uppercase text-[10px] bg-zinc-800 text-white';
                btnEstoque.className = 'flex-1 py-3 rounded-xl font-black uppercase text-[10px] text-zinc-500';
            } else {
                btnFila.className = 'flex-1 py-3 rounded-xl font-black uppercase text-[10px] text-zinc-500';
                btnEstoque.className = 'flex-1 py-3 rounded-xl font-black uppercase text-[10px] bg-zinc-800 text-white';
                carregarGestaoEstoque();
            }
        }

        async function carregarGestaoEstoque() {
            const res = await fetch(DB_BASE + "produtos.json");
            const produtos = await res.json();
            const container = document.getElementById('lista-gestao-estoque');
            let html = "";
            if(!produtos) return container.innerHTML = "Sem produtos cadastrados.";

            for (let id in produtos) {
                const p = produtos[id];
                const isPausado = p.pausado === true;
                html += `
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl border ${isPausado ? 'border-red-200' : 'border-zinc-100'}">
                        <div class="flex items-center gap-3 text-left">
                            <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg ${isPausado ? 'grayscale opacity-50' : ''}">
                            <div>
                                <p class="font-bold text-xs ${isPausado ? 'text-red-400 line-through' : 'text-zinc-800'}">${p.nome}</p>
                                <p class="text-[8px] font-black uppercase ${isPausado ? 'text-red-400' : 'text-amber-600'}">${isPausado ? 'Esgotado' : 'Disponível'}</p>
                            </div>
                        </div>
                        <button onclick="toggleEstoque('${id}', ${isPausado})" class="px-4 py-2 rounded-xl font-black text-[9px] uppercase transition-all ${isPausado ? 'bg-green-600 text-white' : 'bg-red-500 text-white'}">
                            ${isPausado ? 'Ativar' : 'Pausar'}
                        </button>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function toggleEstoque(id, statusAtual) {
            await fetch(DB_BASE + `produtos/${id}/pausado.json`, { method: 'PUT', body: JSON.stringify(!statusAtual) });
            carregarGestaoEstoque();
        }

        function togglePronto(id) {
            if (pedidosProntos.includes(id)) { pedidosProntos = pedidosProntos.filter(x => x !== id); } 
            else { pedidosProntos.push(id); }
            localStorage.setItem('pedidos_prontos', JSON.stringify(pedidosProntos));
            monitorar();
        }

        async function imprimir(id, v) {
            const numPedido = id.slice(-4);
            const printArea = document.getElementById('secao-impressao');
            printArea.innerHTML = `
                <div class="quebra-pagina" style="text-align: center; text-transform: uppercase;">
                    <h2 style="margin:0;">COZINHA - POINT DO CAFÉ</h2>
                    <p style="margin:0; font-size: 24px; font-weight: black;">#${numPedido}</p>
                    --------------------------------
                    <div style="text-align: left; margin: 5px 0;">CLIENTE: ${v.cliente}<br>HORA: ${new Date().toLocaleTimeString('pt-BR')}</div>
                    --------------------------------
                    <div style="text-align: left; font-size: 16px; font-weight: bold;">
                        ${v.itens.map(i => `${i.qty}x ${i.nome}`).join('<br>')}
                    </div>
                    --------------------------------
                    ${v.observacao ? `<div style="text-align: left;">OBS: ${v.observacao}</div>` : ''}
                </div>
                <div style="text-align: center; text-transform: uppercase;">
                    <h2 style="margin:0;">ENTREGADOR - POINT DO CAFÉ</h2>
                    <p style="margin:0; font-size: 24px; font-weight: black;">#${numPedido}</p>
                    --------------------------------
                    <div style="text-align: left; margin: 5px 0;">
                        <b>CLIENTE: ${v.cliente}</b><br>
                        ENDEREÇO: ${v.endereco}<br>
                        PGTO: ${v.pagamento}<br>
                        TOTAL: R$ ${v.total.toFixed(2)}
                    </div>
                    --------------------------------
                    <div style="text-align: center; margin-top: 10px; font-size: 10px;">DPTech Terminal</div>
                </div>
            `;
            window.print();
            if (!pedidosImpressos.includes(id)) {
                pedidosImpressos.push(id);
                localStorage.setItem('pedidos_impressos', JSON.stringify(pedidosImpressos));
            }
        }

        function reimprimir(id) { pedidosImpressos = pedidosImpressos.filter(x => x !== id); monitorar(); }

        inicializar();
    </script>
</body>
</html>
