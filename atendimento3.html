<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { display: none !important; }
            #secao-impressao, #secao-impressao * { display: block !important; }
            #secao-impressao { width: 72mm; font-family: 'Courier New', monospace; font-size: 10pt; padding: 5px; }
            .divisa { border-bottom: 1px dashed #000; margin: 5px 0; }
        }
        .status-pendente { border-left: 8px solid #f59e0b; }
        .status-preparo { border-left: 8px solid #3b82f6; }
        .status-pronto { border-left: 8px solid #10b981; opacity: 0.6; }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <h1 class="text-xl font-black uppercase italic">Fila de Pedidos</h1>
        <div id="relogio" class="font-bold text-zinc-400">00:00:00</div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>
    <div id="secao-impressao" class="hidden"></div>
    <audio id="alerta" src="https://www.soundjay.com/buttons/button-2.mp3" preload="auto"></audio>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let ultimaQtd = 0;

        async function carregar() {
            const res = await fetch(`${DB_BASE}vendas.json`);
            const vendas = await res.json();
            const container = document.getElementById('lista-pedidos');
            if(!vendas) return;

            const hoje = new Date().toLocaleDateString('pt-BR');
            const pedidos = Object.keys(vendas).map(id => ({id, ...vendas[id]})).filter(v => v.dataLocal === hoje);

            if(pedidos.length > ultimaQtd && ultimaQtd !== 0) document.getElementById('alerta').play().catch(() => {});
            ultimaQtd = pedidos.length;

            container.innerHTML = "";
            pedidos.reverse().forEach(v => {
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl shadow-sm status-${v.status}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black">#${v.id.slice(-4)}</span>
                            <button onclick="imprimir('${v.id}')" class="text-[10px] font-bold text-zinc-400 underline uppercase">Reimprimir Nota</button>
                        </div>
                        <div class="mb-4 text-xs font-bold uppercase">
                            <p>${v.cliente}</p><p class="font-normal text-zinc-500">${v.endereco} ${v.referencia ? `(${v.referencia})` : ''}</p>
                            ${v.troco ? `<p class="text-red-600">Troco: R$ ${v.troco}</p>` : ''}
                        </div>
                        <div class="mb-6 font-bold text-sm text-zinc-700">${v.itens.map(i => `<div>1x ${i.nome}</div>`).join('')}</div>
                        <div class="flex gap-2">
                            ${v.status === 'pendente' ? `<button onclick="status('${v.id}', 'preparo')" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs">🔥 Iniciar</button>` : ''}
                            ${v.status === 'preparo' ? `<button onclick="status('${v.id}', 'pronto')" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs">✅ Finalizar</button>` : ''}
                        </div>
                    </div>`;
            });
        }

        window.imprimir = async (id) => {
            const res = await fetch(`${DB_BASE}vendas/${id}.json`);
            const v = await res.json();
            document.getElementById('secao-impressao').innerHTML = `
                <div style="text-align:center; text-transform:uppercase;">
                    <h2 style="margin:0;">POINT DO CAFÉ</h2><p>PEDIDO #${id.slice(-4)}</p>
                    <div class="divisa"></div>
                    <div style="text-align:left;">
                        <b>CLIENTE:</b> ${v.cliente}<br><b>END:</b> ${v.endereco}<br>
                        ${v.referencia ? `<b>REF:</b> ${v.referencia}<br>` : ''}<b>PAGTO:</b> ${v.pagamento}<br>
                        ${v.troco ? `<b>TROCO P/:</b> R$ ${v.troco}<br>` : ''}
                        <div class="divisa"></div>${v.itens.map(i => `1x ${i.nome}`).join('<br>')}
                        <div class="divisa"></div><b>TOTAL: R$ ${v.total.toFixed(2)}</b>
                    </div>
                </div>`;
            window.print();
        };

        window.status = async (id, s) => { await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify(s) }); carregar(); };
        setInterval(carregar, 5000);
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        carregar();
    </script>
</body>
</html>
