<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Atendimento - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { display: none !important; }
            #secao-impressao, #secao-impressao * { display: block !important; }
            #secao-impressao { width: 72mm; font-family: 'Courier New', monospace; font-size: 10pt; padding: 5px; }
            .divisa { border-bottom: 1px dashed #000; margin: 5px 0; }
        }
        .tempo-ok { border-left: 8px solid #10b981; background-color: #f0fdf4; } 
        .tempo-alerta { border-left: 8px solid #f59e0b; background-color: #fffbeb; } 
        .tempo-atrasado { border-left: 8px solid #ef4444; background-color: #fef2f2; } 
        .status-pronto { border-left: 8px solid #6b7280; opacity: 0.6; background-color: #f4f4f5; } 
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <h1 class="text-xl font-black uppercase italic">Fila de Produção</h1>
        <div id="relogio" class="font-bold text-zinc-400">00:00:00</div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>
    <div id="secao-impressao" class="hidden"></div>
    
    <audio id="alerta-sonoro" src="https://www.soundjay.com/buttons/button-2.mp3" preload="auto"></audio>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let pedidosIDConhecidos = new Set();
        const TEMPO_LIMITE_MINUTOS = 25;

        // Função para calcular a cor baseada no tempo
        function calcularClasseTempo(dataIso) {
            const agora = new Date();
            const pedidoHora = new Date(dataIso);
            const diffMinutos = Math.floor((agora - pedidoHora) / 1000 / 60);

            if (diffMinutos < 10) return "tempo-ok";
            if (diffMinutos < TEMPO_LIMITE_MINUTOS) return "tempo-alerta";
            return "tempo-atrasado";
        }

        // Função Principal de Carga
        async function carregar() {
            try {
                const res = await fetch(`${DB_BASE}vendas.json`);
                const vendas = await res.json();
                const container = document.getElementById('lista-pedidos');
                if(!vendas) {
                    container.innerHTML = "<p class='text-center text-zinc-400 font-bold uppercase py-10'>Aguardando Pedidos...</p>";
                    return;
                }

                const hoje = new Date().toLocaleDateString('pt-BR');
                let pedidos = Object.keys(vendas).map(id => ({id, ...vendas[id]}))
                    .filter(v => v.dataLocal === hoje);

                // Ordenação: Pendentes/Preparo primeiro, mais antigos no topo
                pedidos.sort((a, b) => {
                    if (a.status === 'pronto' && b.status !== 'pronto') return 1;
                    if (a.status !== 'pronto' && b.status === 'pronto') return -1;
                    return new Date(a.data) - new Date(b.data);
                });

                // Alerta Sonoro
                let novoPedido = false;
                pedidos.forEach(p => {
                    if (!pedidosIDConhecidos.has(p.id)) {
                        pedidosIDConhecidos.add(p.id);
                        novoPedido = true;
                    }
                });
                if (novoPedido && pedidosIDConhecidos.size > pedidos.length) {
                    document.getElementById('alerta-sonoro').play().catch(() => {});
                }

                container.innerHTML = "";
                pedidos.forEach(v => {
                    const classeTempo = v.status === 'pronto' ? 'status-pronto' : calcularClasseTempo(v.data);
                    const minutosPassados = Math.floor((new Date() - new Date(v.data)) / 1000 / 60);
                    
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm ${classeTempo} transition-colors duration-500">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black">#${v.id.slice(-4)}</span>
                                <div class="text-right">
                                    <span class="text-[10px] font-bold uppercase block text-zinc-400">Há ${minutosPassados} min</span>
                                    <button onclick="imprimir('${v.id}')" class="text-[9px] font-bold text-amber-600 underline uppercase">Imprimir</button>
                                </div>
                            </div>
                            <div class="mb-4 text-xs font-bold uppercase">
                                <p class="text-zinc-900">${v.cliente}</p>
                                <p class="font-normal text-zinc-500">${v.endereco} ${v.referencia ? `(${v.referencia})` : ''}</p>
                                ${v.troco ? `<p class="text-red-600">Troco: R$ ${v.troco}</p>` : ''}
                            </div>
                            <div class="mb-6 font-bold text-sm text-zinc-700">
                                ${v.itens.map(i => `<div class="border-b border-zinc-100 py-1">1x ${i.nome}</div>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                ${v.status === 'pendente' ? `<button onclick="alterarStatus('${v.id}', 'preparo')" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs">🔥 Iniciar Preparo</button>` : ''}
                                ${v.status === 'preparo' ? `<button onclick="alterarStatus('${v.id}', 'pronto')" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs">✅ Finalizar</button>` : ''}
                                ${v.status === 'pronto' ? `<button onclick="alterarStatus('${v.id}', 'preparo')" class="flex-1 py-2 bg-zinc-200 text-zinc-500 rounded-xl font-bold uppercase text-[10px]">↩️ Reabrir</button>` : ''}
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        // Função para Alterar Status
        window.alterarStatus = async (id, s) => { 
            try {
                await fetch(`${DB_BASE}vendas/${id}/status.json`, { 
                    method: 'PUT', 
                    body: JSON.stringify(s) 
                }); 
                carregar(); 
            } catch (err) {
                console.error("Erro ao mudar status:", err);
            }
        };

        // Função de Impressão
        window.imprimir = async (id) => {
            const res = await fetch(`${DB_BASE}vendas/${id}.json`);
            const v = await res.json();
            document.getElementById('secao-impressao').innerHTML = `
                <div style="text-align:center; text-transform:uppercase;">
                    <h2 style="margin:0;">POINT DO CAFÉ</h2><p>PEDIDO #${id.slice(-4)}</p>
                    <div class="divisa"></div>
                    <div style="text-align:left;">
                        <b>CLIENTE:</b> ${v.cliente}<br><b>END:</b> ${v.endereco}<br>
                        ${v.referencia ? `<b>REF:</b> ${v.referencia}<br>` : ''}<b>PAGTO:</b> ${v.pagamento}<br>
                        ${v.troco ? `<b>TROCO P/:</b> R$ ${v.troco}<br>` : ''}
                        <div class="divisa"></div>${v.itens.map(i => `1x ${i.nome}`).join('<br>')}
                        <div class="divisa"></div><b>TOTAL: R$ ${v.total.toFixed(2)}</b>
                    </div>
                </div>`;
            window.print();
        };

        // Intervalos e Carga Inicial
        setInterval(carregar, 5000); 
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        carregar();
    </script>
</body>
</html>
