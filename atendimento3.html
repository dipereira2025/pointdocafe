<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Atendimento - DPTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        /* Estilo para Impressora Térmica */
        @media print {
            body * { display: none !important; }
            #secao-impressao, #secao-impressao * { display: block !important; }
            #secao-impressao { width: 72mm; font-family: 'Courier New', monospace; font-size: 10pt; }
            .quebra { border-bottom: 1px dashed #000; margin-bottom: 10px; }
        }
        .status-pendente { border-left: 8px solid #f59e0b; }
        .status-preparo { border-left: 8px solid #3b82f6; }
        .status-pronto { border-left: 8px solid #10b981; opacity: 0.6; }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">

    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <h1 class="text-xl font-black uppercase italic">Fila de Pedidos</h1>
        <div id="relogio" class="font-bold text-zinc-400">00:00:00</div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>
    
    <div id="secao-impressao" class="hidden"></div>
    
    <audio id="new-order-sound" src="https://www.soundjay.com/buttons/button-2.mp3" preload="auto"></audio>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let ultimoQtdPedidos = 0;

        async function carregarPedidos() {
            try {
                const res = await fetch(`${DB_BASE}vendas.json`);
                const vendas = await res.json();
                const container = document.getElementById('lista-pedidos');
                if(!vendas) return;

                const pedidosArray = Object.keys(vendas).map(id => ({ id, ...vendas[id] }));
                const hoje = new Date().toLocaleDateString('pt-BR');
                const pedidosHoje = pedidosArray.filter(v => v.dataLocal === hoje);

                // ALARME SONORO: Se houver mais pedidos do que na última checagem
                if (pedidosHoje.length > ultimoQtdPedidos && ultimoQtdPedidos !== 0) {
                    document.getElementById('new-order-sound').play().catch(e => console.log("Aguardando interação do usuário para som"));
                }
                ultimoQtdPedidos = pedidosHoje.length;

                container.innerHTML = "";
                pedidosHoje.reverse().forEach(v => {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm status-${v.status}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black">#${v.id.slice(-4)}</span>
                                <button onclick="reimprimirNota('${v.id}')" class="text-[10px] font-bold text-zinc-400 underline uppercase">Reimprimir Nota</button>
                            </div>
                            <div class="mb-4 text-xs">
                                <p class="font-black text-amber-900 uppercase">${v.cliente}</p>
                                <p>${v.endereco}</p>
                                ${v.referencia ? `<p class="text-zinc-500 italic">Ref: ${v.referencia}</p>` : ''}
                                ${v.troco ? `<p class="text-red-600 font-bold">Troco para: R$ ${v.troco}</p>` : ''}
                            </div>
                            <div class="mb-6 font-bold text-sm text-zinc-700">
                                ${v.itens.map(i => `<div>1x ${i.nome}</div>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                ${v.status === 'pendente' ? `<button onclick="mudarStatus('${v.id}', 'preparo')" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs">🔥 Iniciar Preparo</button>` : ''}
                                ${v.status === 'preparo' ? `<button onclick="mudarStatus('${v.id}', 'pronto')" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs">✅ Finalizar</button>` : ''}
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        // FUNÇÃO DE IMPRESSÃO DIRETA
        window.reimprimirNota = async (id) => {
            const res = await fetch(`${DB_BASE}vendas/${id}.json`);
            const v = await res.json();
            const area = document.getElementById('secao-impressao');
            
            area.innerHTML = `
                <div style="text-align:center; text-transform:uppercase;">
                    <h2 style="margin:0;">POINT DO CAFÉ</h2>
                    <p style="margin:0;">PEDIDO #${id.slice(-4)}</p>
                    <div class="quebra"></div>
                    <div style="text-align:left;">
                        <b>CLIENTE:</b> ${v.cliente}<br>
                        <b>END:</b> ${v.endereco}<br>
                        ${v.referencia ? `<b>REF:</b> ${v.referencia}<br>` : ''}
                        <b>PAGTO:</b> ${v.pagamento}<br>
                        ${v.troco ? `<b>TROCO P/:</b> R$ ${v.troco}<br>` : ''}
                        <div class="quebra"></div>
                        ${v.itens.map(i => `1x ${i.nome}`).join('<br>')}
                        <div class="quebra"></div>
                        <b>TOTAL: R$ ${v.total.toFixed(2)}</b>
                    </div>
                </div>
            `;
            window.print();
        };

        window.mudarStatus = async (id, status) => {
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify(status) });
            carregarPedidos();
        };

        setInterval(carregarPedidos, 5000);
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        carregarPedidos();
    </script>
</body>
</html>
