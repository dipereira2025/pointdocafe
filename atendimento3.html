<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozinha - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tempo-ok { border-left: 8px solid #10b981; background-color: #fff; } 
        .tempo-atrasado { border-left: 8px solid #ef4444; background-color: #fff; border-right: 8px solid #ef4444; } 
        .status-pronto { opacity: 0.5; grayscale: 100%; }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans">
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <h1 class="text-xl font-black uppercase italic">Fila de Produção</h1>
        <div id="relogio" class="font-bold text-zinc-400">00:00:00</div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>
    <audio id="alerta-sonoro" src="https://www.soundjay.com/buttons/button-2.mp3" preload="auto"></audio>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let pedidosIDConhecidos = new Set();

        async function carregar() {
            try {
                const res = await fetch(`${DB_BASE}vendas.json`);
                const vendas = await res.json();
                const container = document.getElementById('lista-pedidos');
                if(!vendas) return;

                const hoje = new Date().toLocaleDateString('pt-BR');
                let pedidos = Object.keys(vendas).map(id => ({id, ...vendas[id]}))
                    .filter(v => v.dataLocal === hoje);

                pedidos.sort((a, b) => new Date(a.data) - new Date(b.data));

                // Alerta sonoro para novos pedidos
                pedidos.forEach(p => { 
                    if (!pedidosIDConhecidos.has(p.id) && p.status === 'pendente') { 
                        pedidosIDConhecidos.add(p.id); 
                        document.getElementById('alerta-sonoro').play().catch(() => {});
                    } 
                });

                container.innerHTML = "";
                pedidos.forEach(v => {
                    if(v.status === 'finalizado') return;

                    const diffMin = Math.floor((new Date() - new Date(v.data)) / 1000 / 60);
                    const classeTempo = diffMin > 20 ? 'tempo-atrasado' : 'tempo-ok';
                    const pronto = v.status === 'pronto' ? 'status-pronto' : '';
                    
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm ${classeTempo} ${pronto} transition-all">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black text-xs">#${v.id.slice(-4)}</span>
                                <span class="text-[10px] font-bold uppercase text-zinc-400">${diffMin} min atrás</span>
                            </div>
                            <div class="mb-4">
                                <p class="font-black text-sm uppercase italic">${v.cliente}</p>
                                <p class="text-[10px] text-zinc-500 font-bold">${v.endereco}</p>
                            </div>
                            <div class="mb-6 space-y-1">
                                ${v.itens.map(i => `<div class="p-2 bg-zinc-50 rounded-lg text-xs font-bold uppercase">1x ${i.nome}</div>`).join('')}
                                ${v.observacao ? `<p class="text-[10px] text-red-500 font-bold italic mt-2">OBS: ${v.observacao}</p>` : ''}
                            </div>
                            <div class="flex gap-2">
                                ${v.status === 'pendente' ? `<button onclick="mudarStatus('${v.id}', 'preparo')" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs">🔥 Iniciar</button>` : ''}
                                ${v.status === 'preparo' ? `<button onclick="finalizarEAvisar('${v.id}', '${v.telefone}', '${v.cliente}')" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs">✅ Finalizar e Avisar</button>` : ''}
                                ${v.status === 'pronto' ? `<button onclick="mudarStatus('${v.id}', 'finalizado')" class="flex-1 py-2 bg-zinc-200 rounded-xl font-bold uppercase text-[10px]">Arquivar</button>` : ''}
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        window.mudarStatus = async (id, s) => { 
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify(s) }); 
            carregar(); 
        };

        window.finalizarEAvisar = async (id, tel, nome) => {
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify('pronto') });
            const statusLink = window.location.origin + window.location.pathname.replace('atendimento3.html', 'status2.html') + "?id=" + id;
            const msg = `Olá *${nome}*! Seu pedido do *Point do Café* saiu para entrega! 🛵☕\nAcompanhe aqui: ${statusLink}`;
            window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`, '_blank');
            carregar();
        };

        setInterval(carregar, 5000); 
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        carregar();
    </script>
</body>
</html>
