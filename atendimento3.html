<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Atendimento - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        @media print {
            body * { display: none !important; }
            #secao-impressao, #secao-impressao * { display: block !important; }
            #secao-impressao { width: 72mm; font-family: 'Courier New', monospace; font-size: 10pt; padding: 5px; }
            .divisa { border-bottom: 1px dashed #000; margin: 5px 0; }
        }
        .tempo-ok { border-left: 8px solid #10b981; background-color: #f0fdf4; } 
        .tempo-alerta { border-left: 8px solid #f59e0b; background-color: #fffbeb; } 
        .tempo-atrasado { border-left: 8px solid #ef4444; background-color: #fef2f2; } 
        .status-pronto { border-left: 8px solid #6b7280; opacity: 0.6; background-color: #f4f4f5; } 
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <h1 class="text-xl font-black uppercase italic">Fila de Produção</h1>
        <div id="relogio" class="font-bold text-zinc-400">00:00:00</div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>
    <div id="secao-impressao" class="hidden"></div>
    <audio id="alerta-sonoro" src="https://www.soundjay.com/buttons/button-2.mp3" preload="auto"></audio>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let pedidosIDConhecidos = new Set();

        async function carregar() {
            try {
                const res = await fetch(`${DB_BASE}vendas.json`);
                const vendas = await res.json();
                const container = document.getElementById('lista-pedidos');
                if(!vendas) return;

                const hoje = new Date().toLocaleDateString('pt-BR');
                let pedidos = Object.keys(vendas).map(id => ({id, ...vendas[id]}))
                    .filter(v => v.dataLocal === hoje);

                pedidos.sort((a, b) => {
                    if (a.status === 'pronto' && b.status !== 'pronto') return 1;
                    if (a.status !== 'pronto' && b.status === 'pronto') return -1;
                    return new Date(a.data) - new Date(b.data);
                });

                let novoPedido = false;
                pedidos.forEach(p => { if (!pedidosIDConhecidos.has(p.id)) { pedidosIDConhecidos.add(p.id); novoPedido = true; } });
                if (novoPedido && pedidosIDConhecidos.size > pedidos.length) { document.getElementById('alerta-sonoro').play().catch(() => {}); }

                container.innerHTML = "";
                pedidos.forEach(v => {
                    const diffMinutos = Math.floor((new Date() - new Date(v.data)) / 1000 / 60);
                    const classeTempo = v.status === 'pronto' ? 'status-pronto' : (diffMinutos < 10 ? "tempo-ok" : (diffMinutos < 25 ? "tempo-alerta" : "tempo-atrasado"));
                    
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm ${classeTempo}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black">#${v.id.slice(-4)}</span>
                                <div class="text-right">
                                    <span class="text-[10px] font-bold uppercase block text-zinc-400">Há ${diffMinutos} min</span>
                                    <button onclick="imprimir('${v.id}')" class="text-[9px] font-bold text-amber-600 underline">Imprimir</button>
                                </div>
                            </div>
                            <div class="mb-4 text-xs font-bold uppercase">
                                <p class="text-zinc-900">${v.cliente}</p>
                                <p class="font-normal text-zinc-500">${v.endereco}</p>
                            </div>
                            <div class="mb-6 space-y-2">
                                ${v.itens.map(i => `<div class="p-2 bg-zinc-50 rounded-lg text-sm">1x ${i.nome}</div>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                ${v.status === 'pendente' ? `<button onclick="mudarStatus('${v.id}', 'preparo')" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs">🔥 Iniciar</button>` : ''}
                                ${v.status === 'preparo' ? `
                                    <div class="flex flex-col w-full gap-2">
                                        <input type="text" id="tel-${v.id}" placeholder="WhatsApp do Cliente (Opcional)" class="p-3 bg-zinc-100 rounded-xl text-xs border-none outline-none">
                                        <button onclick="finalizarEAvisar('${v.id}', '${v.cliente}')" class="w-full py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs">✅ Finalizar & Avisar</button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        window.mudarStatus = async (id, s) => { 
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify(s) }); 
            carregar(); 
        };

        window.finalizarEAvisar = async (id, nome) => {
            const telInput = document.getElementById(`tel-${id}`).value.trim().replace(/\D/g, "");
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify('pronto') }); 

            if(telInput.length >= 10) {
                const statusLink = window.location.origin + window.location.pathname.replace('atendimento3.html', 'status2.html') + "?id=" + id;
                const msg = `Olá *${nome}*! Seu pedido do *Point do Café* acabou de sair para entrega! 🛵☕\nAcompanhe aqui: ${statusLink}`;
                window.open(`https://wa.me/${telInput}?text=${encodeURIComponent(msg)}`, '_blank');
            }
            carregar();
        };

        window.imprimir = async (id) => {
            const res = await fetch(`${DB_BASE}vendas/${id}.json`);
            const v = await res.json();
            document.getElementById('secao-impressao').innerHTML = `<div style="text-align:center; text-transform:uppercase;"><h2>POINT DO CAFÉ</h2><p>PEDIDO #${id.slice(-4)}</p><div class="divisa"></div><div style="text-align:left;"><b>CLIENTE:</b> ${v.cliente}<br><b>END:</b> ${v.endereco}<br><div class="divisa"></div>${v.itens.map(i => `1x ${i.nome}`).join('<br>')}</div></div>`;
            window.print();
        };

        setInterval(carregar, 5000); 
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        carregar();
    </script>
</body>
</html>
