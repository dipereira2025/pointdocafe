<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Atendimento - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pendente { border-left: 8px solid #f59e0b; }
        .status-preparo { border-left: 8px solid #3b82f6; }
        .status-pronto { border-left: 8px solid #10b981; opacity: 0.6; }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <h1 class="text-xl font-black uppercase italic">Fila de Pedidos</h1>
        <div id="relogio" class="font-bold text-zinc-400">00:00:00</div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";

        async function carregarPedidos() {
            try {
                const res = await fetch(`${DB_BASE}vendas.json`);
                const vendas = await res.json();
                const container = document.getElementById('lista-pedidos');
                container.innerHTML = "";
                if(!vendas) return;

                const hoje = new Date().toLocaleDateString('pt-BR');
                for (let id in vendas) {
                    const v = vendas[id];
                    if(v.dataLocal !== hoje) continue;

                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm status-${v.status}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black">#${id.slice(-4)}</span>
                                <span class="text-xs font-bold text-zinc-500 uppercase">${v.cliente}</span>
                            </div>
                            <div class="mb-6 space-y-1 font-bold text-zinc-700">
                                ${v.itens.map(i => `<div class="border-b border-zinc-50">1x ${i.nome}</div>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                ${v.status === 'pendente' ? `<button onclick="mudarStatus('${id}', 'preparo')" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs">🔥 Iniciar Preparo</button>` : ''}
                                ${v.status === 'preparo' ? `<button onclick="mudarStatus('${id}', 'pronto')" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs">✅ Finalizar</button>` : ''}
                                ${v.status === 'pronto' ? `<button onclick="mudarStatus('${id}', 'pendente')" class="flex-1 py-4 bg-zinc-200 text-zinc-500 rounded-2xl font-black uppercase text-xs">↩️ Voltar</button>` : ''}
                            </div>
                        </div>`;
                }
            } catch (e) { console.error(e); }
        }

        window.mudarStatus = async (id, status) => {
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify(status) });
            carregarPedidos();
        };

        setInterval(carregarPedidos, 5000);
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        carregarPedidos();
    </script>
</body>
</html>
