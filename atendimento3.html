<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozinha - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .tempo-ok { border-left: 8px solid #10b981; background-color: #fff; } 
        .tempo-atrasado { border-left: 8px solid #ef4444; background-color: #fef2f2; } 
        /* Esconde pedidos finalizados para não confundir o atendente */
        .status-finalizado { display: none !important; }
    </style>
</head>
<body class="bg-zinc-100 p-4 font-sans text-left">
    
    <header class="max-w-2xl mx-auto flex justify-between items-center mb-6 bg-white p-6 rounded-3xl shadow-sm border-b-4 border-amber-600">
        <h1 class="text-xl font-black uppercase italic text-zinc-800">Fila de Produção</h1>
        <div id="relogio" class="font-bold text-zinc-400">00:00:00</div>
    </header>

    <main id="lista-pedidos" class="max-w-2xl mx-auto space-y-4 pb-10"></main>

    <audio id="alerta-sonoro" src="https://www.soundjay.com/buttons/button-2.mp3" preload="auto"></audio>
    <div id="secao-impressao" class="hidden"></div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let pedidosIDConhecidos = new Set();

        async function carregar() {
            try {
                const res = await fetch(`${DB_BASE}vendas.json`);
                const vendas = await res.json();
                const container = document.getElementById('lista-pedidos');
                if(!vendas) {
                    container.innerHTML = "<p class='text-center text-zinc-400 font-bold uppercase py-10'>Nenhum pedido pendente</p>";
                    return;
                }

                const hoje = new Date().toLocaleDateString('pt-BR');
                let pedidos = Object.keys(vendas).map(id => ({id, ...vendas[id]}))
                    .filter(v => v.dataLocal === hoje && v.status !== 'finalizado'); // Filtra apenas o que não foi finalizado

                // Ordenação: Pendentes primeiro, depois Preparo (por horário)
                pedidos.sort((a, b) => new Date(a.data) - new Date(b.data));

                // Som de alerta para novos pedidos que entram como 'pendente'
                pedidos.forEach(p => { 
                    if (!pedidosIDConhecidos.has(p.id)) { 
                        pedidosIDConhecidos.add(p.id); 
                        if(p.status === 'pendente') document.getElementById('alerta-sonoro').play().catch(()=>{});
                    } 
                });

                container.innerHTML = "";
                pedidos.forEach(v => {
                    const diffMin = Math.floor((new Date() - new Date(v.data)) / 1000 / 60);
                    const classeTempo = diffMin > 20 ? "tempo-atrasado" : "tempo-ok";
                    
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm ${classeTempo} transition-all border border-zinc-200">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-zinc-800 text-white px-4 py-1 rounded-full font-black text-xs">#${v.id.slice(-4)}</span>
                                <button onclick="imprimir('${v.id}')" class="text-[10px] font-bold text-amber-600 underline uppercase">Imprimir</button>
                            </div>
                            
                            <div class="mb-4">
                                <p class="text-sm font-black uppercase text-zinc-900 italic">${v.cliente}</p>
                                <p class="text-[10px] text-zinc-500 font-bold">${v.endereco}</p>
                            </div>

                            <div class="mb-6 space-y-1">
                                ${v.itens.map(i => `<div class="p-2 bg-zinc-50 rounded-lg text-xs uppercase font-bold text-zinc-700 border-l-4 border-zinc-200">1x ${i.nome}</div>`).join('')}
                                ${v.observacao ? `<div class="text-[10px] text-red-500 font-bold italic mt-2">OBS: ${v.observacao}</div>` : ''}
                            </div>

                            <div class="flex gap-2">
                                ${v.status === 'pendente' ? 
                                    `<button onclick="mudarStatus('${v.id}', 'preparo')" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black uppercase text-xs shadow-md">🔥 Iniciar Preparo</button>` : ''}
                                
                                ${v.status === 'preparo' ? 
                                    `<button onclick="finalizarEAvisar('${v.id}', '${v.telefone}', '${v.cliente}')" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg">✅ Avisar Pronto</button>` : ''}
                            </div>
                        </div>`;
                });
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        window.mudarStatus = async (id, s) => { 
            await fetch(`${DB_BASE}vendas/${id}/status.json`, { method: 'PUT', body: JSON.stringify(s) }); 
            carregar(); 
        };

        // FUNÇÃO QUE ABRE WHATSAPP E TIRA O PEDIDO DA TELA
        window.finalizarEAvisar = async (id, tel, nome) => {
            if(!tel) return alert("Erro: Este cliente não tem telefone registrado.");

            const statusLink = window.location.origin + window.location.pathname.replace('atendimento3.html', 'status2.html') + "?id=" + id;
            const msg = `Olá *${nome}*! Seu pedido do *Point do Café* está pronto e saiu para entrega! 🛵☕\nAcompanhe aqui: ${statusLink}`;
            
            // 1. Abre o WhatsApp
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');

            // 2. Atualiza no banco para 'finalizado' para sumir da tela
            try {
                await fetch(`${DB_BASE}vendas/${id}/status.json`, { 
                    method: 'PUT', 
                    body: JSON.stringify('finalizado') 
                });
                
                Toastify({text: "Pedido Concluído!", style: {background: "#059669"}}).showToast();
                carregar(); // Recarrega para o card sumir imediatamente
            } catch (err) {
                console.error(err);
            }
        };

        window.imprimir = async (id) => {
            const res = await fetch(`${DB_BASE}vendas/${id}.json`);
            const v = await res.json();
            document.getElementById('secao-impressao').innerHTML = `
                <div style="text-align:center; text-transform:uppercase; font-family:monospace;">
                    <h2>POINT DO CAFÉ</h2><p>PEDIDO #${id.slice(-4)}</p>
                    <hr>
                    <div style="text-align:left;">
                        <b>CLI:</b> ${v.cliente}<br><b>END:</b> ${v.endereco}<br>
                        <hr>
                        ${v.itens.map(i => `1x ${i.nome}`).join('<br>')}
                        <hr>
                        <b>TOTAL: R$ ${v.total.toFixed(2)}</b>
                    </div>
                </div>`;
            window.print();
        };

        // Loops de atualização
        setInterval(carregar, 5000); 
        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        
        carregar();
    </script>
</body>
</html>
