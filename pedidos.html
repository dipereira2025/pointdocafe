<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-zinc-50">

    <div id="app" class="max-w-md mx-auto p-4 pb-24">
        <header class="text-center py-10">
            <h1 class="text-3xl font-black italic text-amber-900">POINT DO CAFÉ</h1>
        </header>

        <div id="checkout-modal" class="bg-white p-6 rounded-3xl shadow-2xl border-t-8 border-amber-600">
            <h2 class="text-xl font-black mb-4 uppercase tracking-tighter">Finalizar Pedido</h2>
            
            <div class="space-y-4">
                <input type="text" id="c-nome" placeholder="Seu Nome" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold">
                
                <select id="c-entrega" onchange="calcularTotal()" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-amber-900">
                    <option value="retirada">Vou retirar no local (Grátis)</option>
                    <option value="entrega">Quero Entrega (+ R$ 5,00)</option>
                </select>

                <input type="text" id="c-endereco" placeholder="Endereço Completo" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none">

                <select id="c-pgto" onchange="toggleTroco()" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none font-bold text-amber-900">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>

                <div id="div-troco" class="hidden">
                    <input type="number" id="c-troco" placeholder="Troco para quanto?" class="w-full p-4 bg-amber-50 border-2 border-amber-200 rounded-2xl outline-none font-bold">
                </div>

                <textarea id="c-obs" placeholder="Alguma observação?" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none text-sm h-20"></textarea>

                <div class="py-4 border-t border-zinc-100">
                    <div class="flex justify-between font-black text-xl text-zinc-800">
                        <span>TOTAL FINAL:</span>
                        <span id="total-final">R$ 0,00</span>
                    </div>
                </div>

                <button onclick="confirmarPedido()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg shadow-green-200">Confirmar e Ver Status</button>
            </div>
        </div>
    </div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let subtotalGlobal = 0; // Isso deve vir da soma dos itens no carrinho que você já tem

        function calcularTotal() {
            const entrega = document.getElementById('c-entrega').value;
            const taxa = entrega === 'entrega' ? 5.00 : 0.00;
            // Pegue o subtotal real da sua lógica de carrinho
            const total = subtotalGlobal + taxa;
            document.getElementById('total-final').innerText = `R$ ${total.toFixed(2)}`;
            return total;
        }

        function toggleTroco() {
            const pgto = document.getElementById('c-pgto').value;
            document.getElementById('div-troco').classList.toggle('hidden', pgto !== 'Dinheiro');
        }

        async function confirmarPedido() {
            const nome = document.getElementById('c-nome').value;
            if(!nome) return alert("Por favor, digite seu nome!");

            const idVenda = Date.now();
            const total = calcularTotal();
            
            const pedido = {
                cliente: nome,
                endereco: document.getElementById('c-endereco').value,
                pagamento: document.getElementById('c-pgto').value,
                troco: document.getElementById('c-troco').value,
                tipoEntrega: document.getElementById('c-entrega').value,
                obs: document.getElementById('c-obs').value,
                total: total,
                status: "pendente",
                dataLocal: new Date().toLocaleDateString('pt-BR'),
                itens: [] // Aqui você deve mapear os itens do seu carrinho atual
            };

            await fetch(`${DB_BASE}vendas/${idVenda}.json`, {
                method: 'PUT',
                body: JSON.stringify(pedido)
            });

            // Envia para o WhatsApp (Opcional, já que agora tem o Status)
            // window.open(...);

            window.location.href = `status.html?id=${idVenda}`;
        }
    </script>
</body>
</html>
