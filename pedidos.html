<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Point do Café - Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .btn-qty { transition: all 0.2s active; }
        .btn-qty:active { transform: scale(0.9); }
        .cart-float { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-800">

    <header class="bg-white pt-8 pb-6 px-4 text-center border-b-4 border-amber-600 shadow-sm">
        <div id="logo-header" class="w-24 h-24 bg-zinc-100 mx-auto rounded-full mb-4 overflow-hidden border-2 border-amber-100 flex items-center justify-center">
            <img id="img-logo" src="" class="hidden w-full h-full object-cover">
            <span id="placeholder-logo" class="text-[10px] font-bold text-zinc-400 uppercase">Point do Café</span>
        </div>
        <h1 class="text-2xl font-black text-amber-900 uppercase tracking-tighter">Point do Café</h1>
        <p class="text-[9px] font-bold text-amber-700 uppercase tracking-[2px] mt-1">Lanchonete e Restaurante</p>
    </header>

    <main class="max-w-md mx-auto p-4 pb-32" id="categorias-container">
        <div class="text-center py-20">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-amber-600 border-t-transparent rounded-full mb-4"></div>
            <p class="text-xs font-bold text-zinc-400 uppercase">Carregando Cardápio...</p>
        </div>
    </main>

    <div id="cart-bar" class="hidden fixed bottom-6 left-0 right-0 px-4 z-50">
        <button onclick="abrirCheckout()" class="cart-float w-full max-w-md mx-auto bg-green-600 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-2xl flex justify-between px-8 items-center border-b-4 border-green-800">
            <div class="flex items-center gap-3">
                <span class="bg-green-800 px-3 py-1 rounded-lg text-xs" id="cart-count">0</span>
                <span>Finalizar Pedido</span>
            </div>
            <span id="cart-total">R$ 0,00</span>
        </button>
    </div>

    <div id="modal-checkout" class="hidden fixed inset-0 bg-black/90 z-[60] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 bg-zinc-50 border-b border-zinc-200 flex justify-between items-center">
                <h2 class="font-black uppercase text-amber-900">Seu Pedido</h2>
                <button onclick="fecharCheckout()" class="text-zinc-400 font-bold text-sm">FECHAR</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="text" id="cliente-nome" placeholder="Seu Nome" class="w-full p-4 bg-zinc-100 rounded-xl outline-none font-bold">
                <input type="text" id="cliente-endereco" placeholder="Endereço Completo" class="w-full p-4 bg-zinc-100 rounded-xl outline-none">
                <textarea id="cliente-obs" placeholder="Observações (ex: sem cebola)" class="w-full p-4 bg-zinc-100 rounded-xl outline-none h-20 text-sm"></textarea>
                <select id="cliente-pgto" class="w-full p-4 bg-zinc-100 rounded-xl outline-none font-bold">
                    <option value="Pix">Pagamento: Pix</option>
                    <option value="Cartão">Pagamento: Cartão</option>
                    <option value="Dinheiro">Pagamento: Dinheiro</option>
                </select>
                <button onclick="enviarPedido()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg border-b-4 border-green-800">Enviar para o WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const diaHoje = new Date().getDay(); 
        let produtosLocal = [];

        async function init() {
            await carregarLogo();
            await loadMenu();
        }

        async function carregarLogo() {
            try {
                const res = await fetch(DB_BASE + "configuracao/logo.json");
                const logo = await res.json();
                if(logo) {
                    document.getElementById('img-logo').src = logo;
                    document.getElementById('img-logo').classList.remove('hidden');
                    document.getElementById('placeholder-logo').classList.add('hidden');
                }
            } catch(e) {}
        }

        async function loadMenu() {
            try {
                const resProd = await fetch(DB_BASE + "produtos.json");
                const dataProd = await resProd.json();
                if(!dataProd) return;

                produtosLocal = Object.keys(dataProd).map(key => ({ id: key, ...dataProd[key], qty: 0 }));

                // --- FILTRAGEM DE SEGURANÇA (TRAVA DE PAUSA) ---
                const produtosDisponiveis = produtosLocal.filter(p => {
                    const naoEstaPausado = p.pausado !== true; // SÓ PASSA SE NÃO ESTIVER PAUSADO NO ATENDIMENTO
                    const isSempreDisponivel = !p.dias || p.dias.length === 0;
                    const isDeHoje = p.dias && p.dias.includes(diaHoje.toString());
                    return naoEstaPausado && (isSempreDisponivel || isDeHoje);
                });

                const resCat = await fetch(DB_BASE + "categorias.json");
                let categorias = await resCat.json() || [];

                let html = "";
                
                // Sugestão de Hoje
                const sugestoes = produtosDisponiveis.filter(p => p.dias && p.dias.includes(diaHoje.toString()));
                if(sugestoes.length > 0) html += renderSection("⭐ Sugestão de Hoje", sugestoes);

                // Outras Categorias
                categorias.forEach(cat => {
                    const itensNaCat = produtosDisponiveis.filter(p => p.categoria === cat && (!p.dias || !p.dias.includes(diaHoje.toString())));
                    if(itensNaCat.length > 0) html += renderSection(cat, itensNaCat);
                });

                document.getElementById('categorias-container').innerHTML = html || "<p class='text-center py-20 font-bold text-zinc-400 uppercase text-xs'>Nenhum item disponível hoje.</p>";
            } catch(e) { console.error(e); }
        }

        function renderSection(titulo, itens) {
            return `
                <div class="mb-8">
                    <h2 class="text-[10px] font-black uppercase text-amber-700 tracking-[3px] mb-4 flex items-center gap-2">
                        <span class="h-px bg-amber-200 flex-1"></span> ${titulo} <span class="h-px bg-amber-200 flex-1"></span>
                    </h2>
                    <div class="space-y-3">
                        ${itens.map(p => `
                            <div class="bg-white p-3 rounded-2xl shadow-sm border border-zinc-100 flex items-center gap-4">
                                <img src="${p.img}" class="w-20 h-20 object-cover rounded-xl shadow-inner bg-zinc-50">
                                <div class="flex-1">
                                    <h3 class="font-bold text-sm text-zinc-800 leading-tight mb-1">${p.nome}</h3>
                                    <div class="flex items-center gap-2">
                                        <span class="text-green-600 font-black text-sm">R$ ${(p.precoPromo || p.preco).toFixed(2)}</span>
                                        ${p.precoPromo ? `<span class="text-[9px] text-zinc-300 line-through">R$ ${p.preco.toFixed(2)}</span>` : ''}
                                    </div>
                                </div>
                                <div class="flex items-center gap-3 bg-zinc-50 p-1 rounded-xl border border-zinc-100">
                                    <button onclick="updateQty('${p.id}', -1)" class="w-8 h-8 flex items-center justify-center font-black text-zinc-400">-</button>
                                    <span id="qty-${p.id}" class="font-black text-xs w-4 text-center">0</span>
                                    <button onclick="updateQty('${p.id}', 1)" class="w-8 h-8 flex items-center justify-center font-black text-amber-600">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function updateQty(id, delta) {
            const p = produtosLocal.find(x => x.id === id);
            p.qty = Math.max(0, p.qty + delta);
            document.getElementById(`qty-${id}`).innerText = p.qty;
            updateCartBar();
        }

        function updateCartBar() {
            const itensNoCarrinho = produtosLocal.filter(p => p.qty > 0);
            const total = itensNoCarrinho.reduce((acc, p) => acc + ((p.precoPromo || p.preco) * p.qty), 0);
            const count = itensNoCarrinho.reduce((acc, p) => acc + p.qty, 0);

            const bar = document.getElementById('cart-bar');
            if(count > 0) {
                bar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
                document.getElementById('cart-count').innerText = count;
            } else {
                bar.classList.add('hidden');
            }
        }

        function abrirCheckout() { document.getElementById('modal-checkout').classList.remove('hidden'); }
        function fecharCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }

        async function enviarPedido() {
            const nome = document.getElementById('cliente-nome').value;
            const endereco = document.getElementById('cliente-endereco').value;
            const obs = document.getElementById('cliente-obs').value;
            const pgto = document.getElementById('cliente-pgto').value;
            const itens = produtosLocal.filter(p => p.qty > 0);

            if(!nome || !endereco) return alert("Por favor, preencha Nome e Endereço!");

            const total = itens.reduce((acc, p) => acc + ((p.precoPromo || p.preco) * p.qty), 0);
            const pedidoId = Date.now();
            
            const pedidoDB = {
                id: pedidoId,
                cliente: nome,
                endereco: endereco,
                observacao: obs,
                pagamento: pgto,
                total: total,
                dataLocal: new Date().toLocaleDateString('pt-BR'),
                itens: itens.map(i => ({ nome: i.nome, qty: i.qty, preco: (i.precoPromo || i.preco) }))
            };

            await fetch(DB_BASE + `vendas/${pedidoId}.json`, { method: 'PUT', body: JSON.stringify(pedidoDB) });

            let msg = `*PEDIDO POINT DO CAFÉ*\n--------------------------\n`;
            msg += `*Cliente:* ${nome}\n*Endereço:* ${endereco}\n`;
            if(obs) msg += `*OBS:* ${obs}\n`;
            msg += `--------------------------\n`;
            itens.forEach(i => msg += `${i.qty}x ${i.nome}\n`);
            msg += `--------------------------\n`;
            msg += `*Total: R$ ${total.toFixed(2)}*\n*Pagamento:* ${pgto}`;

            window.open(`https://wa.me/5561994348505?text=${encodeURIComponent(msg)}`);
            location.reload();
        }

        init();
    </script>
</body>
</html>
