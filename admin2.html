<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .tab-btn.active { border-bottom: 4px solid #d97706; color: #d97706; }
        .tab-content.hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans text-left">

    <div id="login-screen" class="fixed inset-0 bg-zinc-950 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 p-8 rounded-[2.5rem] border border-zinc-800 w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black text-amber-600 mb-6 text-center uppercase italic">Acesso Admin</h2>
            <input type="text" id="login-user" placeholder="Usuário" class="w-full p-4 bg-zinc-800 rounded-2xl mb-3 outline-none border border-zinc-700">
            <input type="password" id="login-pass" placeholder="Senha" class="w-full p-4 bg-zinc-800 rounded-2xl mb-6 outline-none border border-zinc-700">
            <button onclick="autenticar()" class="w-full bg-amber-600 py-4 rounded-2xl font-black uppercase shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="painel" class="max-w-3xl mx-auto py-4 hidden">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black uppercase text-amber-500 italic">Point do Café Admin</h1>
            <button onclick="logout()" class="text-[10px] bg-zinc-800 px-4 py-2 rounded-full uppercase font-bold text-zinc-500">Sair</button>
        </header>
        
        <nav class="flex justify-start gap-4 mb-8 border-b border-zinc-800 font-bold uppercase text-[9px] tracking-widest overflow-x-auto pb-2">
            <button onclick="changeTab('tab-loja')" class="tab-btn px-2 active" id="btn-loja">Loja</button>
            <button onclick="changeTab('tab-categorias')" class="tab-btn px-2" id="btn-categorias">Categorias</button>
            <button onclick="changeTab('tab-produtos')" class="tab-btn px-2" id="btn-produtos">Produtos</button>
            <button onclick="changeTab('tab-relatorios')" class="tab-btn px-2" id="btn-relatorios">Relatórios</button>
            <button onclick="changeTab('tab-equipe')" class="tab-btn px-2" id="btn-equipe">Equipe</button>
        </nav>

        <div id="tab-loja" class="tab-content space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-amber-500 font-bold uppercase text-xs mb-4">Funcionamento</h3>
                <div class="grid gap-4 text-sm">
                    <div>
                        <label class="block mb-1 text-zinc-500 text-[10px] uppercase">Geral (Abre/Fecha)</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="abre-geral" class="bg-zinc-700 p-3 rounded-xl outline-none border border-zinc-600">
                            <input type="time" id="fecha-geral" class="bg-zinc-700 p-3 rounded-xl outline-none border border-zinc-600">
                        </div>
                    </div>
                    <div>
                        <label class="block mb-1 text-zinc-500 text-[10px] uppercase">Almoço (Início/Fim)</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="abre-refeicao" class="bg-zinc-700 p-3 rounded-xl outline-none border border-zinc-600">
                            <input type="time" id="fecha-refeicao" class="bg-zinc-700 p-3 rounded-xl outline-none border border-zinc-600">
                        </div>
                    </div>
                    <button onclick="salvarConfig()" class="w-full bg-amber-600 py-4 rounded-xl font-black uppercase text-xs">Salvar Horários</button>
                </div>
            </div>
        </div>

        <div id="tab-categorias" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-amber-500 font-bold uppercase text-xs mb-4">Gestão de Categorias</h3>
                <div class="flex gap-2">
                    <input type="hidden" id="cat-edit-id">
                    <input type="text" id="cat-nome" placeholder="Nome da Categoria" class="flex-1 bg-zinc-700 p-4 rounded-xl outline-none">
                    <button onclick="salvarCategoria()" class="bg-green-600 px-6 rounded-xl font-black text-xs uppercase">Salvar</button>
                </div>
                <div id="lista-categorias" class="mt-6 space-y-2"></div>
            </div>
        </div>

        <div id="tab-produtos" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 space-y-4">
                <h3 class="text-amber-500 font-bold uppercase text-xs">Novo Produto</h3>
                <input type="text" id="p-nome" placeholder="Nome do Produto" class="w-full p-4 rounded-xl bg-zinc-700 outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="p-preco" placeholder="Preço R$" class="p-4 rounded-xl bg-zinc-700 outline-none">
                    <select id="p-cat" class="p-4 rounded-xl bg-zinc-700 outline-none text-xs">
                        <option value="">Selecione Categoria</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 bg-zinc-900 p-3 rounded-xl border border-zinc-700">
                    <span class="text-[10px] uppercase font-bold text-zinc-500">Tipo:</span>
                    <label class="flex items-center gap-1 text-[10px]"><input type="radio" name="p-tipo" value="comum" checked> Geral</label>
                    <label class="flex items-center gap-1 text-[10px]"><input type="radio" name="p-tipo" value="refeicao"> Almoço</label>
                </div>
                <input type="file" id="p-foto" class="text-[10px]">
                <button onclick="salvarProd()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase text-xs">Cadastrar</button>
            </div>
            <div id="lista-produtos" class="space-y-2"></div>
        </div>

        <div id="tab-equipe" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-amber-500 font-bold uppercase text-xs mb-4">Adicionar Membro</h3>
                <input type="hidden" id="user-edit-id">
                <input type="text" id="u-user" placeholder="Nome de Usuário" class="w-full p-4 rounded-xl bg-zinc-700 mb-2 outline-none">
                <input type="text" id="u-pass" placeholder="Senha" class="w-full p-4 rounded-xl bg-zinc-700 mb-4 outline-none">
                <button onclick="salvarUsuario()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Salvar na Equipe</button>
            </div>
            <div id="lista-equipe" class="space-y-2"></div>
        </div>

        <div id="tab-relatorios" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-amber-500 font-bold uppercase text-xs mb-4">Relatório Diário</h3>
                <input type="date" id="filtro-data" class="w-full bg-zinc-700 p-4 rounded-xl mb-4 outline-none">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="listarRelatorios()" class="bg-zinc-600 py-2 rounded-lg text-[10px] font-bold uppercase">Filtrar</button>
                    <button onclick="exportarPDF()" class="bg-red-600 py-2 rounded-lg text-[10px] font-bold uppercase">PDF</button>
                </div>
                <div id="lista-vendas-historico" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let prodB64 = "";

        // --- AUTENTICAÇÃO ---
        window.autenticar = async () => {
            const uInput = document.getElementById('login-user').value;
            const pInput = document.getElementById('login-pass').value;
            const res = await fetch(`${DB_BASE}usuarios.json`);
            const users = await res.json();
            
            let autorizado = false;
            for(let id in users) {
                if(users[id].user === uInput && users[id].pass === pInput) autorizado = true;
            }

            if(autorizado || (uInput === 'admin' && pInput === '123')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                changeTab('tab-loja');
            } else {
                alert("Acesso Negado!");
            }
        };

        window.logout = () => location.reload();

        window.changeTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-' + id.split('-')[1]).classList.add('active');
            
            if(id === 'tab-categorias') listarCategorias();
            if(id === 'tab-equipe') listarEquipe();
            if(id === 'tab-produtos') { carregarProdutos(); carregarSelectCategorias(); }
        };

        // --- GESTÃO DE CATEGORIAS ---
        window.salvarCategoria = async () => {
            const nome = document.getElementById('cat-nome').value;
            const idEdit = document.getElementById('cat-edit-id').value;
            const path = idEdit ? `categorias/${idEdit}.json` : `categorias/${Date.now()}.json`;
            
            await fetch(`${DB_BASE}${path}`, { method: 'PUT', body: JSON.stringify({ nome }) });
            document.getElementById('cat-nome').value = "";
            document.getElementById('cat-edit-id').value = "";
            listarCategorias();
        };

        async function listarCategorias() {
            const res = await fetch(`${DB_BASE}categorias.json`);
            const cats = await res.json();
            const container = document.getElementById('lista-categorias');
            container.innerHTML = "";
            for(let id in cats) {
                container.innerHTML += `
                <div class="bg-zinc-900 p-4 rounded-2xl flex justify-between items-center border border-zinc-800">
                    <span class="font-bold text-xs uppercase">${cats[id].nome}</span>
                    <div class="flex gap-4 text-[10px] font-bold">
                        <button onclick="editarCat('${id}', '${cats[id].nome}')" class="text-amber-500">EDITAR</button>
                        <button onclick="removerItem('categorias/${id}')" class="text-red-500">EXCLUIR</button>
                    </div>
                </div>`;
            }
        }
        window.editarCat = (id, nome) => {
            document.getElementById('cat-nome').value = nome;
            document.getElementById('cat-edit-id').value = id;
        };

        // --- GESTÃO DE EQUIPE (EQUIPE) ---
        window.salvarUsuario = async () => {
            const user = document.getElementById('u-user').value;
            const pass = document.getElementById('u-pass').value;
            const idEdit = document.getElementById('user-edit-id').value;
            const path = idEdit ? `usuarios/${idEdit}.json` : `usuarios/${Date.now()}.json`;

            await fetch(`${DB_BASE}${path}`, { method: 'PUT', body: JSON.stringify({ user, pass }) });
            document.getElementById('u-user').value = "";
            document.getElementById('u-pass').value = "";
            document.getElementById('user-edit-id').value = "";
            listarEquipe();
        };

        async function listarEquipe() {
            const res = await fetch(`${DB_BASE}usuarios.json`);
            const users = await res.json();
            const container = document.getElementById('lista-equipe');
            container.innerHTML = "";
            for(let id in users) {
                container.innerHTML += `
                <div class="bg-zinc-800 p-4 rounded-2xl flex justify-between items-center border border-zinc-700">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-zinc-700 rounded-full flex items-center justify-center text-xs font-black">👤</div>
                        <span class="text-xs font-bold">${users[id].user}</span>
                    </div>
                    <div class="flex gap-3 text-[10px] font-bold">
                        <button onclick="editarUser('${id}', '${users[id].user}', '${users[id].pass}')" class="text-blue-400">EDITAR</button>
                        <button onclick="removerItem('usuarios/${id}')" class="text-red-500">REMOVER</button>
                    </div>
                </div>`;
            }
        }
        window.editarUser = (id, u, p) => {
            document.getElementById('u-user').value = u;
            document.getElementById('u-pass').value = p;
            document.getElementById('user-edit-id').value = id;
        };

        // --- AUXILIARES ---
        window.removerItem = async (path) => {
            if(confirm("Deseja excluir?")) {
                await fetch(`${DB_BASE}${path}.json`, { method: 'DELETE' });
                listarCategorias(); listarEquipe(); carregarProdutos();
            }
        };

        async function carregarSelectCategorias() {
            const res = await fetch(`${DB_BASE}categorias.json`);
            const cats = await res.json();
            const select = document.getElementById('p-cat');
            select.innerHTML = '<option value="">Selecione Categoria</option>';
            for(let id in cats) select.innerHTML += `<option value="${cats[id].nome}">${cats[id].nome}</option>`;
        }

        // Lógica de Produtos e Horários já integrada nas respostas anteriores permanece aqui...
        // [Fim do Script]
    </script>
</body>
</html>
