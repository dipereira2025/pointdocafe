<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>
<body class="bg-zinc-50 font-sans pb-20">

    <header class="bg-white p-6 shadow-sm mb-6 border-b-4 border-amber-600">
        <h1 class="text-xl font-black text-amber-900 uppercase italic text-center">Painel Administrativo</h1>
    </header>

    <nav class="max-w-md mx-auto flex bg-zinc-200 p-1 rounded-2xl mb-6 shadow-inner">
        <button onclick="mudarAbaAdmin('produtos')" id="btn-tab-produtos" class="flex-1 py-3 font-black uppercase text-[10px] rounded-xl bg-white text-amber-600 shadow-sm">📦 Produtos</button>
        <button onclick="mudarAbaAdmin('relatorio')" id="btn-tab-relatorio" class="flex-1 py-3 font-black uppercase text-[10px] rounded-xl text-zinc-500">📊 Relatórios</button>
    </nav>

    <main id="aba-produtos" class="max-w-md mx-auto px-4 space-y-6">
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-200">
            <h2 class="font-black uppercase text-xs mb-4 text-zinc-400">Novo Produto</h2>
            <div class="space-y-3">
                <input type="text" id="p-nome" placeholder="Nome do Produto" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none border-2 border-transparent focus:border-amber-500 text-sm">
                <input type="number" id="p-preco" placeholder="Preço (Ex: 15.50)" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none border-2 border-transparent focus:border-amber-500 text-sm">
                <input type="text" id="p-img" placeholder="Link da Imagem" class="w-full p-4 bg-zinc-100 rounded-2xl outline-none border-2 border-transparent focus:border-amber-500 text-sm">
                <button onclick="salvarProduto()" class="w-full py-4 bg-amber-600 text-white font-black rounded-2xl uppercase text-xs shadow-lg">Cadastrar Produto</button>
            </div>
        </section>

        <section id="lista-produtos-admin" class="space-y-3"></section>
    </main>

    <main id="aba-relatorio" class="hidden max-w-md mx-auto px-4">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-zinc-200 mb-6">
            <h2 class="text-[10px] font-black uppercase text-zinc-400 mb-4">Resumo de Hoje</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-50 p-4 rounded-2xl text-center">
                    <p class="text-[9px] font-bold text-zinc-400 uppercase">Vendas</p>
                    <p id="rel-qtd" class="text-2xl font-black text-zinc-800">0</p>
                </div>
                <div class="bg-zinc-50 p-4 rounded-2xl text-center border-l-4 border-green-500">
                    <p class="text-[9px] font-bold text-zinc-400 uppercase">Faturamento</p>
                    <p id="rel-total" class="text-xl font-black text-green-600 text-xs">R$ 0,00</p>
                </div>
            </div>
            
            <button onclick="excluirTodosPedidos()" class="w-full mt-10 py-4 bg-red-50 text-red-600 rounded-2xl font-black uppercase text-[10px] border border-red-100 hover:bg-red-600 hover:text-white transition-all">
                🗑️ Limpar Banco de Pedidos
            </button>
        </div>
        <div id="lista-vendas-detalhe" class="space-y-2"></div>
    </main>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";

        // Troca de Abas
        window.mudarAbaAdmin = (aba) => {
            if(aba === 'produtos') {
                document.getElementById('aba-produtos').classList.remove('hidden');
                document.getElementById('aba-relatorio').classList.add('hidden');
                document.getElementById('btn-tab-produtos').className = "flex-1 py-3 font-black uppercase text-[10px] rounded-xl bg-white text-amber-600 shadow-sm";
                document.getElementById('btn-tab-relatorio').className = "flex-1 py-3 font-black uppercase text-[10px] rounded-xl text-zinc-500";
            } else {
                document.getElementById('aba-produtos').classList.add('hidden');
                document.getElementById('aba-relatorio').classList.remove('hidden');
                document.getElementById('btn-tab-relatorio').className = "flex-1 py-3 font-black uppercase text-[10px] rounded-xl bg-white text-amber-600 shadow-sm";
                document.getElementById('btn-tab-produtos').className = "flex-1 py-3 font-black uppercase text-[10px] rounded-xl text-zinc-500";
                carregarRelatorio();
            }
        };

        // Funções de Produtos
        window.salvarProduto = async () => {
            const nome = document.getElementById('p-nome').value;
            const preco = parseFloat(document.getElementById('p-preco').value);
            const img = document.getElementById('p-img').value;
            if(!nome || !preco) return alert("Preencha nome e preço!");

            const id = Date.now();
            await fetch(`${DB_BASE}produtos/${id}.json`, { method: 'PUT', body: JSON.stringify({nome, preco, img, pausado: false}) });
            location.reload();
        };

        async function carregarProdutos() {
            const res = await fetch(`${DB_BASE}produtos.json`);
            const produtos = await res.json();
            const container = document.getElementById('lista-produtos-admin');
            container.innerHTML = "";
            for(let id in produtos) {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-zinc-200">
                        <div class="flex items-center gap-3">
                            <img src="${produtos[id].img}" class="w-10 h-10 rounded-lg object-cover bg-zinc-100">
                            <div>
                                <p class="font-bold text-xs uppercase">${produtos[id].nome}</p>
                                <p class="text-[10px] text-green-600 font-black">R$ ${produtos[id].preco.toFixed(2)}</p>
                            </div>
                        </div>
                        <button onclick="excluirProduto('${id}')" class="text-red-400 p-2 italic text-[10px] font-bold">Excluir</button>
                    </div>`;
            }
        }

        window.excluirProduto = async (id) => {
            if(confirm("Excluir este produto?")) {
                await fetch(`${DB_BASE}produtos/${id}.json`, { method: 'DELETE' });
                carregarProdutos();
            }
        };

        // Funções de Relatório (Restauradas aqui)
        async function carregarRelatorio() {
            const res = await fetch(`${DB_BASE}vendas.json`);
            const vendas = await res.json();
            const container = document.getElementById('lista-vendas-detalhe');
            container.innerHTML = "";
            if(!vendas) {
                document.getElementById('rel-qtd').innerText = "0";
                document.getElementById('rel-total').innerText = "R$ 0,00";
                return;
            }

            const hoje = new Date().toLocaleDateString('pt-BR');
            const pedidos = Object.keys(vendas).map(id => ({id, ...vendas[id]}))
                .filter(v => v.dataLocal === hoje);

            let faturamento = 0;
            pedidos.forEach(v => {
                faturamento += (v.total || 0);
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl border border-zinc-100 flex justify-between items-center">
                        <span class="text-[9px] font-bold uppercase text-zinc-500">#${v.id.slice(-4)} - ${v.cliente}</span>
                        <span class="text-[10px] font-black text-zinc-800">R$ ${(v.total || 0).toFixed(2)}</span>
                    </div>`;
            });

            document.getElementById('rel-qtd').innerText = pedidos.length;
            document.getElementById('rel-total').innerText = `R$ ${faturamento.toFixed(2)}`;
        }

        window.excluirTodosPedidos = async () => {
            if(!confirm("Deseja apagar TODO o histórico de vendas/pedidos?")) return;
            await fetch(`${DB_BASE}vendas.json`, { method: 'DELETE' });
            Toastify({text: "Histórico apagado!", style: {background: "red"}}).showToast();
            carregarRelatorio();
        };

        carregarProdutos();
    </script>
</body>
</html>
