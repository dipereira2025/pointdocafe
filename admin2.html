<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .day-btn.active { background-color: #d97706; color: white; border-color: #d97706; }
        .tab-btn.active { border-bottom: 4px solid #d97706; color: #d97706; }
        .tab-content.hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans text-left">

    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900 uppercase italic">Point Admin</h2>
        <input type="text" id="user-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-4 outline-none" placeholder="Usuário">
        <input type="password" id="pass-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-6 outline-none" placeholder="Senha">
        <button onclick="handleLogin()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold uppercase">Entrar</button>
    </div>

    <div id="painel" class="hidden max-w-2xl mx-auto py-4">
        <div class="flex justify-between items-center mb-6 px-2">
            <span class="text-[10px] text-amber-500 font-black uppercase tracking-widest">Painel Administrativo</span>
            <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase underline">Sair</button>
        </div>
        
        <div class="flex justify-around mb-8 border-b border-zinc-800 font-bold uppercase text-[9px] tracking-widest overflow-x-auto">
            <button onclick="changeTab('tab-loja')" class="tab-btn pb-2 px-2 active" id="btn-loja">Loja</button>
            <button onclick="changeTab('tab-categorias')" class="tab-btn pb-2 px-2" id="btn-categorias">Categorias</button>
            <button onclick="changeTab('tab-produtos')" class="tab-btn pb-2 px-2" id="btn-produtos">Produtos</button>
            <button onclick="changeTab('tab-relatorios')" class="tab-btn pb-2 px-2" id="btn-relatorios">Relatórios</button>
            <button onclick="changeTab('tab-usuarios')" class="tab-btn pb-2 px-2" id="btn-usuarios">Equipe</button>
        </div>

        <div id="tab-loja" class="tab-content space-y-6">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 text-center">
                <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Logomarca</h3>
                <div class="relative w-32 h-32 mx-auto mb-6 bg-zinc-900 rounded-full border-4 border-amber-600 flex items-center justify-center overflow-hidden">
                    <img id="logo-preview" class="w-full h-full object-cover hidden">
                    <span id="logo-text" class="text-[10px] font-bold text-zinc-500 uppercase">Sem Logo</span>
                </div>
                <label for="input-logo" class="cursor-pointer bg-zinc-700 hover:bg-zinc-600 px-6 py-3 rounded-xl font-bold text-[10px] uppercase inline-block border border-zinc-600">
                    📂 Selecionar Nova Logo
                </label>
                <input type="file" id="input-logo" accept="image/*" class="hidden" onchange="previewImagem(this)">
            </div>

            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Dados da Loja</h3>
                <div class="space-y-3">
                    <input type="text" id="store-name" placeholder="Nome da Loja" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                    <input type="text" id="store-slogan" placeholder="Slogan" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                    <input type="text" id="store-address" placeholder="Endereço" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                    <input type="text" id="store-phone" placeholder="WhatsApp" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                </div>
            </div>

            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Horários</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="time" id="open-time" class="p-4 bg-zinc-700 rounded-xl outline-none text-sm" title="Abre">
                    <input type="time" id="close-time" class="p-4 bg-zinc-700 rounded-xl outline-none text-sm" title="Fecha">
                </div>
                <div class="mt-4 pt-4 border-t border-zinc-700">
                    <p class="text-[10px] font-bold uppercase text-zinc-400 mb-2 italic text-left">Pausa Almoço</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="time" id="lunch-start" class="p-3 bg-zinc-900 border border-zinc-700 rounded-xl text-sm">
                        <input type="time" id="lunch-end" class="p-3 bg-zinc-900 border border-zinc-700 rounded-xl text-sm">
                    </div>
                </div>
                <button onclick="salvarConfigLoja()" class="w-full bg-amber-600 py-4 rounded-2xl font-black uppercase text-xs mt-6">Gravar Dados</button>
            </div>
        </div>

        <div id="tab-categorias" class="tab-content hidden">
            <div class="flex gap-2 mb-4"><input type="text" id="nova-cat" class="flex-1 p-4 bg-zinc-800 rounded-xl outline-none"><button onclick="adicionarCategoria()" class="bg-green-600 px-6 rounded-xl font-black">+</button></div>
            <div id="sortable-list" class="space-y-2"></div>
        </div>

        <div id="tab-produtos" class="tab-content hidden">
            <div class="bg-zinc-800 p-4 rounded-3xl space-y-4">
                <input type="text" id="n" placeholder="Nome" class="w-full p-4 bg-zinc-700 rounded-xl outline-none">
                <select id="c" class="w-full p-4 bg-zinc-700 rounded-xl outline-none"></select>
                <input type="number" id="p" placeholder="Preço" class="w-full p-4 bg-zinc-700 rounded-xl outline-none">
                <input type="text" id="p-img" placeholder="Link Imagem" class="w-full p-4 bg-zinc-700 rounded-xl outline-none">
                <button onclick="salvarProduto()" class="w-full bg-amber-600 py-4 rounded-xl font-bold uppercase">Cadastrar</button>
            </div>
            <div id="lista-produtos" class="mt-4 space-y-2"></div>
        </div>

        <div id="tab-relatorios" class="tab-content hidden"><div id="rel-total" class="text-2xl font-bold">R$ 0,00</div></div>
        <div id="tab-usuarios" class="tab-content hidden"></div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let logoBase64 = "";

        // LOGIN
        window.handleLogin = () => {
            if(document.getElementById('user-login').value === "admin" && document.getElementById('pass-login').value === "Root@8505") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                carregarLoja();
                carregarCategorias();
                listarProdutos();
            }
        };

        // ABAS
        window.changeTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-' + id.split('-')[1]).classList.add('active');
        };

        // --- LÓGICA DA LOJA (UPLOAD E SALVAMENTO) ---
        
        window.previewImagem = (input) => {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    logoBase64 = e.target.result;
                    const img = document.getElementById('logo-preview');
                    img.src = logoBase64;
                    img.classList.remove('hidden');
                    document.getElementById('logo-text').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        window.salvarConfigLoja = async () => {
            const config = {
                nome: document.getElementById('store-name').value,
                slogan: document.getElementById('store-slogan').value,
                endereco: document.getElementById('store-address').value,
                whatsapp: document.getElementById('store-phone').value,
                logo: logoBase64,
                abre: document.getElementById('open-time').value,
                fecha: document.getElementById('close-time').value,
                almocoIni: document.getElementById('lunch-start').value,
                almocoFim: document.getElementById('lunch-end').value
            };

            try {
                const res = await fetch(`${DB_BASE}configuracao.json`, {
                    method: 'PUT',
                    body: JSON.stringify(config)
                });
                if(res.ok) Toastify({text: "CONFIGURAÇÕES SALVAS!", style: {background: "green"}}).showToast();
            } catch (e) { alert("Erro ao conectar ao Firebase"); }
        };

        async function carregarLoja() {
            const res = await fetch(`${DB_BASE}configuracao.json`);
            const data = await res.json();
            if(data) {
                document.getElementById('store-name').value = data.nome || "";
                document.getElementById('store-slogan').value = data.slogan || "";
                document.getElementById('store-address').value = data.endereco || "";
                document.getElementById('store-phone').value = data.whatsapp || "";
                document.getElementById('open-time').value = data.abre || "";
                document.getElementById('close-time').value = data.fecha || "";
                document.getElementById('lunch-start').value = data.almocoIni || "";
                document.getElementById('lunch-end').value = data.almocoFim || "";
                if(data.logo) {
                    logoBase64 = data.logo;
                    const img = document.getElementById('logo-preview');
                    img.src = data.logo;
                    img.classList.remove('hidden');
                    document.getElementById('logo-text').classList.add('hidden');
                }
            }
        }

        // --- STUBS PARA CATEGORIAS E PRODUTOS (Para não quebrar a página) ---
        window.adicionarCategoria = () => { console.log("Adicionar Categoria"); };
        window.carregarCategorias = () => { console.log("Carregar Categoria"); };
        window.salvarProduto = () => { console.log("Salvar Produto"); };
        window.listarProdutos = () => { console.log("Listar Produtos"); };
        window.logout = () => location.reload();

    </script>
</body>
</html>
