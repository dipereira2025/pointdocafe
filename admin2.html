<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 p-6 text-left">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-black mb-8 border-b border-zinc-700 pb-4 uppercase">Gestão de Cardápio</h1>
        
        <div class="bg-zinc-800 p-6 rounded-3xl mb-10 shadow-xl">
            <h2 class="font-bold mb-4 uppercase text-amber-500 text-xs">Novo Produto</h2>
            <div class="grid gap-4">
                <input type="text" id="p-nome" placeholder="Nome do Produto" class="bg-zinc-700 p-4 rounded-xl outline-none">
                <input type="number" id="p-preco" placeholder="Preço (0.00)" class="bg-zinc-700 p-4 rounded-xl outline-none">
                <button onclick="salvarProduto()" class="bg-amber-600 p-4 rounded-xl font-black uppercase">Adicionar Item</button>
            </div>
        </div>

        <h2 class="font-bold mb-4 uppercase text-zinc-500 text-xs">Itens Cadastrados</h2>
        <div id="lista-produtos" class="space-y-3"></div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";

        window.salvarProduto = async () => {
            const nome = document.getElementById('p-nome').value;
            const preco = parseFloat(document.getElementById('p-preco').value);
            if(!nome || !preco) return alert("Preencha tudo");
            const id = Date.now();
            await fetch(`${DB_BASE}produtos/${id}.json`, { method: 'PUT', body: JSON.stringify({nome, preco, pausado: false}) });
            document.getElementById('p-nome').value = "";
            document.getElementById('p-preco').value = "";
            carregarProdutos();
        };

        async function carregarProdutos() {
            const res = await fetch(`${DB_BASE}produtos.json`);
            const produtos = await res.json();
            const list = document.getElementById('lista-produtos');
            list.innerHTML = "";
            for (let id in produtos) {
                list.innerHTML += `
                    <div class="bg-zinc-800 p-4 rounded-2xl flex justify-between items-center border border-zinc-700">
                        <span class="font-bold">${produtos[id].nome}</span>
                        <button onclick="togglePausa('${id}', ${produtos[id].pausado})" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase ${produtos[id].pausado ? 'bg-red-600' : 'bg-green-600'}">
                            ${produtos[id].pausado ? 'Pausado (Esgotado)' : 'Ativo (No Menu)'}
                        </button>
                    </div>`;
            }
        }

        window.togglePausa = async (id, status) => {
            await fetch(`${DB_BASE}produtos/${id}/pausado.json`, { method: 'PUT', body: JSON.stringify(!status) });
            carregarProdutos();
        };

        carregarProdutos();
    </script>
</body>
</html>
