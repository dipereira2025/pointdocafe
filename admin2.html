<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .tab-btn.active { border-bottom: 4px solid #d97706; color: #d97706; }
        .tab-content.hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans text-left">

    <div id="painel" class="max-w-3xl mx-auto py-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black uppercase text-amber-500">Painel Administrativo</h1>
            <button onclick="location.reload()" class="text-[10px] underline uppercase">Sair</button>
        </header>
        
        <nav class="flex justify-around mb-8 border-b border-zinc-800 font-bold uppercase text-[9px] tracking-widest overflow-x-auto">
            <button onclick="changeTab('tab-loja')" class="tab-btn pb-2 px-2 active" id="btn-loja">Identidade</button>
            <button onclick="changeTab('tab-produtos')" class="tab-btn pb-2 px-2" id="btn-produtos">Produtos</button>
            <button onclick="changeTab('tab-relatorios')" class="tab-btn pb-2 px-2" id="btn-relatorios">Relatórios</button>
        </nav>

        <div id="tab-loja" class="tab-content space-y-6">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-amber-500 font-bold uppercase text-xs mb-4">Configuração de Funcionamento</h3>
                <div class="grid gap-4 text-sm">
                    <div>
                        <label class="block mb-1 text-zinc-400">Funcionamento Geral (Pedidos Comuns):</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="abre-geral" class="bg-zinc-700 p-3 rounded-xl outline-none">
                            <input type="time" id="fecha-geral" class="bg-zinc-700 p-3 rounded-xl outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block mb-1 text-zinc-400">Horário de Refeições (Almoço):</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="abre-refeicao" value="10:45" class="bg-zinc-700 p-3 rounded-xl outline-none">
                            <input type="time" id="fecha-refeicao" value="15:30" class="bg-zinc-700 p-3 rounded-xl outline-none">
                        </div>
                    </div>
                    <button onclick="salvarConfig()" class="w-full bg-amber-600 py-4 rounded-xl font-black uppercase text-xs">Salvar Horários</button>
                </div>
            </div>
        </div>

        <div id="tab-produtos" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 space-y-4">
                <h3 class="text-amber-500 font-bold uppercase text-xs">Novo Produto</h3>
                <input type="text" id="p-nome" placeholder="Nome" class="w-full p-4 rounded-xl bg-zinc-700 outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="p-preco" placeholder="Preço" class="p-4 rounded-xl bg-zinc-700 outline-none">
                    <select id="p-tipo" class="p-4 rounded-xl bg-zinc-700 outline-none">
                        <option value="comum">Pedido Comum</option>
                        <option value="refeicao">Refeição (Almoço)</option>
                    </select>
                </div>
                <input type="file" id="p-foto" class="text-xs">
                <button onclick="salvarProd()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase text-xs">Cadastrar</button>
            </div>
            <div id="lista-produtos" class="space-y-2"></div>
        </div>

        <div id="tab-relatorios" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-amber-500 font-bold uppercase text-xs mb-4">Filtro de Vendas</h3>
                <div class="flex flex-wrap gap-2 mb-4">
                    <input type="date" id="filtro-data" class="flex-1 bg-zinc-700 p-3 rounded-xl outline-none text-sm">
                    <button onclick="listarRelatorios()" class="bg-zinc-600 px-6 rounded-xl font-bold text-xs">FILTRAR</button>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <button onclick="exportarCSV()" class="bg-blue-600 py-2 rounded-lg text-[10px] font-bold uppercase">Exportar CSV</button>
                    <button onclick="exportarPDF()" class="bg-red-600 py-2 rounded-lg text-[10px] font-bold uppercase">Exportar PDF</button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                    <div class="bg-zinc-900 p-4 rounded-2xl">
                        <p class="text-[8px] text-zinc-500 uppercase">Total Pedidos</p>
                        <p id="resumo-qtd" class="text-2xl font-black text-white">0</p>
                    </div>
                    <div class="bg-zinc-900 p-4 rounded-2xl">
                        <p class="text-[8px] text-zinc-500 uppercase">Faturamento</p>
                        <p id="resumo-valor" class="text-2xl font-black text-green-500">R$ 0,00</p>
                    </div>
                </div>

                <div id="lista-vendas-historico" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        let prodB64 = "";
        let vendasFiltradas = [];

        // Inicializar data do filtro para hoje
        document.getElementById('filtro-data').valueAsDate = new Date();

        window.changeTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-' + id.split('-')[1]).classList.add('active');
            if(id === 'tab-relatorios') listarRelatorios();
            if(id === 'tab-produtos') carregarProdutos();
        };

        // GESTÃO DE PRODUTOS
        const ler = (f, cb) => { const r = new FileReader(); r.onload = e => cb(e.target.result); r.readAsDataURL(f); };
        document.getElementById('p-foto').onchange = e => ler(e.target.files[0], res => prodB64 = res);

        window.salvarProd = async () => {
            const p = { 
                nome: document.getElementById('p-nome').value, 
                preco: parseFloat(document.getElementById('p-preco').value), 
                tipo: document.getElementById('p-tipo').value,
                img: prodB64, pausado: false 
            };
            await fetch(`${DB_BASE}produtos/${Date.now()}.json`, { method: 'PUT', body: JSON.stringify(p) });
            Toastify({text: "Produto Salvo!"}).showToast();
            carregarProdutos();
        };

        async function carregarProdutos() {
            const res = await fetch(`${DB_BASE}produtos.json`);
            const prods = await res.json();
            const list = document.getElementById('lista-produtos');
            list.innerHTML = "";
            for(let id in prods) {
                list.innerHTML += `
                <div class="bg-zinc-800 p-4 rounded-2xl flex justify-between items-center border border-zinc-700">
                    <span class="text-sm font-bold">${prods[id].nome} <br><small class="text-zinc-500 uppercase text-[8px]">${prods[id].tipo}</small></span>
                    <button onclick="removerItem('produtos/${id}')" class="text-red-500 font-bold">X</button>
                </div>`;
            }
        }

        // RELATÓRIOS E FILTROS
        window.listarRelatorios = async () => {
            const res = await fetch(`${DB_BASE}vendas.json`);
            const vendas = await res.json();
            const container = document.getElementById('lista-vendas-historico');
            const dataFiltro = new Date(document.getElementById('filtro-data').value).toLocaleDateString('pt-BR');
            
            container.innerHTML = "";
            vendasFiltradas = [];
            let totalVal = 0;

            if(!vendas) return;

            Object.keys(vendas).forEach(id => {
                const v = vendas[id];
                if(v.dataLocal === dataFiltro) {
                    vendasFiltradas.push({id, ...v});
                    totalVal += v.total;
                }
            });

            document.getElementById('resumo-qtd').innerText = vendasFiltradas.length;
            document.getElementById('resumo-valor').innerText = `R$ ${totalVal.toFixed(2)}`;

            vendasFiltradas.reverse().forEach(v => {
                container.innerHTML += `
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex justify-between items-center">
                    <div>
                        <p class="text-xs font-bold text-white uppercase">${v.cliente}</p>
                        <p class="text-[9px] text-zinc-500">${v.id}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-green-500 font-bold text-xs">R$ ${v.total.toFixed(2)}</span>
                        <button onclick="removerItem('vendas/${v.id}')" class="text-zinc-600 hover:text-red-500 font-bold text-xs">EXCLUIR</button>
                    </div>
                </div>`;
            });
        };

        window.removerItem = async (path) => {
            if(confirm("Deseja excluir este registro permanentemente?")) {
                await fetch(`${DB_BASE}${path}.json`, { method: 'DELETE' });
                Toastify({text: "Excluído com sucesso!", style: {background: "#ef4444"}}).showToast();
                listarRelatorios();
                carregarProdutos();
            }
        };

        // EXPORTAÇÃO
        window.exportarCSV = () => {
            let csv = "ID;Data;Cliente;Total;Pagamento\n";
            vendasFiltradas.forEach(v => {
                csv += `${v.id};${v.dataLocal};${v.cliente};${v.total};${v.pagamento}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `relatorio_${document.getElementById('filtro-data').value}.csv`;
            a.click();
        };

        window.exportarPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`Relatorio de Vendas - ${document.getElementById('filtro-data').value}`, 10, 10);
            
            const rows = vendasFiltradas.map(v => [v.id.slice(-6), v.cliente, v.pagamento, `R$ ${v.total.toFixed(2)}`]);
            
            doc.autoTable({
                head: [['ID', 'Cliente', 'Pagto', 'Total']],
                body: rows,
                startY: 20
            });
            doc.save(`relatorio_${document.getElementById('filtro-data').value}.pdf`);
        };

        window.salvarConfig = async () => {
            const config = {
                geral: { abre: document.getElementById('abre-geral').value, fecha: document.getElementById('fecha-geral').value },
                refeicao: { abre: document.getElementById('abre-refeicao').value, fecha: document.getElementById('fecha-refeicao').value }
            };
            await fetch(`${DB_BASE}configuracao/horarios.json`, { method: 'PUT', body: JSON.stringify(config) });
            Toastify({text: "Horários Salvos!"}).showToast();
        };
    </script>
</body>
</html>
