<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .tab-btn.active { border-bottom: 4px solid #d97706; color: #d97706; }
        .tab-content.hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans text-left">

    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900 uppercase italic">Point Admin</h2>
        <input type="text" id="user-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-4 outline-none" placeholder="Usuário">
        <input type="password" id="pass-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-6 outline-none" placeholder="Senha">
        <button onclick="handleLogin()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold uppercase">Entrar</button>
    </div>

    <div id="painel" class="hidden max-w-2xl mx-auto py-4">
        <div class="flex justify-between items-center mb-6 px-2">
            <span class="text-[10px] text-amber-500 font-black uppercase tracking-widest">Painel Administrativo</span>
            <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase underline">Sair</button>
        </div>
        
        <div class="flex justify-around mb-8 border-b border-zinc-800 font-bold uppercase text-[9px] tracking-widest overflow-x-auto">
            <button onclick="changeTab('tab-loja')" class="tab-btn pb-2 px-2 active" id="btn-loja">Loja</button>
            <button onclick="changeTab('tab-categorias')" class="tab-btn pb-2 px-2" id="btn-categorias">Categorias</button>
            <button onclick="changeTab('tab-produtos')" class="tab-btn pb-2 px-2" id="btn-produtos">Produtos</button>
            <button onclick="changeTab('tab-relatorios')" class="tab-btn pb-2 px-2" id="btn-relatorios">Relatórios</button>
            <button onclick="changeTab('tab-usuarios')" class="tab-btn pb-2 px-2" id="btn-usuarios">Equipe</button>
        </div>

        <div id="tab-loja" class="tab-content space-y-6">
            
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 text-center">
                <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Identidade Visual</h3>
                <div class="relative w-32 h-32 mx-auto mb-4 bg-zinc-900 rounded-full border-4 border-amber-600 flex items-center justify-center overflow-hidden">
                    <img id="view-logo" class="w-full h-full object-cover hidden" alt="Logo">
                    <span id="placeholder-logo" class="text-[10px] font-bold text-zinc-500 uppercase">Sem Logo</span>
                </div>
                <input type="text" id="store-logo-url" placeholder="URL da Logomarca" class="w-full p-3 bg-zinc-700 rounded-xl text-xs outline-none mb-2 border border-transparent focus:border-amber-600">
                <p class="text-[9px] text-zinc-500 uppercase italic">Insira o link da imagem (PNG ou JPG)</p>
            </div>

            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Dados da Loja</h3>
                <div class="grid gap-3">
                    <input type="text" id="store-name" placeholder="Nome da Loja" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                    <input type="text" id="store-slogan" placeholder="Slogan da Loja" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                    <input type="text" id="store-address" placeholder="Endereço Completo" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                    <input type="text" id="store-phone" placeholder="WhatsApp (DDD+Número)" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
                </div>
            </div>

            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest text-left">Horário de Atendimento</h3>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-bold uppercase text-zinc-500 block mb-1">Abre às</label>
                            <input type="time" id="open-time" class="w-full p-3 bg-zinc-700 rounded-xl outline-none text-sm">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold uppercase text-zinc-500 block mb-1">Fecha às</label>
                            <input type="time" id="close-time" class="w-full p-3 bg-zinc-700 rounded-xl outline-none text-sm">
                        </div>
                    </div>
                    
                    <div class="pt-4 border-t border-zinc-700">
                        <label class="text-[10px] font-bold uppercase text-zinc-400 block mb-2 italic text-left">Intervalo de Almoço</label>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="time" id="lunch-start" class="w-full p-3 bg-zinc-900 border border-zinc-700 rounded-xl outline-none text-sm text-amber-500">
                            <input type="time" id="lunch-end" class="w-full p-3 bg-zinc-900 border border-zinc-700 rounded-xl outline-none text-sm text-amber-500">
                        </div>
                    </div>

                    <button onclick="salvarConfigLoja()" class="w-full bg-amber-600 py-4 rounded-2xl font-black uppercase text-xs shadow-xl mt-4">Gravar Dados da Loja</button>
                </div>
            </div>
        </div>

        <div id="tab-categorias" class="tab-content hidden"><div id="sortable-list"></div></div>
        <div id="tab-produtos" class="tab-content hidden"><div id="lista-produtos"></div></div>
        <div id="tab-relatorios" class="tab-content hidden"></div>
        <div id="tab-usuarios" class="tab-content hidden"></div>

    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";

        // LOGIN SIMPLES
        window.handleLogin = () => {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            if(u === "admin" && p === "Root@8505") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                carregarLoja();
            }
        };

        // TROCA DE ABAS
        window.changeTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId.split('-')[1]).classList.add('active');
        };

        // CARREGAR DADOS DA LOJA
        async function carregarLoja() {
            const res = await fetch(`${DB_BASE}configuracao.json`);
            const data = await res.json();
            if(data) {
                document.getElementById('store-name').value = data.nome || "";
                document.getElementById('store-slogan').value = data.slogan || "";
                document.getElementById('store-address').value = data.endereco || "";
                document.getElementById('store-phone').value = data.whatsapp || "";
                document.getElementById('store-logo-url').value = data.logo || "";
                document.getElementById('open-time').value = data.abre || "08:00";
                document.getElementById('close-time').value = data.fecha || "18:00";
                document.getElementById('lunch-start').value = data.almoçoInicio || "12:00";
                document.getElementById('lunch-end').value = data.almoçoFim || "13:30";
                
                if(data.logo) {
                    document.getElementById('view-logo').src = data.logo;
                    document.getElementById('view-logo').classList.remove('hidden');
                    document.getElementById('placeholder-logo').classList.add('hidden');
                }
            }
        }

        // SALVAR DADOS DA LOJA
        window.salvarConfigLoja = async () => {
            const config = {
                nome: document.getElementById('store-name').value,
                slogan: document.getElementById('store-slogan').value,
                endereco: document.getElementById('store-address').value,
                whatsapp: document.getElementById('store-phone').value,
                logo: document.getElementById('store-logo-url').value,
                abre: document.getElementById('open-time').value,
                fecha: document.getElementById('close-time').value,
                almoçoInicio: document.getElementById('lunch-start').value,
                almoçoFim: document.getElementById('lunch-end').value
            };

            await fetch(`${DB_BASE}configuracao.json`, { 
                method: 'PUT', 
                body: JSON.stringify(config) 
            });

            Toastify({text: "Dados atualizados!", style: {background: "green"}}).showToast();
            carregarLoja();
        };

        // Sair
        window.logout = () => location.reload();

    </script>
</body>
</html>
