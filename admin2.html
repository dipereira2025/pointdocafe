<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        .day-btn.active { background-color: #d97706; color: white; border-color: #d97706; }
        .tab-btn.active { border-bottom: 4px solid #d97706; color: #d97706; }
        .tab-content.hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans text-left">

    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900 uppercase italic text-left">Point Admin</h2>
        <input type="text" id="user-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-4 outline-none" placeholder="Usuário">
        <input type="password" id="pass-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-6 outline-none" placeholder="Senha">
        <button onclick="handleLogin()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold uppercase">Entrar</button>
    </div>

    <div id="painel" class="hidden max-w-2xl mx-auto py-4">
        <div class="flex justify-between items-center mb-6 px-2 text-left">
            <span class="text-[10px] text-amber-500 font-black uppercase tracking-widest">Painel Administrativo</span>
            <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase underline">Sair</button>
        </div>
        
        <div class="flex justify-around mb-8 border-b border-zinc-800 font-bold uppercase text-[9px] tracking-widest overflow-x-auto">
            <button onclick="changeTab('tab-loja')" class="tab-btn pb-2 px-2 active" id="btn-loja">Loja</button>
            <button onclick="changeTab('tab-categorias')" class="tab-btn pb-2 px-2" id="btn-categorias">Categorias</button>
            <button onclick="changeTab('tab-produtos')" class="tab-btn pb-2 px-2" id="btn-produtos">Produtos</button>
            <button onclick="changeTab('tab-relatorios')" class="tab-btn pb-2 px-2" id="btn-relatorios">Relatórios</button>
            <button onclick="changeTab('tab-usuarios')" class="tab-btn pb-2 px-2" id="btn-usuarios">Equipe</button>
        </div>

        <div id="tab-loja" class="tab-content space-y-6">
    <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 text-center">
        <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Logomarca</h3>
        <div class="relative w-32 h-32 mx-auto mb-6 bg-zinc-900 rounded-full border-4 border-amber-600 flex items-center justify-center overflow-hidden group">
            <img id="logo-preview" class="w-full h-full object-cover hidden">
            <span id="logo-text" class="text-[10px] font-bold text-zinc-500 uppercase">Sem Logo</span>
        </div>
        <label for="input-logo" class="cursor-pointer bg-zinc-700 hover:bg-zinc-600 px-6 py-3 rounded-xl font-bold text-[10px] uppercase transition-all inline-block border border-zinc-600">
            📂 Selecionar Nova Logo
        </label>
        <input type="file" id="input-logo" accept="image/*" class="hidden" onchange="previewImagem(this)">
    </div>

    <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
        <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Informações Gerais</h3>
        <div class="space-y-3">
            <input type="text" id="store-name" placeholder="Nome da Loja" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
            <input type="text" id="store-slogan" placeholder="Slogan" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
            <input type="text" id="store-address" placeholder="Endereço" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
            <input type="text" id="store-phone" placeholder="WhatsApp" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
        </div>
    </div>

    <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
        <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Horários</h3>
        <div class="grid grid-cols-2 gap-4">
            <input type="time" id="open-time" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
            <input type="time" id="close-time" class="w-full p-4 bg-zinc-700 rounded-xl outline-none text-sm">
        </div>
        <div class="mt-4 pt-4 border-t border-zinc-700">
            <p class="text-[10px] font-bold uppercase text-zinc-400 mb-2">Pausa Almoço</p>
            <div class="grid grid-cols-2 gap-4">
                <input type="time" id="lunch-start" class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none text-sm">
                <input type="time" id="lunch-end" class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none text-sm">
            </div>
        </div>
        <button onclick="salvarConfigLoja()" class="w-full bg-amber-600 py-4 rounded-2xl font-black uppercase text-xs mt-6 shadow-xl">Salvar Tudo</button>
    </div>
</div>

            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h3 class="text-xs font-black uppercase text-amber-500 mb-4 tracking-widest">Horários de Funcionamento</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="time" id="open-time" class="p-4 bg-zinc-700 rounded-xl outline-none text-sm" title="Abre às">
                    <input type="time" id="close-time" class="p-4 bg-zinc-700 rounded-xl outline-none text-sm" title="Fecha às">
                </div>
                <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-700">
                    <p class="text-[9px] font-bold text-zinc-500 uppercase mb-2 italic">Intervalo de Almoço</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="time" id="lunch-start" class="p-3 bg-zinc-700 rounded-xl outline-none text-sm">
                        <input type="time" id="lunch-end" class="p-3 bg-zinc-700 rounded-xl outline-none text-sm">
                    </div>
                </div>
                <button onclick="salvarConfigLoja()" class="w-full bg-amber-600 py-4 rounded-2xl font-black uppercase text-xs mt-6">Gravar Dados da Loja</button>
            </div>
        </div>

        <div id="tab-categorias" class="tab-content hidden">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="nova-cat" placeholder="Nova Categoria" class="flex-1 p-4 rounded-xl bg-zinc-700 outline-none text-sm">
                    <button onclick="adicionarCategoria()" class="bg-green-600 px-6 rounded-xl font-black text-xl">+</button>
                </div>
                <div id="sortable-list" class="space-y-2 mb-6"></div>
                <button onclick="salvarOrdemCategorias()" class="w-full bg-amber-600 py-4 rounded-xl font-black uppercase text-xs">Salvar Ordem</button>
            </div>
        </div>

        <div id="tab-produtos" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 space-y-4">
                <input type="hidden" id="edit-id"><input type="text" id="n" placeholder="Produto" class="w-full p-4 rounded-xl bg-zinc-700 outline-none">
                <select id="c" class="w-full p-4 rounded-xl bg-zinc-700 outline-none text-sm"></select>
                <div class="flex flex-wrap gap-2" id="dias-semana">
                    <button type="button" data-day="0" class="day-btn border border-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold">Dom</button>
                    <button type="button" data-day="1" class="day-btn border border-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold">Seg</button>
                    <button type="button" data-day="2" class="day-btn border border-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold">Ter</button>
                    <button type="button" data-day="3" class="day-btn border border-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold">Qua</button>
                    <button type="button" data-day="4" class="day-btn border border-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold">Qui</button>
                    <button type="button" data-day="5" class="day-btn border border-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold">Sex</button>
                    <button type="button" data-day="6" class="day-btn border border-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold">Sáb</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="p" placeholder="Preço" class="w-full p-4 rounded-xl bg-zinc-700 outline-none">
                    <input type="text" id="p-img" placeholder="URL Foto" class="w-full p-4 rounded-xl bg-zinc-700 outline-none">
                </div>
                <button onclick="salvarProduto()" class="w-full bg-amber-600 py-4 rounded-xl font-black uppercase">Salvar Produto</button>
            </div>
            <div id="lista-produtos" class="space-y-2"></div>
        </div>

        <div id="tab-relatorios" class="tab-content hidden space-y-6">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                    <div class="bg-zinc-900 p-5 rounded-2xl"><p class="text-[9px] text-zinc-500 uppercase font-black">Pedidos</p><p id="rel-qtd" class="text-3xl font-black text-white">0</p></div>
                    <div class="bg-zinc-900 p-5 rounded-2xl"><p class="text-[9px] text-zinc-500 uppercase font-black">Faturamento</p><p id="rel-total" class="text-xl font-black text-green-500">R$ 0,00</p></div>
                </div>
                <button onclick="excluirTodosPedidos()" class="w-full py-4 bg-red-900/20 text-red-500 rounded-2xl font-black text-[10px] uppercase border border-red-900/50">Limpar Banco</button>
            </div>
        </div>

        <div id="tab-usuarios" class="tab-content hidden space-y-4">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <input type="text" id="new-user" placeholder="Usuário" class="w-full p-4 mb-3 rounded-xl bg-zinc-700 outline-none">
                <input type="password" id="new-pass" placeholder="Senha" class="w-full p-4 mb-4 rounded-xl bg-zinc-700 outline-none">
                <button onclick="cadastrarUsuario()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase text-xs">Criar Acesso</button>
                <div id="lista-usuarios" class="mt-8 space-y-2"></div>
            </div>
        </div>

    </div>

    <script type="module">
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";

        // LÓGICA DE ABAS E LOGIN
        window.handleLogin = () => {
            if(document.getElementById('user-login').value === "admin" && document.getElementById('pass-login').value === "Root@8505") {
                document.getElementById('login').classList.add('hidden'); document.getElementById('painel').classList.remove('hidden');
                carregarLoja(); carregarCategorias(); listarProdutos(); carregarRelatorio(); listarUsuarios();
            }
        };

        window.changeTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId.split('-')[1]).classList.add('active');
        };

        // --- FUNCIONALIDADE LOJA (NOVA) ---
        async function carregarLoja() {
            const res = await fetch(`${DB_BASE}config.json`);
            const data = await res.json();
            if(data) {
                document.getElementById('store-name').value = data.nome || "";
                document.getElementById('store-slogan').value = data.slogan || "";
                document.getElementById('store-address').value = data.endereco || "";
                document.getElementById('store-phone').value = data.zap || "";
                document.getElementById('store-logo').value = data.logo || "";
                document.getElementById('open-time').value = data.abre || "";
                document.getElementById('close-time').value = data.fecha || "";
                document.getElementById('lunch-start').value = data.almocoIni || "";
                document.getElementById('lunch-end').value = data.almocoFim || "";
                if(data.logo) { document.getElementById('logo-preview').src = data.logo; document.getElementById('logo-preview').classList.remove('hidden'); }
            }
        }

        window.salvarConfigLoja = async () => {
            const config = {
                nome: document.getElementById('store-name').value,
                slogan: document.getElementById('store-slogan').value,
                endereco: document.getElementById('store-address').value,
                zap: document.getElementById('store-phone').value,
                logo: document.getElementById('store-logo').value,
                abre: document.getElementById('open-time').value,
                fecha: document.getElementById('close-time').value,
                almocoIni: document.getElementById('lunch-start').value,
                almocoFim: document.getElementById('lunch-end').value
            };
            await fetch(`${DB_BASE}config.json`, { method: 'PUT', body: JSON.stringify(config) });
            Toastify({text: "Configurações da Loja Salvas!", style: {background: "green"}}).showToast();
        };

        // --- RESTANTE DAS FUNÇÕES ORIGINAIS (MANTIDAS) ---
        // Adicionar funções de Categorias, Produtos, Relatórios e Usuários aqui...
        // Exemplo simplificado para não estourar o limite de texto:
        window.adicionarCategoria = async () => { /* sua lógica original */ };
        window.salvarProduto = async () => { /* sua lógica original */ };
        window.listarProdutos = async () => { /* sua lógica original */ };
        window.logout = () => location.reload();
    </script>
</body>
</html>
