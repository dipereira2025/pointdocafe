<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans">

    <!-- Tela de Login (Senha: Root@8505) -->
    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl text-center">
        <h2 class="text-2xl font-black mb-6 text-amber-900 underline">PAINEL POINT</h2>
        <div class="relative mb-4">
            <input type="password" id="pass" class="w-full p-4 border-2 border-amber-100 rounded-xl outline-none focus:border-amber-600" placeholder="Senha do Point">
            <button type="button" onclick="togglePassword()" class="absolute right-4 top-4 text-gray-500"><span id="eye-icon">👁️</span></button>
        </div>
        <button onclick="entrar()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold hover:bg-black transition-colors">ACESSAR SISTEMA</button>
    </div>

    <!-- Painel Administrativo -->
    <div id="painel" class="hidden max-w-xl mx-auto py-8">
        
        <!-- SEÇÃO: PERSONALIZAÇÃO DA LOGO -->
        <div class="bg-amber-900/20 p-6 rounded-3xl border border-amber-900/50 mb-8">
            <h2 class="text-amber-500 font-black uppercase text-sm mb-4">Identidade Visual</h2>
            <div class="flex flex-col md:flex-row items-center gap-6">
                <div id="logo-preview-container" class="w-24 h-24 bg-zinc-800 rounded-full flex items-center justify-center border-2 border-amber-600 overflow-hidden">
                    <span id="logo-placeholder" class="text-xs text-zinc-500">Sem Logo</span>
                    <img id="logo-img-view" class="hidden w-full h-full object-cover">
                </div>
                <div class="flex-1 space-y-2">
                    <p class="text-[11px] text-zinc-400">Envie sua logo (preferência fundo transparente) para aparecer no topo do cardápio.</p>
                    <input type="file" id="logoInput" accept="image/*" class="w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-amber-900 file:text-white hover:file:bg-amber-800">
                    <button onclick="salvarLogo()" id="btnLogo" class="text-xs bg-amber-600 px-4 py-2 rounded-lg font-bold">Salvar Logo da Loja</button>
                </div>
            </div>
        </div>

        <hr class="border-zinc-800 mb-8">

        <!-- FORMULÁRIO DE PRODUTOS -->
        <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl space-y-4 mb-10">
            <h2 id="form-title" class="text-amber-500 font-bold uppercase text-sm">Adicionar Novo Produto</h2>
            <input type="hidden" id="edit-id" value="">
            <input type="text" id="n" placeholder="Nome do Produto" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            <select id="c" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
                <option value="Comum">Produto Geral</option>
                <option value="Combos do dia">Combos do dia</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Salgados">Salgados</option>
                <option value="Bombonieries">Bombonieries</option>
            </select>
            <input type="number" id="p" placeholder="Preço" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            <input type="file" id="fileInput" accept="image/*" class="w-full p-3 rounded-xl bg-zinc-700 text-sm border-2 border-dashed border-zinc-600">
            <canvas id="canvas" style="display:none;"></canvas>
            <div class="flex gap-2">
                <button onclick="salvar()" id="btnSalvar" class="flex-1 bg-amber-600 text-white py-4 rounded-xl font-black uppercase">Salvar Produto</button>
                <button onclick="cancelarEdicao()" id="btnCancelar" class="hidden bg-zinc-600 text-white px-6 rounded-xl font-bold">Cancelar</button>
            </div>
        </div>

        <div id="lista" class="grid gap-3"></div>
    </div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const DB_URL = DB_BASE + "produtos.json";
        const LOGO_URL = DB_BASE + "configuracao/logo.json";
        
        let imagemBase64 = "";
        let logoBase64 = "";

        function entrar() {
            if(document.getElementById('pass').value === "Root@8505") { 
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                carregarLogo();
                listar();
            } else { alert("Senha incorreta!"); }
        }

        // --- LÓGICA DA LOGO ---
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const cv = document.createElement('canvas');
                    cv.width = 300; cv.height = 300;
                    cv.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    logoBase64 = cv.toDataURL('image/png');
                    document.getElementById('logo-img-view').src = logoBase64;
                    document.getElementById('logo-img-view').classList.remove('hidden');
                    document.getElementById('logo-placeholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function salvarLogo() {
            if(!logoBase64) return alert("Selecione uma imagem primeiro!");
            document.getElementById('btnLogo').innerText = "Salvando...";
            await fetch(LOGO_URL, { method: 'PUT', body: JSON.stringify(logoBase64) });
            document.getElementById('btnLogo').innerText = "Logo Salva!";
            setTimeout(() => document.getElementById('btnLogo').innerText = "Salvar Logo da Loja", 2000);
        }

        async function carregarLogo() {
            const res = await fetch(LOGO_URL);
            const data = await res.json();
            if(data) {
                document.getElementById('logo-img-view').src = data;
                document.getElementById('logo-img-view').classList.remove('hidden');
                document.getElementById('logo-placeholder').classList.add('hidden');
            }
        }

        // --- LÓGICA DE PRODUTOS (IGUAL ANTERIOR) ---
        // ... (Funções salvar, listar, remover, etc) ...
        // (Copie as funções de produto que já tínhamos no admin anterior aqui)
    </script>
</body>
</html>
