<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profissional - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-btn.active { background-color: #d97706; color: white; border-color: #d97706; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans">

    <!-- Login (Root@8505) -->
    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900">PAINEL POINT</h2>
        <input type="password" id="pass" class="w-full p-4 border rounded-xl mb-4 outline-none" placeholder="Senha">
        <button onclick="entrar()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold">ACESSAR</button>
    </div>

    <div id="painel" class="hidden max-w-2xl mx-auto py-8">
        
        <!-- GESTÃO DE CATEGORIAS -->
        <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 mb-8">
            <h2 class="text-amber-500 font-black uppercase text-sm mb-4">Gerenciar Categorias</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="nova-cat" placeholder="Nome da Categoria" class="flex-1 p-3 rounded-xl bg-zinc-700 border-none outline-none text-sm">
                <button onclick="adicionarCategoria()" class="bg-green-600 px-6 rounded-xl font-bold">+</button>
            </div>
            <div id="lista-categorias" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- FORMULÁRIO DE PRODUTO -->
        <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl space-y-4 mb-10">
            <h2 id="form-title" class="text-amber-500 font-bold uppercase text-sm">Novo Produto</h2>
            <input type="hidden" id="edit-id" value="">
            
            <input type="text" id="n" placeholder="Nome do Produto" class="w-full p-4 rounded-xl bg-zinc-700 border-none outline-none">
            
            <select id="c" class="w-full p-4 rounded-xl bg-zinc-700 border-none outline-none text-sm"></select>

            <!-- SELEÇÃO DE DIAS -->
            <div class="space-y-2">
                <label class="block text-[10px] text-amber-500 uppercase font-bold ml-2">Agendar para Dias Específicos (Opcional)</label>
                <div class="flex flex-wrap gap-2" id="dias-semana">
                    <button type="button" data-day="0" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-[10px] uppercase font-bold">Dom</button>
                    <button type="button" data-day="1" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-[10px] uppercase font-bold">Seg</button>
                    <button type="button" data-day="2" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-[10px] uppercase font-bold">Ter</button>
                    <button type="button" data-day="3" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-[10px] uppercase font-bold">Qua</button>
                    <button type="button" data-day="4" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-[10px] uppercase font-bold">Qui</button>
                    <button type="button" data-day="5" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-[10px] uppercase font-bold">Sex</button>
                    <button type="button" data-day="6" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-[10px] uppercase font-bold">Sáb</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="p" placeholder="Preço Normal" class="w-full p-4 rounded-xl bg-zinc-700 border-none outline-none">
                <input type="number" id="p-promo" placeholder="Preço Promo" class="w-full p-4 rounded-xl bg-zinc-700 border-amber-900 border outline-none">
            </div>

            <input type="file" id="fileInput" accept="image/*" class="w-full p-3 rounded-xl bg-zinc-700 text-xs">
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="flex gap-2">
                <button onclick="salvar()" id="btnSalvar" class="flex-1 bg-amber-600 py-4 rounded-xl font-black uppercase tracking-widest">Salvar Produto</button>
                <button onclick="cancelarEdicao()" id="btnCancelar" class="hidden bg-zinc-600 px-6 rounded-xl font-bold">Cancelar</button>
            </div>
        </div>

        <div id="lista" class="grid gap-3"></div>
    </div>

    <script>
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        const CAT_URL = DB_BASE + "categorias.json";
        const PROD_URL = DB_BASE + "produtos.json";
        let imagemBase64 = "";
        let diasSelecionados = [];

        // Controle dos botões de dias
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const day = btn.getAttribute('data-day');
                if (diasSelecionados.includes(day)) {
                    diasSelecionados = diasSelecionados.filter(d => d !== day);
                    btn.classList.remove('active');
                } else {
                    diasSelecionados.push(day);
                    btn.classList.add('active');
                }
            });
        });

        function entrar() {
            if(document.getElementById('pass').value === "Root@8505") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                carregarCategorias();
                listarProdutos();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarCategorias() {
            const res = await fetch(CAT_URL);
            const data = await res.json() || ["Comum"];
            const select = document.getElementById('c');
            select.innerHTML = data.map(cat => `<option value="${cat}">${cat}</option>`).join('');
            document.getElementById('lista-categorias').innerHTML = data.map(cat => `
                <div class="bg-zinc-700 px-3 py-1 rounded-full flex items-center gap-2 text-[10px]">
                    <span>${cat}</span>
                    <button onclick="removerCategoria('${cat}')" class="text-red-500 font-black">×</button>
                </div>
            `).join('');
        }

        async function salvar() {
            const id = document.getElementById('edit-id').value;
            const item = {
                nome: document.getElementById('n').value,
                categoria: document.getElementById('c').value,
                preco: parseFloat(document.getElementById('p').value),
                precoPromo: parseFloat(document.getElementById('p-promo').value) || null,
                dias: diasSelecionados,
                img: imagemBase64
            };

            const url = id ? PROD_URL.replace('.json', `/${id}.json`) : PROD_URL.replace('.json', `/${Date.now()}.json`);
            
            if(id && !imagemBase64) {
                const r = await fetch(url);
                const d = await r.json();
                item.img = d.img;
            }

            await fetch(url, { method: 'PUT', body: JSON.stringify(item) });
            location.reload();
        }

        // ... (Funções de imagem, listarProdutos e removerCategoria permanecem iguais)
    </script>
</body>
</html>
