<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans">

    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900 underline">PAINEL POINT</h2>
        <input type="password" id="pass" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-4 outline-none focus:border-amber-600" placeholder="Senha do Point">
        <button onclick="entrar()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold hover:bg-black transition-colors">ACESSAR SISTEMA</button>
    </div>

    <div id="painel" class="hidden max-w-xl mx-auto py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">Gerenciar Menu</h1>
            <button onclick="location.reload()" class="bg-zinc-700 p-2 rounded-lg text-xs">Sair</button>
        </div>
        
        <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl space-y-4 mb-10">
            <input type="text" id="n" placeholder="Nome do Produto" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            <select id="c" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
                <option>Prato do dia</option>
                <option>Combos do dia</option>
                <option>Bebidas</option>
                <option>Salgados</option>
                <option>Bombonieries</option>
            </select>
            <input type="number" id="p" placeholder="Preço (ex: 15.50)" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            <input type="text" id="i" placeholder="Link da Imagem (URL)" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            <button onclick="salvar()" class="w-full bg-amber-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-amber-500 transition-all uppercase tracking-widest">Adicionar ao Cardápio</button>
        </div>

        <h3 class="text-xl font-bold mb-4 flex items-center gap-2">🛒 Itens Atuais <span id="total-itens" class="text-xs bg-amber-600 px-2 py-1 rounded">0</span></h3>
        <div id="lista" class="grid gap-3"></div>
    </div>

    <script>
        // SUBSTITUA ABAIXO PELA SUA URL DO FIREBASE
        const DB_URL = "https://pointdocafe-default-rtdb.firebaseio.com/produtos.json";
        const WHATSAPP = "5561999521964";
        
        function entrar() {
            if(document.getElementById('pass').value === "Root@8505") { // Mude sua senha aqui
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                listar();
            } else {
                alert("Senha incorreta!");
            }
        }

        async function salvar() {
            const nome = document.getElementById('n').value;
            const preco = document.getElementById('p').value;
            if(!nome || !preco) return alert("Preencha Nome e Preço!");

            const item = {
                nome: nome,
                categoria: document.getElementById('c').value,
                preco: parseFloat(preco),
                img: document.getElementById('i').value || 'https://via.placeholder.com/150'
            };

            await fetch(DB_URL.replace('.json', `/${Date.now()}.json`), {
                method: 'PUT',
                body: JSON.stringify(item)
            });
            
            // Limpar campos
            document.getElementById('n').value = "";
            document.getElementById('p').value = "";
            document.getElementById('i').value = "";

            listar();
        }

        async function listar() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let count = 0;
            
            for(let id in data) {
                count++;
                lista.innerHTML += `
                    <div class="bg-zinc-800 p-4 flex justify-between items-center rounded-2xl border border-zinc-700">
                        <div class="flex flex-col">
                            <span class="text-amber-500 text-[10px] font-bold uppercase">${data[id].categoria}</span>
                            <span class="font-bold">${data[id].nome}</span>
                        </div>
                        <button onclick="remover('${id}')" class="bg-red-900/30 text-red-500 p-3 rounded-xl hover:bg-red-500 hover:text-white transition-all text-sm font-bold">EXCLUIR</button>
                    </div>`;
            }
            document.getElementById('total-itens').innerText = count;
        }

        async function remover(id) {
            if(confirm("Tem certeza que deseja remover este item?")) {
                await fetch(DB_URL.replace('produtos.json', `produtos/${id}.json`), { method: 'DELETE' });
                listar();
            }
        }
    </script>
</body>
</html>
