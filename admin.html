<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Full - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans">

    <!-- LOGIN -->
    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900">PAINEL POINT</h2>
        <input type="text" id="user-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-4 outline-none" placeholder="Usuário">
        <input type="password" id="pass-login" class="w-full p-4 border-2 border-amber-100 rounded-xl mb-4 outline-none" placeholder="Senha">
        <button onclick="fazerLogin()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold">ENTRAR</button>
    </div>

    <!-- PAINEL -->
    <div id="painel" class="hidden max-w-2xl mx-auto py-4">
        <div class="flex justify-around mb-8 border-b border-zinc-800 font-bold uppercase text-[10px] tracking-widest">
            <button onclick="changeTab('tab-loja')" class="pb-2 px-2" id="btn-loja">Loja</button>
            <button onclick="changeTab('tab-categorias')" class="pb-2 px-2" id="btn-categorias">Categorias</button>
            <button onclick="changeTab('tab-produtos')" class="pb-2 px-2" id="btn-produtos">Produtos</button>
            <button onclick="changeTab('tab-usuarios')" class="pb-2 px-2" id="btn-usuarios">Equipe</button>
        </div>

        <!-- ABA LOJA -->
        <div id="tab-loja" class="tab-content space-y-6 text-center">
            <div class="w-32 h-32 bg-zinc-800 mx-auto rounded-full border-2 border-amber-600 overflow-hidden mb-4">
                <img id="logo-img-view" class="w-full h-full object-cover hidden">
            </div>
            <input type="file" id="logoInput" class="text-xs">
            <button onclick="salvarLogo()" class="w-full bg-amber-600 py-3 rounded-xl font-bold">SALVAR LOGO</button>
        </div>

        <!-- ABA CATEGORIAS (ORDEm IFOOD) -->
        <div id="tab-categorias" class="tab-content hidden">
            <div class="flex gap-2 mb-4">
                <input type="text" id="nova-cat" placeholder="Nova Categoria" class="flex-1 p-3 rounded-xl bg-zinc-700 outline-none">
                <button onclick="adicionarCategoria()" class="bg-green-600 px-6 rounded-xl font-bold">+</button>
            </div>
            <div id="sortable-list" class="space-y-2"></div>
            <button onclick="salvarOrdemCategorias()" class="w-full mt-4 bg-amber-600 py-3 rounded-xl font-bold text-xs">SALVAR ORDEM IFOOD</button>
        </div>

        <!-- ABA PRODUTOS -->
        <div id="tab-produtos" class="tab-content hidden space-y-4">
            <input type="hidden" id="edit-id">
            <input type="text" id="n" placeholder="Nome" class="w-full p-4 rounded-xl bg-zinc-700 outline-none">
            <select id="c" class="w-full p-4 rounded-xl bg-zinc-700 outline-none"></select>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="p" placeholder="Preço" class="w-full p-4 rounded-xl bg-zinc-700 outline-none">
                <input type="number" id="p-promo" placeholder="Preço Promo" class="w-full p-4 rounded-xl bg-zinc-700 border border-amber-600 outline-none">
            </div>
            <input type="file" id="fileInput" class="text-xs">
            <button onclick="salvar()" class="w-full bg-amber-600 py-4 rounded-xl font-black">SALVAR PRODUTO</button>
            <div id="lista-produtos" class="grid gap-2 mt-6"></div>
        </div>

        <!-- ABA USUÁRIOS -->
        <div id="tab-usuarios" class="tab-content hidden space-y-4">
            <input type="text" id="new-user" placeholder="Nome" class="w-full p-3 rounded-xl bg-zinc-700 outline-none">
            <input type="password" id="new-pass" placeholder="Senha" class="w-full p-3 rounded-xl bg-zinc-700 outline-none">
            <button onclick="cadastrarUsuario()" class="w-full bg-green-600 py-3 rounded-xl font-bold">CRIAR ACESSO</button>
            <div id="lista-usuarios" class="mt-4 space-y-2"></div>
        </div>
    </div>

    <script>
        // Use a sua URL do Firebase aqui
        const DB_BASE = "https://pointdocafe-default-rtdb.firebaseio.com/";
        
        // --- Todas as funções de lógica que enviamos antes (Login, Categorias, Produtos, Logo, Usuarios) ---
        // Basta manter as funções JavaScript que discutimos.
    </script>
</body>
</html>
