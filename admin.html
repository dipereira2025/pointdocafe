<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-btn.active { background-color: #d97706; color: white; border-color: #d97706; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans">

    <!-- Tela de Login (Mantida com a senha Root@8505) -->
    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900 underline">PAINEL POINT</h2>
        <div class="relative mb-4">
            <input type="password" id="pass" class="w-full p-4 border-2 border-amber-100 rounded-xl outline-none focus:border-amber-600" placeholder="Senha do Point">
            <button type="button" onclick="togglePassword()" class="absolute right-4 top-4 text-gray-500"><span id="eye-icon">👁️</span></button>
        </div>
        <button onclick="entrar()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold hover:bg-black transition-colors">ACESSAR SISTEMA</button>
    </div>

    <!-- Painel Administrativo -->
    <div id="painel" class="hidden max-w-xl mx-auto py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">Gerenciar Menu</h1>
            <button onclick="location.reload()" class="bg-zinc-700 p-2 rounded-lg text-xs">Sair</button>
        </div>
        
        <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl space-y-4 mb-10">
            <h2 id="form-title" class="text-amber-500 font-bold uppercase text-sm">Adicionar Novo Produto</h2>
            <input type="hidden" id="edit-id" value="">

            <input type="text" id="n" placeholder="Nome do Produto" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            <select id="c" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
                <option value="Comum">Produto Geral</option>
                <option value="Combos do dia">Combos do dia</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Salgados">Salgados</option>
                <option value="Bombonieries">Bombonieries</option>
            </select>
            
            <div id="area-dias" class="space-y-2">
                <label class="block text-sm font-bold text-amber-500 uppercase">Dias de Disponibilidade (Opcional)</label>
                <p class="text-[10px] text-zinc-400 italic">Se selecionar dias, ele aparecerá como "Prato do Dia" apenas nestas datas.</p>
                <div class="flex flex-wrap gap-2" id="dias-semana">
                    <button type="button" data-day="0" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-xs">Dom</button>
                    <button type="button" data-day="1" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-xs">Seg</button>
                    <button type="button" data-day="2" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-xs">Ter</button>
                    <button type="button" data-day="3" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-xs">Qua</button>
                    <button type="button" data-day="4" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-xs">Qui</button>
                    <button type="button" data-day="5" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-xs">Sex</button>
                    <button type="button" data-day="6" class="day-btn border border-zinc-600 px-3 py-1 rounded-lg text-xs">Sáb</button>
                </div>
            </div>

            <input type="number" id="p" placeholder="Preço" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            
            <div class="space-y-2">
                <label class="block text-sm font-bold text-amber-500 uppercase">Foto do Produto</label>
                <input type="file" id="fileInput" accept="image/*" class="w-full p-3 rounded-xl bg-zinc-700 text-sm border-2 border-dashed border-zinc-600 cursor-pointer">
                <div id="preview-container" class="hidden mt-2 flex justify-center">
                    <img id="img-preview" class="w-24 h-24 object-cover rounded-lg border-2 border-amber-600">
                </div>
            </div>

            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="flex gap-2">
                <button onclick="salvar()" id="btnSalvar" class="flex-1 bg-amber-600 text-white py-4 rounded-xl font-black uppercase">Salvar Produto</button>
                <button onclick="cancelarEdicao()" id="btnCancelar" class="hidden bg-zinc-600 text-white px-6 rounded-xl font-bold">Cancelar</button>
            </div>
        </div>

        <div id="lista" class="grid gap-3"></div>
    </div>

    <script>
        const DB_URL = "https://pointdocafe-default-rtdb.firebaseio.com/produtos.json";
        let imagemBase64 = "";
        let diasSelecionados = [];

        // Controle dos botões de dias
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const day = btn.getAttribute('data-day');
                if (diasSelecionados.includes(day)) {
                    diasSelecionados = diasSelecionados.filter(d => d !== day);
                    btn.classList.remove('active');
                } else {
                    diasSelecionados.push(day);
                    btn.classList.add('active');
                }
            });
        });

        function entrar() {
            if(document.getElementById('pass').value === "Root@8505") { 
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                listar();
            } else { alert("Senha incorreta!"); }
        }

        function togglePassword() {
            const f = document.getElementById('pass');
            f.type = f.type === "password" ? "text" : "password";
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const cv = document.getElementById('canvas');
                    const ctx = cv.getContext('2d');
                    cv.width = 400; cv.height = 400;
                    let sX = 0, sY = 0, sW = img.width, sH = img.height;
                    if (img.width > img.height) { sW = img.height; sX = (img.width - img.height) / 2; }
                    else { sH = img.width; sY = (img.height - img.width) / 2; }
                    ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 400, 400);
                    imagemBase64 = cv.toDataURL('image/jpeg', 0.8);
                    document.getElementById('img-preview').src = imagemBase64;
                    document.getElementById('preview-container').classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function salvar() {
            const id = document.getElementById('edit-id').value;
            const nome = document.getElementById('n').value;
            const preco = document.getElementById('p').value;
            const cat = document.getElementById('c').value;

            if(!nome || !preco) return alert("Preencha os campos!");

            const item = { nome, categoria: cat, preco: parseFloat(preco), dias: diasSelecionados };
            
            if (imagemBase64) item.img = imagemBase64;

            const url = id ? DB_URL.replace('produtos.json', `produtos/${id}.json`) : DB_URL.replace('.json', `/${Date.now()}.json`);
            
            if(id && !imagemBase64) {
                const res = await fetch(url);
                const antigo = await res.json();
                item.img = antigo.img;
            } else if (!id && !imagemBase64) { return alert("Foto obrigatória!"); }

            await fetch(url, { method: 'PUT', body: JSON.stringify(item) });
            cancelarEdicao();
            listar();
        }

        function prepararEdicao(id, nome, preco, categoria, img, dias) {
            cancelarEdicao();
            document.getElementById('edit-id').value = id;
            document.getElementById('n').value = nome;
            document.getElementById('p').value = preco;
            document.getElementById('c').value = categoria;
            document.getElementById('img-preview').src = img;
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('form-title').innerText = "Editando Produto";
            document.getElementById('btnCancelar').classList.remove('hidden');
            
            if(dias) {
                diasSelecionados = dias.map(String);
                diasSelecionados.forEach(d => {
                    document.querySelector(`[data-day="${d}"]`).classList.add('active');
                });
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicao() {
            document.getElementById('edit-id').value = "";
            document.getElementById('n').value = "";
            document.getElementById('p').value = "";
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('form-title').innerText = "Adicionar Novo Produto";
            document.getElementById('btnCancelar').classList.add('hidden');
            imagemBase64 = "";
            diasSelecionados = [];
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        }

        async function listar() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            if(data) {
                for(let id in data) {
                    const p = data[id];
                    lista.innerHTML += `
                        <div class="bg-zinc-800 p-4 rounded-2xl border border-zinc-700 flex flex-col gap-3">
                            <div class="flex items-center gap-3">
                                <img src="${p.img}" class="w-12 h-12 object-cover rounded-lg">
                                <div class="flex-1">
                                    <p class="font-bold text-sm">${p.nome}</p>
                                    <p class="text-xs text-amber-500">${p.dias ? 'Dias: ' + p.dias.map(d => ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d]).join(', ') : 'Sempre disponível'}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="prepararEdicao('${id}', '${p.nome}', ${p.preco}, '${p.categoria}', '${p.img}', ${JSON.stringify(p.dias || [])})" class="flex-1 bg-zinc-700 py-2 rounded-xl text-xs font-bold">EDITAR</button>
                                <button onclick="remover('${id}')" class="text-red-500 px-4 py-2 text-xs font-bold">EXCLUIR</button>
                            </div>
                        </div>`;
                }
            }
        }

        async function remover(id) {
            if(confirm("Excluir?")) {
                await fetch(DB_URL.replace('produtos.json', `produtos/${id}.json`), { method: 'DELETE' });
                listar();
            }
        }
    </script>
</body>
</html>
