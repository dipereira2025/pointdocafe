<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Point do Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-zinc-100 p-4 font-sans">

    <!-- Tela de Login -->
    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl text-zinc-900 shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-center text-amber-900 underline">PAINEL POINT</h2>
        
        <div class="relative mb-4">
            <input type="password" id="pass" class="w-full p-4 border-2 border-amber-100 rounded-xl outline-none focus:border-amber-600" placeholder="Senha do Point">
            <button type="button" onclick="togglePassword()" class="absolute right-4 top-4 text-gray-500">
                <span id="eye-icon">👁️</span>
            </button>
        </div>

        <button onclick="entrar()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold hover:bg-black transition-colors">ACESSAR SISTEMA</button>
    </div>

    <!-- Painel Administrativo -->
    <div id="painel" class="hidden max-w-xl mx-auto py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">Gerenciar Menu</h1>
            <button onclick="location.reload()" class="bg-zinc-700 p-2 rounded-lg text-xs">Sair</button>
        </div>
        
        <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl space-y-4 mb-10">
            <input type="text" id="n" placeholder="Nome do Produto" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            <select id="c" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
                <option>Prato do dia</option>
                <option>Combos do dia</option>
                <option>Bebidas</option>
                <option>Salgados</option>
                <option>Bombonieries</option>
            </select>
            <input type="number" id="p" placeholder="Preço (ex: 15.50)" class="w-full p-4 rounded-xl bg-zinc-700 border-none">
            
            <label class="block text-sm font-medium text-zinc-400 mb-1">Foto do Produto:</label>
            <input type="file" id="fileInput" accept="image/*" class="w-full p-3 rounded-xl bg-zinc-700 text-sm">
            <canvas id="canvas" style="display:none;"></canvas>
            
            <button onclick="salvar()" id="btnSalvar" class="w-full bg-amber-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-amber-500 transition-all uppercase tracking-widest">Adicionar ao Cardápio</button>
        </div>

        <h3 class="text-xl font-bold mb-4 flex items-center gap-2">🛒 Itens Atuais <span id="total-itens" class="text-xs bg-amber-600 px-2 py-1 rounded">0</span></h3>
        <div id="lista" class="grid gap-3"></div>
    </div>

    <script>
        const DB_URL = "https://pointdocafe-default-rtdb.firebaseio.com/produtos.json";
        let imagemBase64 = "";

        // Ver se a senha está correta
        function entrar() {
            const passInput = document.getElementById('pass').value;
            if(passInput === "Root@8505") { 
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                listar();
            } else {
                alert("Senha incorreta!");
            }
        }

        // Função para mostrar/esconder a senha
        function togglePassword() {
            const passField = document.getElementById('pass');
            const eyeIcon = document.getElementById('eye-icon');
            if (passField.type === "password") {
                passField.type = "text";
                eyeIcon.innerText = "🔒"; // Muda para ícone de trancar ao mostrar
            } else {
                passField.type = "password";
                eyeIcon.innerText = "👁️"; // Muda para ícone de olho ao esconder
            }
        }

        // Processar Imagem
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    const scale = 400 / img.width;
                    canvas.width = 400;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    imagemBase64 = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const nome = document.getElementById('n').value;
            const preco = document.getElementById('p').value;

            if(!nome || !preco || !imagemBase64) return alert("Preencha Nome, Preço e escolha uma Foto!");

            btn.innerText = "SALVANDO...";
            btn.disabled = true;

            const item = {
                nome: nome,
                categoria: document.getElementById('c').value,
                preco: parseFloat(preco),
                img: imagemBase64
            };

            await fetch(DB_URL.replace('.json', `/${Date.now()}.json`), { method: 'PUT', body: JSON.stringify(item) });
            
            document.getElementById('n').value = ""; 
            document.getElementById('p').value = "";
            document.getElementById('fileInput').value = "";
            imagemBase64 = "";
            btn.innerText = "ADICIONAR AO CARDÁPIO";
            btn.disabled = false;
            listar();
        }

        async function listar() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let count = 0;
            
            if(data) {
                for(let id in data) {
                    count++;
                    lista.innerHTML += `
                        <div class="bg-zinc-800 p-4 flex justify-between items-center rounded-2xl border border-zinc-700">
                            <div class="flex items-center gap-3">
                                <img src="${data[id].img}" class="w-10 h-10 object-cover rounded-lg">
                                <div>
                                    <p class="text-amber-500 text-[10px] font-bold uppercase">${data[id].categoria}</p>
                                    <p class="font-bold">${data[id].nome}</p>
                                </div>
                            </div>
                            <button onclick="remover('${id}')" class="bg-red-900/30 text-red-500 p-3 rounded-xl hover:bg-red-500 hover:text-white transition-all text-sm font-bold">EXCLUIR</button>
                        </div>`;
                }
            }
            document.getElementById('total-itens').innerText = count;
        }

        async function remover(id) {
            if(confirm("Deseja remover este item?")) {
                await fetch(DB_URL.replace('produtos.json', `produtos/${id}.json`), { method: 'DELETE' });
                listar();
            }
        }
    </script>
</body>
</html>
